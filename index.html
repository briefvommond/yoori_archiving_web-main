// ── 텍스트 아카이브 콘텐츠 ────────────────────────────────────────────
const textsContent = {
  'shapeless-loop-essay': `개인전 《투명한 고리》 (학고재, 2025) 전시 서문


한주옥 (독립큐레이터)

<우리의 안녕(安寧)을 위한, 투명한 고리(Shapeless Loop)>


기억은 때로 미래를 예지하는 계기가 된다. 불현듯 떠오른 과거의 한 장면이 현재를 가로질러 올 때, 그것은 세계를 이어온 패턴을 환기하고, 동시에 다가올 시간의 징후가 된다. 서로 다른 시간 선이 하나로 접히는 순간이다. ―자연의 섭리와 인간사에 깃든 모든 운동과 수(數)가 그 흐름에 흡입되어 왔기에―따라서 '연결'이 무한한 궤도 혹은 고리(loop)의 형상으로 표상되어 온 까닭은 여기에 있을 것이다. 작가 유리(Yoori)는 오랫동안, 이 '연결의 감각'을 작업의 주요한 기제로 삼아왔다. 정확히 말하면, 과거로 흘러간 감각과 부재의 자리에 침전된 정서를 주시하며, 그것이 다른 형태로 이어질 가능성에 마음을 기울이는 것이다. 이러한 맥락에서 이번 전시 《투명한 고리(Shapeless Loop)》는 근래 작가에게 유독 반복해 찾아온 상실의 감정들이 일상의 장면과 부딪치는 순간, 즉 언어 이전의 감각, 논리 바깥에서 포착된 신호들을 모아 투명한 고리로 엮은 결과이다. 반짝이듯 굴절된 찰나의 장면들을 천천히 따라가 본다.

작업실에서, 작가는 근래 겪은 몇 가지 일을 들려주었다. 장례식장, 할아버지를 위해 모인 시간과 무관하게 생의 기쁨이 불쑥 터져 나온 순간이었다. 생일을 축하하는 가사가 흘렀고, 케이크 위 촛불은 향과 눈물로 뒤섞여 함께 반짝였다. 그날의 잔상은 '생과 사' 사이의 관념,  그리고 그 긴 사유의 간극이 그에게 단숨에 굽이쳐, 몸과 정신에 가닿았다고 한다.
작가의 이러한 경험은 '윤회'와 같은 형이상학적 개념을 해석하는데 주목하기보다, 사건이 일어나는 방식, 과정에서 형성되는 '기류'를 감지하는 계기로 작동된다. 지극히 비가시적이며, 정확히 재현할 수 없는 것들을 수용하게 된 일련의 경험은, 감각이 도래하는 순간을 하나의 시간적 양상으로 받아들이고, ―이것을 시간성이라고 할 수 있다면―그 감각이 또 다른 형태로 전환되어, 변주하는 과정 자체를 작업의 수행 삼는 것이다. 그래서 작가의 작품은 과거와 미래가 현재로 접히는 자리, 즉 여러 시간의 층위가 동시에 머무는 자리가 된다.

이러한 태도는 작업의 전개 방식에서 더욱 분명해진다. 덧입히고, 지우고, 화면의 내부와 외부를 연결하는 그의 반복적 행위는, 하나의 결과로 이미지를 고정시키는 목적에서 벗어난다. 따라서 작가가 포착한 장면들은 서로를 부르는 매개항이 되며, 또 다음 장면으로 변주될 동력을 장착하는 것이다. 매체에 대한 실험 역시 이 과정에서 확장된다. 여기서 주목할 점은 작품 스스로가 '서사의 단위'로 기능한다는 점이다. 즉 일종의 시퀀스(sequence)로 기능하는 작품은 장면을 모으고, 배열하고, 다시 되돌아 볼 수 있는 '타임루프'적 장치, 즉 작가 특유의 조형 구조를 형성하게 된다. 이는 작가가 오랜 시간 '아티스트 북'이라 불러온 작업에서도 확인할 수 있을 것이다.
이번 전시에서는 2023년부터 제작해 온 아티스트 북 연작 <무거운 언어들의 책 #1~19>(2023-2025)을 선보인다. 표면의 시각적 요소, 단단한 나무의 감각으로 지각되는 아티스트 북은, 언어화 되지 못한 감각과 그것을 연결하는 작가의 수행을 은유한다. 작가는 "여러 장의 종이가 모여 하나의 덩어리가 되는 책의 힘, 그리고 제책 방식에서 오는 물리적·시각적 자극" ¹ 을 언급한 바 있다. 따라서 그의 작업 세계에서 책은 '연결성'과 '축적'이라는 속성을 물리적으로 구현하는 존재로 기능한다. 페이지 넘기듯 장면은 이어지고, 읽는 행위를 경유한 연결은 다시 연결된다. 신작 <잔존하는 것들을 뭉쳐 만든 슬픔>(2025)과 <상실의 가능성과 영원의 염원>(2025)은 기존의 작업에서 투명함(transparent)이라는 층위를 더한다. 아크릴 잉크, 실크 천, 작가의 손에 머물렀던 오브제 등은 레진(resin)에 의해 봉인되어 책의 형태로 굳어진다. 더불어 그 안을 투과해 볼 수 있다는 전제가 동시에 작동한다. 다시, 과거와 미래가 현재에 흐른다.

그렇다면 이제 질문은 무엇이 화면에 남는가이다. 꺼져가는 초(燭)가 남긴 미세한 빛, 풀렸다가 다시 묶이는 리본, 흐르는 물, 날개의 편린. 이 이미지들은 분명 작가의 내면에 잔류한 시간에서 떠오른 것이며, 잠시 머물렀다가 사라진 남은 흔적들일 것이다. 그리고 온전히 붙잡히지 않는 의미들은 여전히 그의 의식 아래 머물러 있을 것이다. 그래서 그는 의미를 애써 규정하지 않는다고 한다. 대신 그에게 다가오는 흐름을 온전히 받아들이고, 또 다시 흘려보낸다. 문득, 직선이라 믿었던 길의 끝이 부드럽게 굽어지는 곡선이 열리는 순간이 떠오른다. 그 곡선은 또 다른 길을 연결해 주지 않던가. 고리(loop)는 그렇게 표상되어 왔다. 이러한 맥락에서, 전시장 중앙 오른편에 설치된 두 작품을 교차해 살펴본다. <긴 꼬리 책 : 떨어져 나온 문장(1~14)>(2025)과 작품 <긴 꼬리 책>(2023-2025)이 인접하게 설치된다. '긴 꼬리 책'은 과거 7미터 길이의 설치 작품으로 제작되었으나, 여러 차례 바인딩 과정을 거쳐 책의 형식으로 다시 탄생되었다. 이 과정에서 작가는 페이지를 무작위로 접고(덮고) 펼치는 과정에서 발생한 우연한 분절, 연결되는 감각의 촉매를 획득해 '긴 꼬리 책 : 떨어져 나온 문장'을 제작한다. 하나의 서사를 이루며 이어지던 이미지는 책에서 분기되어 독립적인 장면, 동시에 고리처럼 연결된 연속성을 형성한다.

어느 날, 누군가의 부재―시간과 공간에서 빠져나간 흔적―이 야속하게 느껴진다. 그는 흘러간 것들을 되찾으려는 욕망을 숨기지 않는다. 숨겨야 할 필요는 없다. 하나, 둘 가능한 것들을 이어 붙이는 과정에서 형태를 얻는다. '잔존하는 것들을 뭉쳐 만든 슬픔'은 그렇게 얻어진 이름이다. 전시장 입구의 작품을 다시 떠올려본다. 이번 전시 타이틀과 동일한 <투명한 고리>(2025)는 탄생과 죽음, 그리고 소중한 것들의 부재가 하나의 사건이자 사유로 응축된 장면이다. 검푸른 색의 파장은 마치 어두운 밤 운하를 따라 흐르는 물결처럼, 묵직한 중압감으로 내려앉는다. 우리 일상의 단단히 지탱해 주던 일련의 (비)물리적 믿음이 사라졌다는 사실은 어떤 고통과도 비교할 수 없을 만큼 떨쳐내기 어려운 것이다. 그가 이번 전시를 기획하게 된 이유. 소중한 것들에 대한 애도는 그렇게 이곳에 결속한다. '연결'의 가장 근원적인 요소는 '부재'에서 비롯된다는 점을 다시 환기하며.

신리사 (미술사ㅣ학고재 기획팀장)

<끝 이후의 시간을 위하여 – 사라진 존재들을 다정히 불러내기>



검푸른 웅덩이와 푸른 물줄기 속에서 솟아오른 검은 선과 덩어리들. 시각예술가 유리(b. 1994)는 마음 안에서 증발하지 못하고 고여 있는, 이름 붙여지지 않은 감정과 심상을 이미지로 길어 올리는 작업을 지속해 왔다. 학고재에서 진행되고 있는 개인전 《투명한 고리》(11/19-12/20)는 개인적인 서사에서 출발한다. 한 해 동안 가까운 존재들의 죽음을 세 번 연달아 마주한 뒤, 작가는 존재와 실재성에 대한 관심을 삶과 죽음이라는 구체적 주제와 함께 사유하게 되었다. 특히 할아버지의 기일이 되어버린 생일, 장례식장에서 생일 축하를 받았던 경험은 장례식장의 초와 생일 케이크 위의 초가 서로 닮아 있는 것처럼 탄생과 죽음이 분리된 사건이 아니라는 인식으로 이어졌다. 이번 전시는 바로 그 지점ㅡ끝과 시작, 존재와 부재의 경계ㅡ를 들여다보는 응시에서 비롯된다.

<끝난 자리에서>
전시는 회화, 조각, 설치 50여 점으로 구성되는데, 대부분 검고 희며 때때로 검푸른 색채가 떠오른다. 이곳에서 유리가 붙잡아둔 것들은 더 이상 볼 수 없는 존재들이 남기고 간 작고 미세한 잔해들이다. 그는 그것들을 감추거나 미화하지 않고 정직하게 드러내기를 택한다.

전시와 동명의 회화 <투명한 고리>에서는 죽은 고양이의 형상과 다시 만날 날을 기다리며 다리에 묶어놓은 붉은 실이 등장한다. 레진과 나무를 엮어 만든 조각에서는 같은 실이 즉각적인 물성으로 되살아난다. 작품은 기억이나 회상에 기댄 이미지가 아닌, 사라진 뒤에도 남아 있는 것들의 현전성에서 출발한다. 화면에 깊숙이 스며든 검은 자국, 물기가 걷힌 매트한 질감, 거칠게 휘날리는 선은 요동치던 감정이 지나가고 난 뒤 남아있는 영원의 잔광처럼 남아있다.

외할머니의 목걸이에서 나온 구슬을 레진으로 봉입한 <잔존하는 것들을 뭉쳐 만든 슬픔>에서도 사라진 존재들이 어딘가에서 계속 어떤 형태로든 남아있기를 바라는 마음이 담겨 있다. 투명한 덩어리 속에서 떠오르는 작은 구슬은 영원의 결정(結晶)으로 변모하여 '죽음 이후의 시간'을 위한 사물로 빚어진다. 유품을 그대로 보존할지, 작품화할지 망설이던 마음은 다음 차원을 향한 초월의 의지가 우위를 점하며 거두어졌다. "무언가 해야만 했어서"라는 작가의 말은 슬픔과 애도의 시간을 지나 나아가겠다는 결의에 가깝다.

<움직이는 세계>
유리는 존재와 부재, 삶과 죽음을 잇는 연결고리를 추상적 개념이 아닌 구체적 사물과 장면, 촉각적 경험을 통해 드러낸다. 시작과 끝이 없는 검은 고리, 부피와 리본을 만들고 하늘로 솟아오르는 검은 실, 날개를 닮은 하얀 고리 등이 작품 곳곳에 등장한다.

<끊임없이 차오르고 계속해서 비워지는 것들>에서는 연결과 순환의 구조가 분수의 형태로 제시된다. 솟구치다 떨어지고 다시 채워지는 분수의 움직임은 존재와 부재가 교차하는 생의 거대한 흐름을 시각화한다. 이는 거대한 수레바퀴 속에서 채워지고 비워지는 삶의 경험, 즉 마음의 운동이기도 하다. 두 눈과 같은 형상을 지녀 사람을 닮은 이 분수는 쏟아지는 감정을 그대로 분출해 내면서도 어딘가 초연한 모습이다. 차오르는 것은 비워지고, 비어 있는 것은 필히 채워질 것을 알고 있기 때문에.

끝이 끝이 아니라는 믿음, 투명한 연결 고리에 대한 관심은 달과 바다의 관계로도 은유된다. 물리적으로 결코 닿을 수 없을 만큼 멀리 있지만, 달의 중력이 바다를 끌어당기기에 바다는 끊임없이 움직임을 이어간다. <달과 바다의 사이>에서는 검푸른 파도와 희미한 달빛이 서로의 경계를 지우며 맞닿아 있다. 작가는 영원히 만나지 못하는 둘을 집을 닮은 공간 안에 함께 둔다. 멀리 떨어져 있지만 강하게 연결된 두 존재처럼, 작가는 이별 이후에도 지속되는 관계와 보이지 않지만 강력하게 작동하는 것들을 담아낸다.

<끝을 딛고 태어난 조각들>
<긴 꼬리 책>에는 연결에 대한 사유와 전환에 대한 의지가 작업 방식으로 드러난다. 작가는 본래 7m 길이에 달하는 그림을 아코디언처럼 접으며, 기존의 장면들이 우연한 방식으로 이어지고 새로운 조합을 만들어내는 모습을 목격했다. 읽을 수 없는 문장처럼 불쑥 튀어나온 이미지들은 또 다른 언어와 의미를 낳았고, 작가는 그 장면들을 독립된 작은 그림들로 분리해 <긴 꼬리 책 : 떨어져 나온 문장>이라는 제목의 연작으로 확장했다. 그리고 그 그림들을 다시 미니어처로 축소하고 연결하여 하나의 '꼬리'와 같은 모양으로 탄생시켰다.

원본을 책처럼 접어내는 행위는 해체를 위한 행위라기보다, 새로운 가능성을 탐색하는 일에 가깝다. 조각난 화면들은 본래의 기능을 상실하지만, 작가는 그 단절을 새로운 시작의 출발점으로 삼는다. 남겨진 것(원본 그림)을 온전히 보존하는 대신 파편화하고 재구성함으로써 '남아 있는 것들'의 무게를 새롭게 발화하는 것이다. 그렇게 '꼬리에 꼬리를 물고' 태어난 작품은 '끝'을 딛고 살아나, 어딘가 그로테스크하지만 검게 빛나는 짐승처럼 새로운 존재로 태어난다.

<남은 것들을 위한 시>
남겨진 것들을 응시하고 다시 빛을 얻게 하는 유리의 세계에서, 의미 없는 것은 없고 끝은 끝이 아니게 된다. 슬픔과 그리움처럼 무겁게 침잠하던 감정들은 하얀 날개와 투명한 영원의 고리를 타고 가볍게 다음 차원으로 비상한다.

이번 전시는 상실과 애도에서 출발하지만, 그 너머를 향해 나아가려는 의지와 영원에 대한 염원이 분명히 자리한다. 더 이상 볼 수 없는 존재들이 어떻게든 삶을 이어 나가길 바라는 간절함, 사랑하는 이들과 물리적 제약을 넘어 영원히 연결되고자 하는 바람. 지극히 사적인 이야기임에도 불구하고 우리가 유리의 예술에 공감하게 되는 이유는, 그가 결국 모두가 공유하는 상실의 두려움과 그것을 견디고 나아가려는 인간의 보편적 정서를 어루만지기 때문일 것이다. 삶에서 비롯되어 다시 삶으로 이어지는 유리의 예술 속에서, 우리는 두려움과 슬픔을 정직하게 마주하고 동시에 극복의 가능성을 함께 감지한다.

  'oaoa2026-text': `《미시적 재난》 (Micro-Disaster)


오에이오에이는 2026년 첫 전시로 양하, 유리의 2인전 《미시적 재난 Micro-Disaster》을 선보입니다. 이번 전시는 사회적·개인적 비극이 한 사람의 내면으로 수렴되는 지점과 그 이후의 시간을 "미시적 재난"이라 명명하고 조명합니다.

우리는 누구나 재난을 경험합니다. 전쟁과 사고, 기후 재난부터 수시로 울리는 실종자 알림까지, 재난은 도처에 존재하고 빠른 속도로 우리의 손바닥 위로 전달됩니다. 참상의 소식에 충격을 받아도 뉴스를 새로고침 하는 것 외에는 달리 할 수 있는 일이 없을 때의 죄책감과 무력감은 현대인이 반복적으로 경험하는 정서가 되었습니다. 재난이 휩쓸고 간 자리의 고통은 사회적 시스템이 복구되고, 사건이 공적 기억 속에서 흐릿해진 뒤에도 사라지지 않은 채, 여전히 누군가의 몫으로 남겨집니다.

개인의 삶에서도 죽음과 질병, 사건과 사고는 예고 없이 찾아와 일상을 흔들어 놓습니다. 누구나 겪는 흔한 일일지라도 그것을 통과하는 한 사람의 내면에서는 무엇보다 큰 재난으로 다가옵니다. 사회적으로 우리는 이 고통을 어떻게 받아들이고 소화해야 하는지에 대해 충분히 배우지 못했고, 때로는 타인에 의해 애도와 회복의 시간이 성급히 단정되기도 합니다. 결국 그 혼란과 아픔을 견뎌내는 과정은 다시, 오롯이 개인의 몫이 됩니다.

양하와 유리는 이렇게 한 사람의 몫으로 남겨진 재난에 주목하며 각자의 시각 언어를 통해 비극 이후의 삶에 관해 이야기합니다. 사회가 정한 문법이나 속도에 매몰되지 않고 자신에게 닥친 재난을 주체적으로 대면하며 삶을 지속하는 태도를 제시하고 있습니다.

양하 작가는 폭발과 파편의 이미지가 스크린을 거치며 매끄러운 정보로 정제된 상태를 '매개된 폭력'이라 지칭하고, 현대사회가 재난을 소비하는 방식에 질문을 던져왔습니다. 작가는 스크린 샷을 찍듯 수집한 비극의 장면들을 캔버스로 옮겨오지만, 실제의 고통과 무게는 삭제되어 있습니다. 파스텔톤의 구름이나 말랑한 젤리처럼 변모한 폭발의 형상은 사건을 안전하게 가공하고 지나치는 현대인의 무감각함을 서늘하게 폭로합니다. 실내나 창밖의 풍경 위로 무심하게 겹쳐진 '귀여운 폭발물'은 우리가 안온한 일상 속에서 타인의 고통을 얼마나 가볍게 인지하고 동시에 망각하는지를 직시하게 하는 장치가 됩니다.

이번 전시에서 양하는 그간 반복해온 '폭발'의 잔상이 정물 혹은 초상으로 치환되는 새로운 국면을 보여줍니다. 기존 작품의 매끈한 폭발 이미지는 이제 기둥과 같은 '몸'을 가진 주인공이 되어 무대 중앙에 당당히 자리합니다. 재난을 연극적 무대 위에 올려 관람객과 정면으로 눈을 맞추게 하는 초현실적인 설정은 비극을 둘러싼 외부의 맥락을 소거하고 오직 대상과 나만이 존재하는 '직면'의 상태를 유도합니다. 작가는 "왜 그렇게 먼 곳의 이야기를 그리느냐"는 물음에 "가장 가까운 곳을 그리고 있다"고 답하며, 먼 곳의 비극이 이미 우리의 문과 창을 지나 실체를 갖추고 식탁 위 화병 앞에 도착해 있음을 직시하게 합니다. 작품 제목을 통해서도 '도대체 가까운 곳은 어디인지' 반문하며, 나아가 '0.1%의 애정'만 있다면 타인의 아픔을 내 영역 안으로 성실히 데려올 수 있다는 작은 용기를 제안합니다. 타인의 고통을 남의 것으로만 방치하지 않고 내 일상의 서사 속으로 데려오는 이 태도는 무력감에 함몰되지 않고 자신만의 방식으로 세상을 살아가려는 한 개인의 존엄한 저항이자 가장 따뜻한 연대의 방식이 될 것입니다.

  'daejeon2024-text': `《메신저의 신비한 결속 (Mysterious Solidarities of Messengers)》

전시 《메신저의 신비한 결속 (Mysterious Solidarities of Messengers)》은 인간과 자연 그리고 예술 사이에 일어나는 고유한 감각의 총체와 교감적 경험을 메신저(Messenger)의 영역에 빗대어 이야기한다.
먼저 하나의 가설로서 메신저의 역할에 주목하는 전시는 그 기원과 유래를 되짚어 상상력을 자극하는 지점을 시작점 삼는다. 신화 속, 지상과 지하를 넘나들며 신의 메시지를 전달하는 정령 헤르메스(Hermes)의 세계, '알리다'라는 뜻의 라틴어 'annuntio'에서 파생된 수태고지(Annunciation) 속 가브리엘과 같은 천사는 명시적 상호관계에서 배제된 안내자이자 매개자, 기생자 등 중간자의 의미로 수렴하는 지대를 점유해왔다. 이들은 구체적인 형상과 무형의 절대성을 경유하며 깜박이는 빛, 섬광, 기류, 회로 속 잡음에 담긴 이동체의 모습으로 출현하고 사라지기를 반복한다. 미셸 세르(Michel Serres)는 저서 『천사들의 전설 (La légende des anges)』에서―기존의 시간과 공간 개념이 전제하는―국지적(régional) 개념을 벗어나 정합적 총체를 부여해 확장하는 순환의 지지체를 무수한 형태의 천사들에 대입해 서술한바 있다. 메신저는 다른 하나 또는 여러 개의 관계를 맺으며, 수직·수평의 길을 열어내는 심원이자 세계를 향한 연결고리가 되어, 새로운 인식론적 지도를 만들어 나간다. 전시는 이러한 전개에 비추어 우리를 둘러싸고 있지만 보이지 않는, 언어로 표현하기 어려운 존재 형태의 가능성을 살펴본다. 점(點)적인 상태의 대지를 발견하고 미지의 영역 속 발화자를 인식할 가능성은 '선택된 감각'과 '결합의 형태'인 조형 언어와 미술의 자율적 실천에서 포착된다. 전시는 작품을 구성하는 물질과 비물질 사이 근원적 생의 토대를 발견하고 연결한다는 점에서 '메신저'의 역할과 기능을 환대한다.

헤르메스의 어원은 '헤르마(ἕρμα, herma)'이며, 여기서 파생된 단어는 횡단, 이동, 전이와 같은 뜻을 가진 헤르메틱(hermetic)이다. 전시를 통해 소개하는 여섯 작가 고산금, 배인숙, 유리, 이빈소연, 이산오, 이유경은 인간과 비인간, 자연과 비자연의 특별한 구분 없이 헤르메틱적 관념과 개념에 접근하여, 다양하게 흩어져 있는 감각과 경계의 결합을 횡단한다. 전시명 '메신저의 신비한 결속'은 파스칼 키냐르(Pascal Quignard)의 소설 『신비한 결속』에서 가져온다. 우리를 둘러싼 미지의 영역을 향해 서사를 전개하는 키냐르의 소설은 보이지 않지만, 신비한 충만함으로 감각될 이번 전시의 주제에 겹쳐진다. 감각적 경험과 의식의 연대로 뒤얽힌 망은 지금 여기, 하나로 결속한다.

"우선 구축된 망이 있는데, 우리는 그 속에서 살고 있어. 그리고 온갖 종류의 순환이 있지. 다음으로 물리적 흐름의 세계가 있어 (...) 바람, 해류, 빙하, 화산 등이 전하는 미묘한 메시지들을 읽어 내기가 매우 어려워서, 그것들을 해독하는 데 너무나 많은 기간이 걸린다면, 그것들을 지능이 있는 존재물이라고 판단하는 것이 합당하지 않을까? 그토록 정확하고 정교하고 더없이 훌륭하게 코드화된 언어를 누가 감히 말할 수 있을까?"  (Michel Serres, 『천사들의 전설-현대의 신화』, 이규현 역, 그린비, 2008, p39)

이빈소연은 우리를 둘러싸고 있는 여러 상황과 그 안에서 벌어지는 관계성에 주목하며, 영상, 설치, 디지털 페인팅 등 다양한 매체를 섬세하게 다루어왔다. 이번 전시의 출발점이 되는 <페어리 모빌리티 투자유치설명회 비디오: 고아를 만드는 기계>(2023)는 인간과 문화, 자연에 깃들어 있는 송·수신자 간 이동의 영역과 사라져 가는 메시지의 전달체계를 추적하며, 요정이 그린 원호이자 균륜인 '페어리 링'(fairy ring)'에서 그 기원을 찾는다. 한편 작가는 한국 가족 관계에서 비롯한 독특한 캐릭터를 가진 고모와 작가 자신 사이에서 일어난 어린 시절 좌충우돌 사건을 바탕으로, 사변적 상상을 교차시킨 설치 작품 <링 링>(2024)을 선보인다. 작가가 설계한 '페어리 모빌리티'에서 복제되는 '고아(孤兒)'는 이제는 찾아볼 수 없는 전화기 선 너머의 잡음과 실패로 끝난 고모와의 소통을 이으며, 현실을 재편한다. 이유경은 과거 3D CG 온라인 게임 '세컨드 라이프(Second Life)'에서 한 공간에서 다른 공간으로 이동하는 텔레포트(teleporting)도중 그래픽 오류로 인해 아바타 신체의 일부를 잃었다. 이 경험은 뉴질랜드와 영국으로 이주해 보낸 작가의 개인적인 시간과 장거리 연애, 줄여서 롱디(Long-distance relationship)로 불리는 경험에 자연스럽게 싱크된다. 신체에 내재한 '연결'이라는 감각과 자아개념2은 현실과 전자 매체를 경유하는 이미지로 투영되며 작업 전반 필연적인 방법론으로 작동한다. 작품 <Self Portrait (자화상)>(2019-2023) 시리즈는 모체가 되는 작가의 신체를 지지체 삼아, 이미지 데이터를 현실 공간에 조각적으로 구현한다. 또한 빈도 높은 교차 메시징 애플리케이션으로 인한 신체의 지각은 작품 <A Lover's Discourse: Fragments (사랑의 단상: 파편들)>(2023)의 투명한 말풍선으로 물질화 되어, 가상과 현실의 통로를 떠다닌다. 연질 PVC, 코팅된 종이, 버블 랩, 글리터 등의 재료를 통해 물성의 단단함을 덜어낸 작품들은 가상 속 실체 없는 양태를 감각하는 경로를 잇는다.2층으로 이어지는 계단 <Connecting… (2)(커넥팅...(2))>(2023)을 따라 올라가면, 전시실로 이어지는 통로 새들의 맑은 지저귐이 들려온다. 배인숙은 음악과 설치를 결합해 그 안에서 신체가 몰입하는 원리를 구성하며, 상호 작용에 의해 완성되는 소리 장치를 제작해 왔다. 작가는 작년 봄과 여름 사이 경기도, 강원도, 제주도 등의 숲에서, 동트기 전 가장 어둡고 고요한 시간에 맞춰 신기루처럼 몰려드는 새들의 소리를 녹음한다. 시미언 피즈 체니(Simeon Pease Cheney)가 새들의 노랫소리를 기보해, 자연의 소리를 음악의 언어로 해석했듯 작가는 소리로만 공간 전체를 장악했던 경험을 8개의 스피커 박스와 LED 빛 인스톨레이션으로 구현한다. 리라(Lyre)의 외양을 떠올리게 하는 작품 <줄인사>(2023)는 기타에서 사용하는 현과 줄감개로 제작되어 하프의 연주법을 사용한다. 20개의 각 현에는 작가의 음성이 담긴 인사말이 녹음되어 있지만, 연주로 인해 인사말은 무작위로 섞여 해독 불가능한 음악이 연주된다. 유리는 매일의 경험과 감정에 반응하는 감각에 주목하며 작업을 시작한다. 작가는 그 과정에서 언어에 기생할 수 없어 말과 글이 되지 못한 세계, 물질에 종속된 명사와 동사의 쓰임에서 벗어난 '소통 체계'를 향해 예리한 촉을 새운다. 동시에 몸과 몸의 환경을 변화시키고 시공을 재조직하는 것들, 결코 언어 체계가 건져내지 못한 현상을 회화로 표현하는 정공법을 취하며 한 장면을 향해 결속하고 매듭짓는 수행을 병행한다. 시간과 존재 차원에서 분산된 회화 작업은 '아티스트 북'이라고도 불리는 4점의 조각 작품 <고작 한 장의 페이지를 넘기기가 쉽지 않았다>(2023-2024)와 함께 설치된다. 작가는 종이 한 장을 넘기는 찰나의 순간을 떠올린다. 지각할 수 있다는 믿음, 들리지 않는 목소리를 증폭시킬 수 있다는 기대를 붙잡으며, 수많은 수신자와 발신자 간의 간극을 연결해 간다. 고산금은 오랜 시간 소설, 신문, 시, 철학서, 법전 등 시각적 기호 체계를 기반으로 하는 텍스트에서 조형적 원리를 탐구해, 화면을 재단하는 시각적 틀을 새롭게 구성해 왔다. 그 과정에서 작업의 주요한 소재인 인공 진주를 사용하여 글자 수와 간격을 따라 일관되게 배치하거나 문장 구조를 해체해 연출하는 작업을 진행한다. 원본의 의미론적 맥락이 탈각된 작가의 수행은 진주의 속성에 내재한 의미와 함께, 의미를 전달하는 수단이 아닌 영혼을 갖는 그 무엇으로 빛난다. 또한 이번 전시에는 <메모리 보드>(2019) 시리즈 일부가 소개된다. 오직 검은색 볼펜으로만 빼곡하게 채워나가는 과정에서, 작가가 선을 그리는 압력에 의해 구김이 생긴 종이는 진주의 우연적인 움직임을 발생시키며 가장 필연적으로 작가의 오랜 사유와 예술적 상상을 투영한다. 이산오는 기억과 무의식 그 사이로 흐르는 무화된 시간에서 취득한 특정 문구와 단어를 드로잉과 함께 기록한다. 이 과정에서 '글이 발생하는 구조와 동등'하게 성립된 불현듯 떠오른 이미지는 드로잉을 연유해 조각, 회화 등 다양한 매체로 인접해 나간다. 시청각적 경험으로 포착할 수 없는 형상을 붙잡아내는 작가의 시도는 작품 곳곳에 등장하는 새의 형상과 초자연적 이미지로 승화된다. 인간, 도시, 신화, 자연을 관통하며 그 가능성을 제시하는 신작 <가이드>(2024), 그리고 마치 그림에서 솟아 나온 듯한 작가의 조각 작품은 삶과 죽음, 지하와 지상, 낮과 밤을 넘나드는 정령이자 중간 지대의 모티브로 작동하며 공간을 수놓는다.

  'pageroom-text': `개인전 《없는 날》 페이지룸8, 2024

박정원 (페이지룸8 디렉터)


"없는 날"은 유리 작가가 회화를 통해 표현하는 이미지가 어떤 직관을 통해 발휘되는지 볼 수 있는 지점에 대한 것이다. 이것에 대해 말하기 전에 2022년 11월에 보았던 작품, 〈임시 풍경〉으로 짧은 글을 시작하고자 한다. 당시 언어만으로 표현할 수 없는 영역에 존재하는 것들에 대한 것을 다루는 작가의 작품에는, 날개를 딛고 오르는 사다리, 바다에 물을 주는 여자, 바퀴 달린 오리 등이 등장했다. 말로 다 표현할 수 없지만 피식 웃음이 나는 것들과 시각만으로 미처 알아차리지 못한 순간들을 이미지로 잠시 붙잡아 둔 것처럼. 그때의 형상은 행복이라는 감정에 애도의 마음마저 편입되어 있는 것처럼. 단, 〈임시 풍경〉(2022)은 좀 달랐다. 작가가 직접 지은 작품명 그대로 임시로 존재하는 풍경을 온전히 표현했기 때문이다. 나무 패널에 심듯이 칠한 짙은 초록 풀과 밤인지 낮인지 모를 하늘에 떠 있는 무지개, 마치 작가가 주무르고 있는 흙더미들이 어떤 형상으로 확정되기를 미룬 채 그 더미를 덮은 장막이 묘한 긴장감을 자아내고 있었다. 신기루와 현존 사이에서 작가의 신체에 차오르는 감성에 의해 발굴되는 이미지들은 계속해서 다음에 이어지는 이야기를 기대하게 만든다. "없는 날"은 〈임시 풍경〉의 더미에 덮인 장막을 걷어내어 또 다른 형상이 만들어지는 풍경을 예고한다.

2024년 2월 29일, 4년간 세상에 없던 날이 도래한다. 유리 작가가 직관적으로 자신의 2월 서른 생일에 연결된 실낱을, 없는 날의 실타래에 작은 리본들을 엮어나가기로 한 것은 어쩌면 당연한 일인 것처럼 여겨진다. 올해 그의 생일에는 달이 지구 둘레를 한 바퀴 도는 데 걸리는 한 달의 시간과 지구가 태양의 둘레를 도는 데 걸리는 일 년의 시간이 일치한다. 게다가 보름달을 품에 안은 꿈을 간직한 채 태어난 작가가 맞이할 생일은 달이 가득 차오르는 날이니 말이다.

〈부유물, 중간의 모양, 혹은 티끌〉은 다양한 인물의 형상을 그린 〈The Unknown〉 9점을 전시장 천고만큼의 나무 패널 그림에 걸어 완성한 회화이자 설치 작업이다. 무명, 미지, 신비의 이미지들은 커다란 날개를 숨기지 못하는 고목이 있는 풍경에 부유하는 동시에 포박되어 있다. 생일은 태어나는 것이고 생일은 순환하고 생일은 언젠가 끝이 난다. 생과 사, 이 철학적이고도 생생한 것은 항상 환희로 귀결되기를 바라거나 두려움으로 점철된다. 살아있는 현존성은 보통은 숨 쉬는 것과 매우 가까워서 놓치고 만다. 천국과 지옥, 또는 연옥으로 표현될 수 없는 곳에서 안개처럼 떠다니는 티끌이 되어보기로 한다.

유리 작가의 『없는 날』은 366점의 드로잉을 엮은 아티스트북이다. 각각의 드로잉에는 자신이 추구하는 세계의 신체적 지평이 되어 떠올려진 이미지들에 날짜를 부여했다. 반짝이며 소멸을 맞이한 순간을 기념일로 만들어 준 것일까. 그렇게 없는 날은 있는 날이 되었다. 페이지를 넘기는 행위는 익명의 누군가의 시각과 접점을 이룬다. 책이 꼭 책이 아닌, 그렇다고 전시의 부록이 아닌, 작가만의 독특한 경계 지점을 형성한다. 유리 작가는 펼치면 안이 바깥이 되고 응시하면 바깥이 안이 되는 상징적인 역설의 세계를 이렇게 책의 물리적인 심미성과 개념에서 발견한다. 한 권의 책을 펼치면, 페이지와 페이지의 틈새에 누구나 무엇이든 개입할 수 있는 여지를 만들듯이, 작가의 작업은 굳게 다문 덩어리에 사이라는 경우의 수를 만들어가는 과정이다.

작가는 현재까지 나무 패널과 캔버스를 혼용하고 있다. 특히 나무 패널에 유채 작업은 스퀴지(squeezing)와 카빙(carving) 제스처가 결합된다. 〈부유물, 중간의 모양, 혹은 티끌〉에서 볼 수 있듯이, 나무 패널 위에 캔버스를 설치함으로써 평면 회화 장르가 입체/설치로 확장된다. 작품 〈무거운 낱말들〉(2023)에서 역시 볼 수 있듯이, 책의 조형성에서 모티프를 얻어 접을 수 있는 조각을 만들거나 조각도로 나무를 파냄으로써 소멸과 함께 떠오르는 형상 등이 흥미롭다. 나무 패널과 캔버스, 그림과 책 등을 잇는 동시에 해체함으로써 재료적 측면에서 또한 작가만의 경계 지점을 구축하는 것을 목도할 수 있다. 더 나아가 작가가 취하는 책과 그림에 대한 태도는 회화와 언어의 개념 자체를 빗겨서는 새로운 발견과 시도임을 알 수 있다.

유리 작가의 직관은 아주 짧은 순간에 선택되는 것이 아니라 경계의 세계가 자신의 신체에 차오름으로써 없는 날이 실제 도래한 것처럼 자연스럽게 체득되어 발휘되는 것이다. 그래서 그의 이미지는 조금은 긴 시간 다양한 감각의 세계에 녹아들어야 완성된다. 이것은 특히 언어로 쉽게 관념이 되어 버리는 세계를 피하기 위한 유보적인 태도일 수도 있지만, 무엇보다 하나의 단상으로부터 작가의 상상력과 통찰이 주된 운동성으로 작용하여 형성된다. 생일이라는 작은 실마리가 이루고 있는 세상에 없던 세계는 "없는 날"에 이미 있었다.

지나간 2024년 2월 29일은 당분간 "없는 날"이 된다. 그리고 다시 〈임시 풍경〉을 떠올려 본다. 여전히 존재하지만 잠시 동안 부재하고, 보이지 않지만 소멸되지 않는 그런 존재와 세계... 단, 선명하게 볼 수 없지만 짧게나마 발을 딛고 촉각으로 닿았던 지점을 기억한다. 〈임시 풍경〉이라는 작품에 대한 개인적인 인상이고 유리 작가의 작품에 대한 소감이기도 하다. 언어로 표현하기 힘든 것을 재현하는 그의 작품이기에 여전히 말과 글로 표현하기 힘들다. 하지만 나 자신에 신기루처럼 증거했던 이미지에 대한 실마리들은 일상에서 서서히 은폐되고 사라진 듯 보일 테지만 불현듯 "없는 날"처럼 특별한 그 무렵의 기억을 더듬듯이 다시 등장하리라 믿고 있다.`,

  'in-text-html': `<div style="white-space:pre-line;">개인전 《느슨히 껴안고 단단히 풀기》 전시 서문


모희 (독립기획자)



&lt;침묵의 시대와 밤의 팡세&gt;

침묵의 시대에 사람들은 의사소통을 적게 하기는 커녕 오히려 더 많이 했다, 라고 니콜 크라우스는 썼다. 이때 사용된 최초의 언어는 손짓이었는데, 언어의 손짓과 삶의 손짓에는 아무런 구분이 없었다. "가령, 집을 짓거나 음식을 만드는 노동은 사랑해 혹은 진심이야 하는 뜻을 전하는 손짓 신호에 버금가는 의사 표현이었다."<sup>1</sup> 모든 표현이 고유한 질량으로 전해지는 시대였다. 겪어본 적 없는 이 시대를 그리워하면서, 오늘의 말과 글이 지닌 무게를 가늠해 본다. 우리의 몸에서 떠나 허공에 감도는 언어들. 잠시 그로부터 멀어질 때, 그러니까 말과 글로 전해지지 않는 것들을 붙잡을 때에 마침내 감각하게 되는 것이 있다. 유리는 말의 무능을 탓하기보다 말과 말 사이를 잇는 짧은 간격의 침묵을 가만히 들여다본다. 침묵의 시대가 그랬듯, 그의 회화는 삶을 이루는 풍경과 언어의 경계를 흐린다. 또렷이 쥐어진 말 사이로 새어 나가는 말들, 어룽거리는 단어와 문장들은 유리의 그림 위에서 간신히 연결된다.

이런 연유에서 전시 《느슨히 껴안고 단단히 풀기》는 모호한 정경으로 가득하다. 유리는 문자로 고정된 글과 이미 전해진 말보다 고스란히 남지 않고 끊임없이 흐르는 것들에 관심을 둔다. 이를테면 지금도 한 글자에서 다음 글자 위로 지나가는 시간, 갈수록 흐릿하고 어렴풋해지는 기억, 이것과 저것, 당신과 나 사이의 관계와 같은 것. 이를 그림으로 서술하는 일은 시각 매체로서 회화가 지닌 함축적인 언어를 소화해내는 과정에 다름 아니다. 기의로부터 떨어져 나와 부유하는 기표들의 집합은 그림 안에서 그들만의 기호체계와 뉘앙스를 형성한다. 네 개의 칸으로 구획된 &lt;잠깐 스쳐지나간 죽음에게&gt;에서 사물과 풍경은 서로의 관계, 실재하는 대상과의 필연적인 관계를 상실한 채 의미의 생성을 지연시킨다.

그림에 붙여진 제목은 다시금 언어로 돌아가 텍스트와 화면 속 이미지의 틈을 상기시키기도 한다. 제목에는 유독 '무게'와 관련된 단어가 자주 등장하는데, '어떤 사건들의 무게'나 '가벼운 위로', '무거운 낱말'과 같은 것이 그렇다. 수식과 별개로 유리의 그림은 어쩐지 한결같이 무거운 그림일 것만 같다. 말이 짊어지지 못한 것들을 대신 짊어지고자 자처하는 그림이기 때문이다. 그러나 이미지와 텍스트 간의 성근 연결은 언제든 비집고 들어오거나 빠져 나갈 수 있는 틈을 마련해 놓는다. 이러한 틈을 시각화한 상징적인 소재로서 '주변시'<sup>2</sup>는 경계에 있는 것들을 주시하는 작가의 태도에 비유된다(&lt;시선이 닿지 않는 곳을 응시하는 태도로&gt;). 초점에서 빗겨 나가 희미한 형상은 그림의 전면에 등장함으로써 새로운 지위와 시선을 획득한다.

한편 책은 물성을 획득한 언어로, 유리의 회화와 가장 가까운 형태를 지닌 사물일 것이다. 우리의 말들은 책이라는 종이 묶음을 통해 침묵의 시대에서 오늘날에 이르는 이야기를 전할 수 있었다. 그렇다면 책에 담지 못한 이야기, 차마 적지 못한 말들은 어디로 갈까? 책을 닮은 유리의 그림은 이런 물음에서 시작한다. 그가 아무렇게나 펼쳐 든 책의 낱장은 마침표 없는 문장처럼 하나의 기다란 그림으로 이어진다. 전시와 동명의 제목을 가진 그림에서, 사물은 말의 내용, 즉 책 속의 텍스트 자체보다 소리 내어 읽는 말소리를 닮아 간다. 높낮이가 다른 파동 안에서 밤의 조도를 띤 낱개의 사물은 서로를 &lt;느슨히 껴안고 단단히 풀기&gt;에 이른다. 이 약한 연결은 밤빛이 파고든 사물의 작은 틈새, 이름 부를 수 없이 조용한 침묵 사이로 뭉근히 지속될 테다.

'아무 말도 없이 잠잠히 있는 상태'로서의 침묵과 '해가 진 뒤 어두워진 때'로서의 밤에는 어딘가 비슷한 구석이 있다. 모두 말과 낮 바깥으로 지나가는 일시적인 상태이자 시간이라는 점에서 그렇다. 유리의 그림이 침묵과 밤의 시간에 가 닿고자 하는 것은 영원하지 못하고 잠시 머무르는 것들을 사랑하는 까닭이다. 그의 그림에 담긴 사물의 생은 아마 우리의 시간 보다 길게 주어질 것이다. 이 사실이 왠지 모종의 위안을 준다.

사물들의 고요한 질서 사이에서, 침묵과 밤을 몰아내지 않은 채 그려진 그림이 있다. 말과 빛 없이도 어떻게든 전해지는 그림이다.</div>
<div style="white-space:pre-line;font-size:0.85em;margin-top:2.5em;"><sup>1</sup> 니콜 크라우스, 민은영 역, 『사랑의 역사』, 문학동네, 2020, p.111.
<sup>2</sup> 주변시란 시야의 주변부에 대한 시력을 뜻한다. 중심부보다 시력이 나쁘고 색각도 약하지만 약한 빛이나 움직임을 보는 힘은 강하다. 표준국어대사전.</div>`,
  'upandcoming-text-html': `<div style="white-space:pre-line;">월간미술 2024년 2월호 [UP-AND-COMING ARTISTS]

김소정 (월간미술 기자)


&lt;언어로 부름받지 못한 존재에게 보내는 시&gt;

우리는 모두 그런 경험을 해보았을 것이다. 예사로 쓰이는 단어 하나가 갑자기 낯설어지던 오묘한 경험을, 그덕에 평범한 일상에 무심히 놓인, 그 단어가 지칭하는 대상이 순식간에 방안의 코끼리만한 비중으로 '시뮬라시옹' 되는 현장을 목격한 경험을 말이다. 사회적 약속으로의 언어는 표준의 규칙, 예외의 규정, 쓰임의 범주 등 각종 규범으로 점철되어 있다. 보이는 것을 지칭하고 보이지 않는 대상을 상상하거나 사고 체계를 수립하고 현상을 정의하며 타자와 소통하는 인간의 모든 사회화 행위는 언어라는 재료에서 비롯되고 또 진화해 왔다.

여기, 그와 같은 견고한 세계에 귀속되지 않는 모호한 존재들이 있다. 작가 유리는 제도화된 언어로 명명할 수 없는 형상, 추상의 사고 혹은 난해한 감정과 같은, 실재와 현존 사이에서 숨바꼭질하는 대상을 과감히 화면으로 불러 냈다. 일상의 파편들로 이뤄진 이들은 〈미완의 교차점>(2023)에 모여 저마다의 세계를 모색하거나 <아주 느슨한 시>(2023)의 그로테스크한 시상을 구성하거나 <깃털과 낙엽의 시간>(2023)을 묵묵히 견디는 모습을 보여 준다. 그리고 작가는 언어 경계 바깥에 놓인 이들에게 각별한 애정을 쏟으며, "언어의 틈새"라고 표현한 시공간으로 보는 이를 끌어당긴다.
예중과 예고를 거쳐 국내 미술대학에 진학한 유리는 진작 그림 그리는 사람으로 살기로 작정했지만 작업과 자아 사이에서 지독한 혼란을 겪었다. 그림을 감정의 해소 장치로 여기며 "토해내는" 작업을 하다가 불현듯 독일로 도망치듯 떠나 1년간 언어 공부에 몰두했다. 그곳에서 작가는 새로운 자극을 받으며 나름의 작업을 지속할 수 있었고, 무엇보다 외국어를 사용하면서 언어와 실체간의 (비)합리적인 관계에 주목하게 됐다. 이는 사용하는 언어가 화자의 정체성을 좌우하는 방식을 맛본 개인의 체험에서 부터, 한 특정한 언어만이 지시할 수 있는 대상을 둘러싼 사회문화적인 문제까지를 아우르는 것이었다.

그럼에도 언어의 숨겨진 이면을 드러내고자 하는 작가의 작업은 그 의도만큼 선언적인 성격을 띠지 않는다. 애초에 "다만 하나의 몸짓에 지나지 않"은 대상들은 화면 위에서도 여전히 적당한 이름을 갖지 못한 것으로 보이는데<sup>1</sup>, 정작 모호한 현 상황을 크게 개의치 않는 모습으로 비치고 있다. 물체나 인체, 또는 그 중간의 형태를 띠고 있는 대상은 그간 언어의 역할이 과대평가 되었음을 고하기라도 하듯이 당당하기까지 하다. <하늘과 가장 먼 하늘에서〉(2023)에는 인간과 영적 존재의 변천 과정인 듯한 6개의 장면이 연출된다. 각 화면을 가득 채운 나무토막과 같은 인체 형상은 특정한 상황에 놓인 듯 여러 자세를 취하고 있는데, 사건의 시간적 전개나 인과관계를 탈피한 무정형의 존재 그대로의 모습을 적나라하게 드러낸다.
이처럼 말로 표현할 수 없는 소재와 독특하게 무거운 색채로 화면을 구성하여 혼란을 겪는 관람자의 몰입을 유도하는 한편, 작가는 작품의 제목을 통해 감상의 실마리를 제공한다. '없는 단어로 만든 문장'이나 '중간의 사물들'과 같은 작품명은 비언어의 세계를 발현시키려는 작가의 의도가 개입한 결과다. 그중에서도 <아주 느슨한 시>는 작품 제목을 통해 직접적으로 운율과 행간의 호흡까지 염두에 두고 그림을 읽을 것을 요구한다. 단어와 문장의 논리적 결합보다 맥락을 파악하고 분위기를 전달할 수 있는 시처럼, 관람객은 상상과 연상을 근간으로 작가가 변주한 시각언어를 해석하게 되는 것이다.

유리는 언어가 온 세계에 편재한다고 해도, 역사와 시간과 세대가 지남에 따라 무한증식하며 생존한다고 해도, 언어가 건드릴 수 없는 사각지대는 영원히 신비한 영역으로 남을 것을 믿는다. 그리하여 언어가 모방하는 세계를 잠시라도 탈피할 수 있는 그의 거처에서 우리는 더욱 자유롭게 '낯선' 단어들의 우회를 즐길 수 있다.</div>
<div style="white-space:pre-line;font-size:0.85em;margin-top:1em;"><sup>1</sup> 김춘수의 『꽃』 은 이름이 불리고 존재가 인식될 때 비로소 실존의 위상을 획득하는 대상(인간)을 다룬다.</div>`,
  'review-text': `《투명한 고리》 전시 리뷰


김해서(작가)

<여기, 우리가 만나는 곳>



나에겐 흰 개가 있었다. 꼬리가 길고 날렵했으며, 햇빛을 받을 때마다 짙은 눈은 콜라처럼 톡 쏘는 갈색을 띠곤 했다. 귀가 쫑긋한 진도믹스. 이름은 흥구.

오래전에 나는 녀석을 떠나보냈으나, 순천 외서면 대숲이 많은 엄마의 고향 마을로 들어서는 순간마다 되살아나 짖어대는 녀석을 잠재우느라 지금도 속으로 '쉿-'을 외곤 한다. 그렇다. 흥구는 외할아버지가 키우는 개였으므로 엄밀히 말하면 나는 그 개를 가진 적 없다. 흥구에게 나는 어쩌다 한 번 마주하는 애, 오묘하지만 역겨운 데가 있는 도시 냄새를 풍기는 계집이었을 것이다. 심드렁한 표정으로 인간들 사이에 있다가 가끔 다가와서 머리와 콧등을 쓰다듬고 돌아서는, 녀석이 후한 마음으로 손바닥을 핥아주기라도 하면 눈썹을 꿈틀거리고 질색하는 알 수 없는 계집 말이다.

외할아버지가 암 진단 한 달 만에 돌아가시고, 얼마 되지 않아 녀석은 자취를 감췄다. 외할머니의 독단적인 결정으로, 개는 다른 이의 손에 넘겨졌다. 당신 반려의 죽음만큼이나 마음을 어지럽히는 게 반려가 애지중지한 개였던 모양이다.흥구는 노견에 속했으므로, 나는 엄마와 엄마 형제들 사이에서 스치는 흥구의 미래를 들으며('아버지 옆에 묻어주자.', '산에 뿌려 주는 게 좋지 않을까.'), 주인을 잃은 개가 어떤 표정을 짓는지 측은지심을 안고 관찰하곤 했는데, 그랬는데, 개는 그토록 갑자기 사라지고 말았다. 사실을 알았을 때 모두가 실색했다. 외할머니의 차가운 표정에 누구도 선뜻 입을 뗄 수는 없었기에, 흥구를 걱정하고 그리워하는 마음을 비추는 자는 이후에도 나타나지 않았다.

나 역시 그랬다. 이 가족의 비정함에 놀랐으나 어디까지나 흥구는 외할아버지의 개였으니 외할머니의 소관이고, 나와는 명절이나 가족 행사마다 마주친 게 전부였으니까. 중요한 상실은⋯ 아니다.

그래서 이해되지 않았다. 그 개의 환영과 환청을 만날 때마다.

개가 떠나기 몇 주 전, 어른들은 흥구의 목줄을 자주 풀어주며 마당을 노닐게 해주었다. 기쁜 개의 발걸음은 시멘트 마당 위에서 '토도도도도' 소리를 내며 멈추지 않았다. 그리고 나는 들었다. 외할아버지 투병 기간에 모두가 피난 가듯 짐을 바리바리 싸 병원으로 떠났을 때, 흥구는 할아버지가 평소보다 듬뿍 주고 간 사료를 조금씩 나눠 먹은 덕에 굶어 죽지 않고 버틸 수 있었다고. 삼촌들 중 한 사람이 2주만에 방문했을 때도 녀석은 사료를 다 먹지 않고 남겨두기까지 했다. 그것을 끝으로, 흥구에겐 또다시 긴 기다림이 있었고 금방 돌아오겠다던 주인이 다시 대문을 열고 들어오는 일은 없었다.

외할아버지의 유품과 유산이 정리되는 과정 속에서, 나는 귀를 세웠다. 어른들의 이야기에서 다시 '흥구'가 등장하지 않을까 기다렸던 것 같다. 할아버지는 흥구를 아꼈으니까. 그러나 내가 아는 것은 여기까지다.

외할머니가 자식들은 물리고 내 아빠인 사위 한 명만을 밭에 데리고 가, 당신 남편이 평소 아끼던 옷가지와 소지품 몇 가지를 태운 날, 사고로 세상을 뜬 첫째 아들과 남편 이름을 부르짖으며 무너졌다는 얘기를 들었던 날, 장례식장에서도 곡소리 없이 멍하게만 있던 당신 얼굴을 떠올림과 동시에 나는 더 이상 그 개의 사정에 대해 의문을 품지 않았다.

이제 나는 흥구를, 조용히 추적하고 있다. 아니, 정확히는 흥구의 자취를. 시간이 흐르며 흥구의 전체성은 흐려지고 일부만 기억이 난다. 마치 내가 외할아버지를 그릴 때 두툼한 손과 금니 빛나는 미소, 밀짚모자를 떠올리는 것처럼. 그 개의 사뿐거리는 발재간에 맞춰 울리던 발톱소리가 마당 너머 대숲의 나무끼리 부딪히는 소리와 분간되지 않는다. 시골마을 개들이 낯선 자동차의 등장에 떼 지어 짖을 때마다 그 개를 떠올리지만, 녀석은 우리가 '우리'라는 것을 인지하면 짖기를 멈췄으므로 끊이지 않는 소음 속에서 내 기분은 혼자만의 것이 됐다.


*


그리고 2025년 12월, 유리 작가의 전시 《투명한 고리 : Shapeless Loop》를 보았다. 어째서인지 이 전시는 갈 데 없는 내 마음, 죄책감과 허무함 그리고 염치없는 그리움을 물결치게 만들었다. 아마도 그 시작은 작품 〈멀고 검은 자국〉의 짐승 형상 때문이었을 것이다. 망아지인지 개인지 알 수 없는 네발 달린 짐승 형상은 내 안의 개, 뚜렷한 자국을 건드렸다. 나의 흰 개는 이제 흰 개가 아닐지도 모른다. 무엇으로도 빗대어 설명할 수 없는 비정형의 개가 되어 있을 것이다. 그것과 나의 관계는 스틱스강을 사이에 두고 어긋나 버리고 말았지만, 개는 이어지는 삶 속에 추상적인 레이어로 내려앉는다. 그리고 레이어가 내 차원에 드리워질 때마다 우린 만나는 것이다. 때론 발소리로, 때론 울음소리로, 때론 '착각'이나 '환상'으로밖에 해명할 수 없는 어떤 연결로.

입체 작품 〈상실의 가능성과 영원의 염원〉은 아마도 그 환상적인 접촉을 대변하는 가장 완벽한 '책'이다. 투명 레진과 나무 블럭으로 빚어진 책의 페이지를 나는 분명히 넘기며 읽었다고 믿는다. 탁색의 물감으로 덧입혀진 나무 책 속 짐승은 투명한 레진 북 안에서 빨간 실과 천으로 해체된다. 물속에서 분해되는 심장과도 같이 선연함을 뿜으며 선과 면으로 분리된 그것. 이제 공기에 산화되지 않으니, 진공 상태로 영원히 고정될 '몸이었던' 것. 이 투명한 책이 기어코 말하는 것은, 말하지 않음으로써 건넬 수 있는 신호가 있음을 알아달라는 거라고, 그렇게 느꼈다면 우스울까.

나와 흰 개, 나와 흰 개였던 것, 나와 더는 흰 개 아닌 것 사이에도 한 줄의 실이 놓여 있다면, 지금의 나는 연결된 실을 톡톡 두드려 볼 용기가 있을 것이다. 돌아오는 기척이 느껴지지 않다 하더라도.

이후에 만난 〈긴 꼬리 책〉과 〈긴 꼬리 책 : 떨어져 나온 문장(1~14)〉의 이미지들은 삶과 죽음 사이 불가항력으로 부여된 서사를 보여주되, 혼탁한 과거와 불분명한 미래를 잇고자 하는 의지를 내는 듯 접는 듯 혼란스러운 일면으로 다가왔다. 느낌표와 물음표, 반점과 온점이 한 데 뒤섞인, '어떤 말 하나를 꺼내기 위해 지나온 모든 삶을 설명해야 하는 자'가 찍은 구두점들의 집합처럼. 아티스트북 연작을 시작했다는 2023년부터 지금에 이르기까지 유리 작가가 밟고 온 찰나들이 이러했을까. 그리고 우리, 살아남은 자가 머무는 세계의 시간이 정말로 그렇게 흐르고 있는 것일까.

나는 무시무시한 비밀을 목격한 사람 마냥 달뜬 두려움에 젖어, 전시장 입구에 걸린 〈투명한 고리〉를 다시 한번 들여다보았다. 생과 사, 두 개의 꽃은 쌍둥이꽃이라 봐도 무방할 정도로 닮았다. 두 송이 다 싱싱해 보이기도 하고 두 송이 다 어딘가 시들해 보이기도 한다. 다른 방향으로 뻗어가며 성장하는 듯하지만, 결국 하나의 리본으로 묶인 처지. '투명한 고리'는 바로 저 작은 리본만큼 강력하면서도 연약한 힘이다.


*


외할아버지가 돌아가신 지 10년도 더 지났고, 이제 순천 시골집에 흰 개 대신 노란 고양이들이 산다. 더는 어떤 것에도 정 붙이기 싫다던 외할머니는 녀석들에게 마당과 뒤뜰만은 허락해 줬다. 가끔 먹을 것도 던져 준다. 덕분에 그 노란 고양이 가문은 3대째 터를 잡고 호의호식하고 있다. 처음엔 경계심이 강한 녀석들이었는데, 세대를 거듭할수록 사람 손도 탄다. 엄마와 엄마 형제들도 전용 사료를 틈틈이 보내는 것으로 보아, 아마도 외할머니는 좋든 싫든 야옹거리는 성가신 소리를 받아들여야 할 것이다.

나는 이번에도 먼 도시 출신 이방인으로서 아주 가끔 그곳에 들러 고양이들을 예뻐해 주고 있다. 그리고 나의 개를 생각한다. 고양이의 호박빛 눈동자를 보면서 콜라색 눈을, 흰 속눈썹을, 긴 따뜻한 혀를, 검은 발바닥을, 날 보며 흔들던 꼬리를.




*제목은 존 버거의 저서 『여기, 우리가 만나는 곳』(열화당)에서 따온 것입니다.`,
  'lucid-text-html': `<div style="white-space:pre-wrap">《Lucid Mystery / Dart Clarity》 김세은x유리 2인전 (학고재, 2023)
전시 서문


이진명 (미술비평ᆞ미학ᆞ철학박사)




그리스의 비극 시인 에우리피데스(c. 480 – c. 406 BC)의 희곡 『박코스의 여신도들(Bacchae)』에 서 한 여인은 테베 외곽에서 벌어지고 있는 디오니소스 축제에 참여한다. 축제가 무르익으려던 차에 산에 사는 사자를 죽이는 프로그램이 거행된다. 여인은 환희로 물든 가운데 사자를 도살한 다. 사자의 사지는 절단되었으며, 모든 살은 갈기갈기 발라졌다. 그녀는 착각으로부터 깨고서야 비로소 트로피로 생각하여 들고 있던 것이 다름 아닌 아들 펜테우스(Pentheus)의 머리였음을 깨 닫게 된다. 어째서 이러한 스토리를 예술로 표현하는 것일까?

동아시아에서도 이와 비슷한 사례가 있다. 일본의 무용 중 안코쿠 부토(暗黑舞蹈)라는 아방가 르드 무용이 있다. 전후 아방가르드 무용가 타츠미 히지카타(土方巽, 1928-1986)가 창안했다고 알 려져 있다. 히지카타는 새 신부의 복장으로 춤을 추다 모든 옷을 벗고 금박을 입힌 팔루스 (phallus)를 꺼낸다. 수탉을 죽이는가 하면 손발이 묶인 채 공중으로 부양되어 어둠으로 사라지기 도 한다. 인간의 이성과 합리적 의식으로는 추론될 수 없거니와 예측할 수조차 없는 이 연극의 부조리한 상황에 대하여 백남준(白南準, 1932-2006)은 다음과 같이 묘사한 적이 있다.

"30 년이 지난 지금까지도 그것이 무엇이었는지 정확히 표현하기 힘들다. 그러나 당시의 기분은 상당히 오리지널한 것이었으며 신선했다. ∙∙∙ 동아시아 정신의 심층적이고도 어두운 연원에 깊이 감화되었다. 나는 불가해하고 미스터리하며 심원하고도 두려우며 또 고요한 상황에서의 모든 느낌을 합쳐서 사용하는 독일어 'unheimlich'라는 단어를 사용했다."<sup>1</sup>

이 둘의 예시는, 인간이 갖고 있는 문화적 행위의 심연에 흐르고 있는, 가령 무의식이나 불가해한 감정, 미스터리한 정서에 관한 이야기이다. 그리고 이러한 상황이 촉발하는 두렵고도 으스스한 현 실에 즈음해서, 우리는 어째서 그러한 정서를 갖고 있는지, 그것들이 도대체 무엇이지 끝없이 알 고자 하지만 끝내 좌절하게 된다. 그리고 도전은 지속된다. 우리의 젊은 두 예술가도 마찬가지이다.

김세은 작가와 유리 작가는 현실에서 벌어지는 불가해한 현상을 회화로 표현하고 있다. 단순 히 현실에서 일어나는, 말로 설명하기 어려운 것을 회화로 표현했다고 해서, 그들 세계가 공통된 것은 아니다. 의지의 차원이 남들과 다르다.

형상에서 형상의 제거, 형상의 제거에서 회화의 본질을 묻는 과정, 본질 물음에서 다시 형상 과의 재결합을 추구한 회화사의 노선을 생각할 때, 김세은 작가는 아주 특별하다. 근경과 원경을 하나로 합치고, 과거와 현재 풍경의 시간차를 하나로 합치거나 비우고 편집하는 과정을 통해서, 영원한 것 없이 변화무쌍하게 돌아가는 우리의 현실을 새로운 시각언어로 발언하고 있을 뿐만 아니라, 그간의 회화사에 존재하지 않았던 형식을 새롭게 구축하고 있으니 실로 놀라운 일이 아닐 수 없다.

영국의 시인 T. S. 엘리어트(T. S. Elliot, 1888-1965)는 그의 『네 개의 사중주(Four Quartets)』 중 에서 2 부작인 「이스트 코커(East Coker)」에서 다음과 같이 노래한다.

"나는 태어나면서 죽어간다. 끊임없이 가옥들은 세워지고 내려앉고 무너지고 확장되고 이전되고 복원되며, 혹은 그 자리에 빈터나 공장이나 우회로가 생긴다. 오래된 석재는 새로운 건물로, 오래된 목재는 불 로, 오래된 불은 재로, 그리고 재는 흙으로 돌아간다. 이미 살, 모피와 배설물, 사람과 짐승의 뼈, 밀짚과 잎인 것을. 가옥들은 살면서 죽는다. 건축을 위한 때가, 생존과 경쟁을 위한 때가, 생존과 생성에 알맞은 때가 있다. 그리고 바람은 느슨한 유리창을 깨뜨리고, 들쥐는 종종걸음으로 징두리 벽 판을 흔들고, 무 언의 금언을 새겨 넣은 벽걸이를 흔드는 때가 있다."<sup>2</sup>

김세은의 회화는 영원히 변화하는, 생성되고 소멸되다 다시 그 과정을 영원히 거듭하는 과정을 그림에 구성한다. 연기(緣起)는 'rising'이라고 번역된다. 사물은 다른 사물이나 시간의 계기, 원인 등과 관련하여 일어난다는 뜻이다. 한 번 일어난 사물은 다른 사물이나 사건, 시간의 계기 등과 맞물려 다시 사라지게 되어있다. 따라서 모든 것은 실재인 동시에 시간을 압축시키면 사실 비어 있는 것이다. 김세은 작가가 경주하는 세계가 여기에 있고, 이를 놀라운 형식으로 표명하고 있는 것이다.

그런데 나아가 생각해 볼 문제가 있다. 김세은 작가의 작품은 추상적 요소와 재현의 요소가 절묘하게 절충되어 있는 가운데 아주 순수한 사유로 구성되어 있는 것처럼 보이더라도, 작가의 사려 깊은 필선과 담대한 채색 뒤에 숨어있는 상징을 간과해서는 안 된다. 산업주의나 자본주의 와 같은 외재적 요소와 인간의 욕망이 지금의 도시풍경을 연출했고, 지금도 시시각각 변하고 있다. 따라서 우리의 삶의 형식은 옛사람들의 그것과 사뭇 다를 수밖에 없다. 작가의 작품 속에 우 리의 삶의 형식이 은연중 드러나기 때문에 우리는 김세은 작가의 세계에 감화되는 것이다. 비트겐슈타인(Ludwig Wittgenstein, 1889-1951)은 이에 관해 다음과 같이 말한 적 있다.

"언어를 상상하는 것은 삶의 형식을 상상하는 것이다."<sup>3</sup>

따라서 시각언어, 즉 회화 역시 삶의 형식이다. 비트겐슈타인은 언어에 관해 다른 차원의 이야기 도 거듭한다.

"내가 언어로 생각할 때, 내 머릿속에 언어적 표현과 나란히 '의미들'이 다시 떠오르지는 않는다. 오히려 언어 자체가 생각을 나르는 운송수단이다."<sup>4</sup>

유리 작가는 비트겐슈타인 말과는 다르게 "나의 미술은 문자로 구성되는 언어로써 채울 수 없는 언어를 다룬다."라고 말한다.<sup>5</sup> 비트겐슈타인은 언어는 생각의 운송수단이라고 말하고 있으며, 언어는 삶과 밀접히 연관되다 못해 삶 그 자체라고 주장하고 있다. 그러나 언어가 언제, 어째서 생겼는지 생각해 본다면, 우리는 비트겐슈타인의 철학보다 유리 작가의 회화세계에 보다 공감할 수 있게 된다.

인간은 태고에 실재와 그림을 구분할 수 없었다. 인간 스스로 주체로서 인식할 수 없었기 때 문이다. 당연히 대상(자연)과 나는 구분되지 않았다. 사람은 자연과 하나 되어 살았다(in-sist). 따라 서 마술과 같은 의식 속에서 살았다. 이를 파라다이스라고 부르기도 한다. 그러나 인간은 마술적 의식을 비판하기 위해서 문자를 개발했다. 문자는 사건의 전후 맥락, 시간적 의식, 원인과 결과로 사태와 사물을 생각하게 이끌어 주었다. 이때부터 사람은 자연으로부터 탈존하여(ex-sist) 자의식 을 갖게 된다. 자의식은 역사적 의식, 혹은 이성이라고도 부를 수 있다. 그러나 역사적 의식이라 는 시간의식과 이성이라는 합리적 계산으로 세계가 운영되는 것은 아니다. 우리가 알 수 없는 불 가해한 힘이 우리를 지배한다. 우리는 그 불가해한 힘을 느낄 뿐, 명확하게 알 수 없다. 0 과 1 사 이에는 무한대의 공간이 열려 있다. 우리는 단지 0 과 1 을 셀 수 있을 뿐이다. 그 사이로 들어갈 수는 없다. 우리는 태양과 지구를 볼 수 있을 뿐이다. 그 사이에 무한한 에너지가 가득 차 있는데 도 보지 못한다. 마찬가지로 우리는 언어로 사유하지만, 언어 밖에 있는 현상과 느낌, 그리고 사 상(事象)은 외면한 채 살아간다. 유리 작가는 백남준 작가가 느꼈던 'unheimlich (uncanny)'한 지점 을 회화로 표현하는 것이다.

《Lucid Mystery / Dark Clarity》는 분명해 보이지만 미스터리한 우리의 삶의 형식과 어둡기 때 문에 보이지 않지만 분명히 존재하는 사실에 대한 시각언어, 즉 회화적 세계이다. 전자는 김세은 작가의 회화가 보여주는 공간의 세계를 지시하고, 후자는 유리 작가의 회화가 보여주는 언어의 세계를 지시한다. 우리는 모두 불가해한 현실을 알고 싶어 한다. 그러나 명료하게 해결된 적은 없 다. 알고자 하는 시도만이 영원히 거듭되었을 뿐이다. 따라서 18 세기 독일 시인 고트프리트 아우 구스트 뷔르거(Gottfried August Bürger, 1747-1794)는 다음과 같이 노래했다.

"아, 현자시여. 모르는 게 없는, 배우지 않은 바가 없는, 이미 깊고도 높은 곳까지 모든 것을 생각해 낸 분이시여. 어째서, 언제, 그리고 어디에서 세계의 만물은 짝을 지었나이까? 그들은 어째서 키스하는 것 이며, 또 사랑을 나누는 것입니까? 아, 이제까지 제게 일어난 것을 말해주신, 지고한 지혜의 현자께서 이제는 어디로, 어째서, 언제, 그리고 왜 그러한 일이 그렇게 일어났는지 명확하게 말해주시길 바랍니다."<sup>6</sup>

뷔르거는 현자에게 간청한다. 지금까지 일어난 모든 사건과 삶의 의미를 알 수 없기 때문이다. 우 리는 뷔르거가 불가해한 미스터리로 충색되어 있는 삶의 비밀에 대하여 시로 표현하고 있는 현상 을 마주 보고 있다. 김세은과 유리 작가 역시 뷔르거와 마찬가지로 인류가 수천 년 동안 구축했던 회화라는 지혜에 기대어 삶의 비밀을 묻고 있는 것이다.

권정현 (기획자, 비평가)

<나의 이야기와 당신의 이야기 사이에서>


소파와 컵과 어항. 열쇠와 가위와 해바라기. 구름과 폭죽과 모래시계. 나는 조각으로 흩어진 단어들 사이에서 문장을 찾는다. 나의 시도는 번번이 실패한다. 당신은 단어 사이에 연결고리를 넣어 문장을 만들지 않는다. 당신은 단어가 문장이 됨으로써 제자리에 고정되기를 원치 않는다. 대신에 무수한 공백을 껴안은 채 그대로 존재하도록 둔다. 당신은 언어가 하나의 의미로 고정되어 영원한 가치를 담는다는 것을 믿지 않는다. 롤랑 바르트는 텍스트는 "하나의 유일한 의미를 드러내는 단어들의 행으로 이루어진 것이 아니라, 그중 어느 것도 근원적이지 않은 여러 다양한 글쓰기들이 서로 결합하며 반박하는 다차원적인 공간"이며, "수많은 문화의 온상에서 온 인용들의 짜임"이라고 말했다.¹ 당신은 의미가 가려진 대상들의 성긴 짜임을 만든다. 당신은 내가 당신의 그림에서 고정된 이야기를 읽어내기를 바라지 않는다.

나는 성기게 엮인 조각들을 마주한다. 조각들을 가늘게 잇는 연결고리를 찾는 것을 포기한다. 나는 조각들을 새롭게 배열하고 새롭게 읽어낸다. 단어와 단어 사이의 공백을 메꾸고 새로운 연결고리를 만들어준다. 바르트는 '읽혀지는(le lisible/readerly) 텍스트'와 '씌어지는(le scriptible/writerly) 텍스트'를 구분한다. '읽혀지는 텍스트'는 특정 의미와 지시 대상을 주장함으로써 독자가 그 의미를 읽어내게 하는 닫힌 글이다. 반면 '씌어지는 텍스트'는 독자로 하여금 의미를 산출하도록 한다. "씌어지는 텍스트는 영속적인 현재이며, 이 현재 위에는 (현재를 과거로 숙명적으로 변모시키는) 그 어떠한 귀결적인 말도 머무를 수 없다."² 바르트는 씌어지는 텍스트를 즐기는 독자는 텍스트를 하나의 해석으로 고정하지 않고, 텍스트를 현재화하고 매 순간 혁신한다고 한다. 나는 조각과 조각을 맞춰 새로운 이야기를 만든다. 당신은 사각형의 캔버스 안에 또 다시 사각형의 액자와 액자와 액자를 넣었다. 나는 액자와 액자와 액자의 순서를 뒤바꾸며 이야기를 만든다. 하나의 이야기를 만들고, 다시 새로운 이야기를 만든다.

당신은 완결된 이야기는 만들지 않았지만, 당신의 조각들을 완전한 무의미로 던져 놓지는 않는다. 당신은 당신의 이야기를 흔적처럼 남긴다. 당신은 파편의 틈새마다 당신의 감정을 끼워 넣는다. 평범해 보이는 사물들 사이로 표정을 알 수 없어 쓸쓸한 얼굴과 축 처진 화초가 비집고 앉아 있다. 문을 열지 못하는 열쇠, 자를 수 없는 가위, 바닥을 향한 해바라기, 서있지 못하고 누워있는 의자. 그런 것들이, 어딘지 부족하고 이상한 것들이 곳곳에 아무렇지 않은 척 태연하게 놓여있다. 무언가 모자라고 채워지지 않는 모양이 슬픈 마음을 닮았다. 그러한 마음을 닮은 선들은 때로는 거칠고 무질서하고 혼란스럽다. 앞의 선을 지우거나 그에 덧붙거나 혹은 아예 흐려지면서 당신은 당신의 마음을 슬며시 남긴다. 당신이 흔적처럼 남겨놓은 감정들 사이로 당신의 이야기와 나의 이야기는 겹치고 어긋난다. 당신이 모은 풍경과 감정이 나의 기억과 순간 만나고 헤어진다. 당신은 당신의 슬픔이 무엇인지 나에게 이야기하지 않는다. 대신 슬픔의 모양을 전달하고, 나는 내가 가진 감정의 모양 중에서 그와 비슷한 것을 꺼내어 본다. 당신은 내가 당신의 슬픔을 온전히 이해하리라고 기대하지 않는다. 아니, 당신이 당신의 슬픔을 온전히 전달할 수 있다고 믿지 않는다. 그러한 믿음이 오만하고 지나치다고 생각한다. 당신은 당신의 슬픔을 온전하게 전하는 것 대신에 내가 당신의 슬픔과 닮은 마음을 찾아내기를 기대한다. 당신이 꺼내놓은 조각과 내 마음의 조각을 맞춰본다. 그렇게 당신의 마음과 나의 마음이 만나기를 바랄 뿐이다.






¹ 롤랑 바르트, 김희영 역, 『텍스트의 즐거움』, 동문선, 1997, 32쪽.
² 롤랑 바르트, 김웅권 역, 『S/Z』, 동문선, 2006, 13쪽.`,
  'book-text': `월간미술 2025년 8월호 [아티스트북 특집] 작가의 글


유리 (시각예술가)


<읽을 수 없는 문장들을 엮어내는 일>


아티스트북 작업의 근원을 찾아가 보자면 아주 어릴 적 나의 비뚤어진 욕망부터 들춰보아야 한다. 어린 나이부터 책의 형태를 가진 종이 뭉치에 대한 욕심이 많았다. 특히 마음에 드는 형태의 노트를 온전히 마음에 드는 상태로 유지하는 것에 집착했다. 늘 새 노트에 욕심을 냈고 그 안에는 꼭 나의 글과 그림을 얹었는데, 내 손의 흔적이 혹여나 그 종이 뭉치의 미감을 조금이라도 해치게 되면 참지 못하고 그 즉시 망친 페이지를 찢어버렸다. 그러면 또 찢어진 흔적으로 인해 노트의 완결성에 흠이 가게 되고, 그렇게 그 불쌍한 노트는 내 눈 밖에 나 어딘가의 구석에서 영원히 잠들게 되는 것이다. 이 연유로 학창 시절 동안 부모님께 많이 혼났던 기억이 있다.

유치원 때는 친구의 다이어리를 욕심내어 몰래 집으로 가지고 왔던 적도 있다. 부모님께 발각되어 경찰서 앞까지 끌려가 훈육을 받고 돌아온 기억은 평생의 웃음거리다. 다행히도 따끔한 교육으로 바로 손을 씻었지만, 책의 형태를 가진 존재들에 대한 욕망은 쉽게 사그라들지 않았던 모양이다. 먼 훗날 성인이 되어서도 여전히 노트와 책에 욕심을 부리면서 아트북을 수집하고, 다이어리와 전시방명록을 수제본으로 제작하고 있다. 심지어 북바인딩 클래스를 직접 개설하여 작업실과 외부에서 제책 방법들을 알려주는 일도 하게 되었다. 결국에는 작업으로까지 책 매체를 다루게 되었으니, 낱장들이 모여 만드는 이 덩어리에 대한 사랑은 끊이지 않고 쭉 이어졌다고 할 수 있겠다.

나를 이렇게까지 매료되게 만든 책의 힘은 뭘까. (여기서 책이란 일반적인 도서 혹은 책의 형태로 제책 되어 묶여있는 노트 등을 포괄적으로 지칭한다.) 흔히 '책'이라고 일컬어지는 매체의 가장 흔한 형태를 떠올려보면, 아주 얇은 낱장의 종이들이 켜켜이 쌓여 꽤나 단단한 한 덩어리를 이룬 모양새다. 아티스트북, 즉 책 매체에 대한 나의 도취는 이 결집되는 특성에서 나오는 특유의 덩어리감에 대한 관심에서 시작되었던 것 같다. 한 장 한 장 아주 나약해 보이는 종이들이 여러 겹 모이고 쌓여서 만들어지는 단단한 뭉치의 힘과 모양새, 한 덩어리를 이루게끔 하는 제책의 방식 혹은 그것들을 감싸고 있는 겉 피부 등 책이 주는 시각적 자극에 대하여 엄청난 매력과 흥미로움을 느낀다.

형태적 측면에 대한 기본적인 호감에 더하여, 종이들이 물리적으로 엮이고 책 속의 내용들이 개념적으로 묶이게 되는 이 '연결성'의 특징은 회화 작가로서 아티스트북을 작업적 매체로 도입하게 된 결정적인 요인이었다. 회화 작업을 구상할 때 여러 개의 이미지를 동시에 떠올리거나, 연속적으로 이미지를 상상하고 나열하는 것을 좋아하는데 그것들을 한 데 모으는 방식이 필요했고, 또 그들이 함께 모여 존재할 때만 가질 수 있는 의미들을 풀어내기 위해 책이라는 매체를 자연스럽게 끌어오게 되었다. 하나의 화면 안에서 종결되지 않는 이야기들을 밖으로 이어나가고, 연속성을 가지면서도 하나의 공통적인 구조로 묶어 줄 수 있는 매체로서 아티스트북 작업이 기능하고 있다.

그렇다면 아티스트북은 내게 어떤 의미로 작동하는가. 아주 명확하게 구분 짓기는 어렵지만 "아트북"이 넓은 범위의 아트 컨텐츠를 다루는 포괄적 의미의 '책'이라면, "아티스트북"은 제작/유통/판매 등 책과 관련된 모든 과정에 작가의 개입이 크게 작용하고 작가적 태도가 가장 중심이 되는 책 매체의 '아트'라고 해석하고 있다. 그래서 나의 아티스트북 작업에서는 책 매체를 다루되 기존의 형태와 개념을 그대로 차용하기보다는 작가적 해석을 통해 또 다른 책 형태와 개념을 만들어내는 태도를 중시하고, 직접 핸드바인딩으로 제책 하여 책을 만드는 것을 추구하며 전시 작품으로서의 가치를 우선시하고 있다.

책이 가지는 형태와 상징성을 해석하고 활용하는 방식은 아티스트북 작업이 가지는 특징이 된다. 책 속에는 무수한 관념과 이야기들이 다양한 문자로 새겨져 종이 위를 횡단하고, 글이 새겨진 각각의 페이지들은 차곡차곡 쌓여 일정 부피만큼 공간을 종단한다. 인류가 쌓아온 방대한 정보들이 문자라는 언어로써 집합되어 책이라는 덩어리를 만들어내는 것이다. 언어의 집합체라는 이 중요하고 고유한 책의 상징성을 역설적으로 활용하여, 나의 아티스트북 작업 속에는 해석 가능한 문자언어를 배제하고 명확히 정의할 수 없는 이미지들을 시각언어로서 등장시킨다. 그렇게 읽을 수 없는 책을 만들어서 언어와 시각적 이미지 사이의 관계성 혹은 간극에 대해 실험해 보는 작업을 진행하고 있다.

아주 어릴 때 여러 종류의 종이들을 자르고 모으고 나름의 방식으로 묶어서 엄마의 생신 날 선물한 적이 있는데, 이것을 생애 첫 아티스트북 작업이라고 할 수 있을까? 본격적으로 'Handcrafted artist's book' 이라는 이름을 붙여 만든 초기 작업들은 여러 장의 그림을 모아 인쇄하고 그것들을 손으로 묶어 만든 책의 형태로, 주로 독립서점에 유통하여 판매하는 방식이었다. 20부 정도의 에디션을 수작업으로 만들고, 카페나 서점에서 책을 전시하고 판매하거나 아트북페어와 아트마켓에서 직접 작업을 소개하기도 하였다. 이 당시에는 '책'이라는 매체성 자체에 몰입하여 책이 유통되고 보여지는 방식을 스스로 한정 짓거나 회화 작업과는 다른 맥락에 놓인 것으로 해석했던 것 같다. 서점과 북페어에서의 아티스트북은 출판물로서 취급되며 여러 측면에서의 한계와 아쉬움을 마주했고, 그 과정 속에서 책의 형태를 닮은 작업이라고 해서 책이라는 이름 안에만 가둬놓지 않고 하나의 작업적 맥락 속에서 개별적인 작품으로 존재하게 할 수 있는 방법에 대한 고민을 시작했다.

그렇게 아티스트북은 출판물로서의 인쇄나 유통의 구조에서 보다 자유로워졌고, 그 존재로서 하나의 작업이 되었다. 매대에 조용히 놓여있는 책 보다 전시장에서 뛰어노는 책의 모습을 보고 싶어 이 매체를 전시장에 끌어들이기로 했다. 회화 작업과 병행하면서 아티스트북 작업이 가지는 당위성과 매력을 함께 보여주고 싶어, 책 작업의 모양새, 개념과 더불어 그것이 놓이고 설치되는 방식, 전시장에서 다른 작업들과 어우러지는 형식 등 더 넓은 범위의 것들을 생각해 보게 되었다. 그 시작점에 있는 <더미 (Dummy)>라는 아티스트북은 2020년 시작되어 시리즈로 제작되고 있는 작업으로, 아티스트북이 하나의 작업으로 발전하는 초기과정에서 중요한 역할을 한 작업이다. '더미'는 많은 물건이 모여 쌓인 큰 덩어리라는 뜻도 되고, 'Dummy book'은 가제본 한 책을 의미하기도 한다. <더미>는 책의 형태를 모방하고 있지만 유화지에 그린 유화 그림들을 쌓고 엮어 만든 읽을 수 없는 책으로, 그림 원본을 손으로 엮어 책으로 만듦으로써 복제가능성은 사라지고 낱장의 회화 작업들이 모여 또 다른 덩어리가 되는 것, 읽을 수 있지만 읽을 수 없는 책이 되는 것, 관람객이 직접 책을 넘겨보며 자연스레 그림과 접촉하게 되는 것, 입체와 회화 사이에 존재하는 작업이 되는 것, 이 지점들을 관찰하며 추후 이어질 작업들을 위한 실마리를 얻었다.

2023년 을지로의 포켓테일즈에서 진행된 전시 <Double Bind>는 '아티스트북 프로젝트'라는 이름을 붙일 만큼 책 작업의 여정에 있어서 중요한 전시였는데, 그간 진행했던 책 매체의 작업들을 갈무리하며 앞으로 어떠한 방식으로 나아갈지에 대한 고민을 보여준 프로젝트였다. 특히 '책이란 무엇인가'라는 근원적인 질문에서부터 다시 하나하나 톺아보며 책이 가지는 주요 특성 중 하나인 '연결성'을 견고히 하거나 느슨히 풀어보며 책에 대한 작업들을 펼쳐보았다. 얇은 종이 위에 가벼이 글자가 새겨진 책이 아닌 무거운 단어들이 침잠한 듯 나무에 깊게 이미지가 새겨진 책 <무거운 낱말들>, 보는 이가 관 형태의 상자에 입체 오브제로 이루어진 페이지들을 차곡차곡 담아냄으로써 바인딩이 되는 책 <작은 관>, 혹은 책등이 묶이지 않고 해체되어 나열된 책 <절반의 기억> 등 '책'이라는 고정적인 관념에서 벗어나 매체적 경계를 흐려보는 실험을 하였다. 그 이후로도 재료적으로도, 형태적으로도, 또는 설치의 방식에 있어서도 다양한 시도들을 해보며 확장된 개념의 책 작업으로 나아가는 중에 있다.

그림들을 실과 바늘로 꿰매거나 풀로 붙이고 엮어 책을 만들고 있으면 이미지와 매체를 이어주고, 나의 내부와 외부를 연결 짓고, 결국에는 나와 타인을 혹은 세상을 연결 짓는 듯한 기분이 든다. 물리적인 엮음의 행위로부터 비가시적인 연결고리들까지 상상하게 되는 이 작업은 내게 다양한 방향으로 감각이 닿게 하고, 회화로 채우지 못하는 지점들을 메워주며 상호보완적으로 작용한다. 앞으로 또 어떤 페이지들을 펼쳐내고, 뜯어내고, 넘겨볼 수 있을지. 그리고 어떻게 그것들을 엮어낼 수 있을지.`,
  'focus-text': `아트인컬쳐 2025년 1월호 [FOCUS]
《황금 화살》(TINC, 2024) 전시 리뷰

남웅(비평가)


<젊은 예술, 별을 쏘다>

<황금 화살>전은 붓을 든 이가 행할 획의 순간을, 어둠을 향해 화살을 쏘는 장면에 비유한다. 화살을 쏘는 것은 창작이, 화살이 하늘 위로 오른 별은 시대의 예술가가, 어둠 속 방향을 제시하는 빛은 고귀한 예술이 된다. 예술은 땅에 손가락 끝을 찍어 구멍을 낸 것으로부터 시작했을 것이다. 떠나보낸 무언가를 남기고자 하는 의식이자 충동의 몸짓은 곧 시간과 결부된다. 지난 시간을 잊지 않고 붙잡아 두기 위한 행위이자 의식은 영감을 부른다. 시간과 함께 이별한 이를, 그로부터 남은 생채기를, 언제고 어둠이 될 몸짓을, 그럼에도 내가 있기 전부터 존재했고 죽고 나서도 존재할 해와 달, 별의 궤적을 남겼을 것이다. 그러나 그렇게 남긴 모습은 온전할 수 없고, 대상이 존재하던 시간 자체가 될 수 없다. 시간이 빠져나간 자리를 채우는 것은 기록과 창작, 이른바 어두운 하늘에 쏘아 올린 화살이다. 지난 시간을 거스르는 화살이 계속 날기 위해서는, 미래를 제시할 뿐 아니라 미래를 미리 살아내야 한다.

전시장에서 돋보이는 것은 가운데 통로를 두고 양옆으로 이어진 좌대다. 마치 화살이 어둠을 가로질러 길을 낸 듯 경사면에 그림이 놓인다. 기획의 화두와 별개로 별이 된 화살은 전시장에 없다. 오히려 화살을 증언하듯 껍데기만 남긴 이산오의 <Arrow>가 전시장 한쪽에 매달려 있을 뿐이다. 서문은 수직의 위계를 두며 하늘에 쏘아올려 별이 된 황금 화살을 예술작품으로 은유했다. 쏘아 올린 모든 화살이 별이 되진 않을 것이라며 예술작품의 고유성과 그 가치를 높이는 것이다. 하지만 전시는 제 예술적 독자성을 남기고 지고한 작품의 가치를 높이는 황금 화살 보다는, 그 의의를 기억하는 이들이 남긴 영감과 충동을 시각화한다고 말하는 것이 적확할 것이다.

서로의 손길과 호흡

양옆에 배치된 그림은 화살이 지나며 남긴 자국처럼, 혹은 그를 따르는 창작의 산출물로 출현한다. 황금 화살은 하늘로 쏘지만, 전시장 통로는 지면과 평행한다. 그것은 빛나는 별처럼 고귀한 예술품의 독자성을 전시하기보다 작은 빛으로 어둠을 더듬어 나가는 분투를, 어쩌면 화살이 지났을 궤적을 생각하며 땅 위를 살아가는 사람들이 부단히 어둠을 더듬으며 빛의 언저리로부터 잔여의 몸짓을 출현시킨 수행을 보여주지 않을까. 물감의 물성과 촉각성이 두드러지는 유리의 작업은, 무대에 가까워지면서 광학적 평면과 비정형의 움직임을 화면에 얕게 펼쳐낸 이산오의 회화로, 안료를 올리며 맥락과 형상을 소거한 채 얼룩을 남기는 이진형의 회화로 이어진다. 다분히 촉각성과 시각적 위계를 흐릿하게나마 보이는 동선은 무대에 이르면 이산오의 삼차원 조형으로 이어진다. 그마저 빛을 투과하는 반투명의 오브제로 등장하는데, 이는 조형의 지고함보다 화살이 지난 자리의 껍데기로 무언갈 증언하듯 서있다. 부재의 자리를 상연하는 조형은 앞서 추측한 위계적 시나리오를 무화시킨다.

그렇다면 서문의 문장 중 '무에서 유를 남기는 그 예술을 다시 써서 유에서 유를 남기는 것 또한, '무가 되어버린 것을 유로 다시 남기는 예술'로 고쳐 읽어야 한다. 꿈을 갈망하며 형상을 만들지만 끝내 닿지 못하는 시도는, 그럼에도 제 무용함이 무언가를 갈망하고 있음을, 그것이 시간과 시간을 관통하며 이어내고 있음을 알린다. 하여 예술로 불리는 잔재가 화살의 궤적을 증언하고, 황금 화살이라는 성좌를 구성한다고 거꾸로 읽을 수 있다.

황금화살로 비견되는 예술의 정수는 하늘에서 찬란하게 빛난다. 그러나 대다수 사람은 땅 위를 살아내며 터전을 만들어간다. 하늘 아닌 땅 위를 날아가는 화살은 별이 되기보다 별이 되고자 했던 열망으로 남아있지 않을까. 황금 화살을 전설처럼 기억하는 이들에 의해, 화살이 지나 다시 어둠이 서린 자리에 몸을 움직여 무언가를 남기며 서로 손길과 호흡을 확인하는 이들에 의해.`,
  'golden-text': `《황금 화살》


김성근 (기획자, 레인보우큐브 디렉터)


태초에 모든 빛이 모여 순백의 세상이 열렸다


붓을 들기 전 새하얀 캔버스 앞에선 작가는 그 텅 빈 곳에서 공포감을 느낀다고 말했다. 규정과 제재 없는 '창작'이라는 무한한 자유 앞에서 작가는 왜 두려움을 느끼게 되었을까. 감상자인 우리도 이 하얀 세상을 마주한 적이 있다. 크레파스 물감으로 도화지 위에 그림을 그렸던 어린 시절의 경험. 때로는 무엇을 그려야 할지 고민에 머뭇거림도 있었지만, 처음으로 창조의 기쁨을 느꼈던 그때부터 누군가는 예술가의 꿈이 시작되었을지도 모른다. 여전히 자유가 보장된 그곳에서 작가는 왜 쉽게 붓을 들지 못했던 것일까. 예술가의 꿈을 이루기 위해 견뎌온 반복의 시간을 지나는 동안 익숙하고 편해졌을 그곳에서 작가는 무엇을 보았기에, 그것은 얼마나 무거운 존재였기에 이 가벼운 붓조차 들지 못하게 했던 것일까. 새하얗고 텅 빈 세상 속에는 감상자인 우리는 볼 수 없는 무거운 존재가 있었던 것이다.


땅에 말과 글과 색이 생겨나더니 모두 공허에 올라 검은 우주가 되었다


최초의 예술인. 그는 수만 년 전, 손가락 하나로 모래흙 땅 위를 쿡 하고 찔렀다. 그렇게 생긴 한 점에서 그는 묘한 기시감을 느꼈고 비로소 인류의 예술이 시작되었다. 그 어느 예술서(書)에도 기록되지 못한 이 최초의 예술가로부터 인류는 예술의 역사를 만들어갔다. 오랜 시간 겹겹이 쌓아온 창작의 역사, 그리고 다시 그 위에 올려지는 또 다른 새로운 층의 연속됨. 이 단 한 번도 뒤로 물러선 적 없는-나아가기만을 고집하는-그 층의 테두리가 커져만 가는 살아있는 예술의 서사. 그 안에 수없이 많은 그림, 조각, 이미지, 영상들 그리고 말과 글과 관념들. 이 모든 것은 사라지지 않았다. '시대'라는 지층 속에 단단히 자리하며 여전히 우리의 두 발을 지지해 주고 있다.


어둠이 있었다


하지만 대지만큼 두텁고 세상을 전부 검게 칠할 만큼 누적된, 이 모든 지난 인류의 예술을 우리는 보지 못한다. 그것은 밤하늘의 작은 별만을 보려는 인간의 습성이자, 기록으로만 전해지는 이야기만을 좇는 우리들의 한계이다. 대지 안을 가득 메워준 모래와 흙이 없다면 나의 두 발은 디딜 곳이 없어 하늘을 바라보지도 못할 것이며, 우주 망망대해를 영원히 떠돌게 될 것이다. 우주를 가득 채운 어둠이 없다면 빛나는 별은 영원히 발견되지 못했을 것이다.


빛이 생겨났다


하늘로 쏘아 올린 모든 것이 별이 되지는 않는다. 그것은 냉혹한 현실이자 당연함이다. 지난 인류의 모든 창작자가 예술가로 기록되었다면, '예술가'라는 직업은 점점 흐릿해지다 결국 사라졌을 것이다. 시대의 예술가로 기록되는 것, 그것은 예술가의 목표이자 창작 동력이다. 밤하늘에 작은 별이 없다면 우린 모두 나아갈 방향을 잃었을 것이다. 대지 속에 있었던 보석 유물들처럼 대지 위에 남은 고귀한 예술품이 없었다면, 지금의 세상에는 버려질 상품과 버려진 쓰레기만으로 가득했을 것이다. 시대를 만들어낸 유일한 작품으로 남는 것, 그것은 예술가의 목표이자 창작 동력이다.

예술은 무에서 유를 창조하는 것이라지만, 실제는 수많은 '유'의 역사 위에 또 다른 '유'를 얹어 놓는 것이다. 지나온 역사 속 그리고 같은 시대를 함께 살아가는 예술가들, 그들이 만들어 낸 창작 밖의 '또 다른 창작'을 만들어 내야만 함은 예술가의 길을 선택한 이의 숙명이다. 그렇기에 창작자는 인류가 쌓아온 예술의 경계 위에 서야만 하고, 창작은 그 경계 밖을 향해야만 한다. 그러나 그 숙명을 따른다 해도 모두가 예술사에 남아 예술가로 기록되지는 못할 것이다. 그것은 슬픈 현실이다. 이것을 알게 된 창작자는 쉽게 붓을 들지 못한다. (하지만, 이 거창한 숙명을 모두가 따를 필요는 없으며, 그저 붓을 깃털처럼 가볍게 들어 창작의 기쁨을 즐기는 것도 현명한 선택이다) 또한 전시와 비평, 재료비와 생활비, 떠도는 말들과 창작 방향에 대한 고민이 더해지면 그 붓의 무게는 더욱 무거워진다. 단련할수록 무거운 것을 더 쉽게 들 수 있는 몸의 운동과는 다르게, 시간이 갈수록 점차 가벼운 이 붓을 쉽사리 들기 어려워지는 것이 예술의 본질이다. (하지만, 이 예술의 중량을 모두가 감당할 필요는 없으며, 창작의 기쁨을 즐기는 것도 현명한 선택이다)

끝없는 어둠을 이겨내는 자
별이 되기 위해 나아가는 자
들어 올린 붓, 그 끝이 빛나니
그대의 손은 금이요 그 금은 순금이다


그렇기에 새하얀 캔버스 앞에 선 작가는 그 안에 담겨 있는 지난 모든 인류의 예술들을 보게 되었을 것이고, 그 공허의 세계에 담겨 있는 예술가의 숙명에 붓을 들기 망설여졌을 것이다. 하지만 이들은 다시 붓을 들어 올렸다. 붓끝을 뾰족이 세워 캔버스 위에 꽂아 새로운 창조의 궤적을 그려내었다. 그렇게 대지 위에 발을 딛고 공허의 우주를 향해 나아가기를 선택한 이들의 숭고한 결과가 여기 우리 눈앞에 놓여 있다. 우리의 역할은, 두려움을 이겨내고 나아가는 이들을 그저 고요한 침묵으로 바라보며, 그 끝이 빛나는 기쁨의 순간을 함께 기다려주는 것이다.

function buildItems(container, items, usePrefix = false) {
  items.forEach(item => {
    if (item.t === 'cat') {
      const el = document.createElement('div');
      el.className = 'cat-label';
      el.textContent = item.label;
      container.appendChild(el);
    } else if (item.t === 'show') {
      const el = document.createElement('div');
      el.className = 'acc-item' + (item.imgKey || item.textKey || item.splitItems || item.splitImg || item.splitImgs ? ' has-content' : '');
      el.dataset.imgKey = item.imgKey || '';
      el.dataset.itemLabel = item.label;
      el.dataset.itemId = item.id || '';
      el.dataset.itemTextKey = item.textKey || '';
      el.dataset.itemTextImgPath = item.textImgPath || '';
      el.dataset.itemImgCaptionKey = item.imgCaptionKey || '';
      el.dataset.itemPosterImgPath = item.posterImgPath || '';
      el.dataset.itemPosterImgPaths = item.posterImgPaths ? JSON.stringify(item.posterImgPaths) : '';
      el.dataset.itemFirstImgFit = item.firstImgFit ? '1' : '';
      el.dataset.itemSplitImg = item.splitImg || '';
      el.dataset.itemSplitImgs = item.splitImgs ? JSON.stringify(item.splitImgs) : '';
      el.dataset.itemSplitItems = item.splitItems ? JSON.stringify(item.splitItems) : '';
      el.dataset.itemSplitText = item.splitText || '';
      el.textContent = (usePrefix && !item.noPrefix) ? '- ' + item.label : item.label;
      el.addEventListener('click', () => onShowClick(item, el));
      container.appendChild(el);
    } else if (item.t === 'acc') {
      const wrap = document.createElement('div');
      const header = document.createElement('div');
      header.className = 'acc-header';
      const isYear = /^\d{4}$/.test(item.label);
      if (isYear) {
        header.dataset.label = item.label;
        header.dataset.arrow = '1';
        header.textContent = '▶︎ ' + item.label;
      } else {
        header.textContent = item.label;
      }
      const body = document.createElement('div');
      body.className = 'acc-body';
      buildItems(body, item.items, isYear);
      header.addEventListener('click', () => toggleAcc(body));
      wrap.appendChild(header);
      wrap.appendChild(body);
      container.appendChild(wrap);
    }
  });
}

// ── 아코디언 토글 (형제만 닫기) ──────────────────────────────────────
function toggleAcc(body) {
  if (body.dataset.alwaysOpen) return;
  const isOpen = body.classList.contains('open');
  const grandparent = body.parentElement?.parentElement;
  if (grandparent) {
    grandparent.querySelectorAll(':scope > * > .acc-body').forEach(b => {
      if (b.dataset.alwaysOpen) return;
      b.style.maxHeight = '0px';
      b.classList.remove('open');
      const h = b.previousElementSibling;
      if (h && h.dataset.arrow) { h.textContent = '▶︎ ' + h.dataset.label; h.classList.remove('is-open'); }
    });
  }
  if (!isOpen) {
    body.classList.add('open');
    body.style.maxHeight = '9999px';
    const header = body.previousElementSibling;
    if (header && header.dataset.arrow) { header.textContent = '▼︎ ' + header.dataset.label; header.classList.add('is-open'); }
  }
}

      const pre = document.createElement('pre');
      pre.style.cssText = 'white-space:pre-wrap;font:inherit;margin:0;';
      pre.textContent = textsContent[item.textKey] || '';
      textContent.appendChild(pre);
    }
    if (item.textImgPath) {
      const img = document.createElement('img');
      img.src = item.textImgPath;
      img.alt = '';
      img.style.cssText = 'display:block;width:100%;margin-top:84px;';
      textContent.appendChild(img);
    }
    textContent.classList.add('active');
  } else {
    splitView.style.display = 'none';
    splitView.innerHTML = '';
    textContent.classList.remove('active');
    textContent.innerHTML = '';
    const imgs = item.imgKey ? (exhibitionImages[item.imgKey] || []) : [];
    projectImgs.innerHTML = '';
    if (item.imgColumns === 2) {
      projectImgs.classList.add('grid-2');
    } else {
      projectImgs.classList.remove('grid-2');
    }
    if (item.imgColumns === 3) {
      projectImgs.classList.add('grid-3');
    } else {
      projectImgs.classList.remove('grid-3');
    }
    imgs.forEach((src, i) => {
      const img = document.createElement('img');
      img.src = src;
      img.alt = '';
      if (item.firstImgFit && i === 0) {
        img.style.cssText = 'width:auto;max-width:100%;max-height:96vh;display:block;margin:0 0 24px 0;';
      }
      if (item.imgColumns === 3) {
        img.addEventListener('click', () => openLightbox(imgs, i));
      }
      projectImgs.appendChild(img);
    });
    if (item.imgCaptionKey && textsContent[item.imgCaptionKey]) {
      const cap = document.createElement('div');
      cap.style.cssText = 'margin:72px 0 0;font:inherit;line-height:1.5;';
      if (item.imgCaptionKey.includes('-html')) {
        cap.innerHTML = textsContent[item.imgCaptionKey];
      } else {
        const pre = document.createElement('pre');
        pre.style.cssText = 'white-space:pre-wrap;font:inherit;margin:0;';
        pre.textContent = textsContent[item.imgCaptionKey];
        cap.appendChild(pre);
      }
      projectImgs.appendChild(cap);
    }
    if (item.posterImgPaths) {
      const posterRow = document.createElement('div');
      posterRow.className = 'poster-row';
      posterRow.style.cssText = 'display:flex;align-items:flex-start;gap:4px;margin:72px 0 0;width:50%;';
      item.posterImgPaths.forEach(src => {
        const poster = document.createElement('img');
        poster.src = src;
        poster.alt = '';
        poster.style.cssText = 'flex:1;display:block;margin:0;';
        posterRow.appendChild(poster);
      });
      projectImgs.appendChild(posterRow);
    } else if (item.posterImgPath) {
      const poster = document.createElement('img');
      poster.className = 'poster-single';
      poster.src = item.posterImgPath;
      poster.alt = '';
      poster.style.cssText = 'width:50%;display:block;margin:72px 0 0;';
      projectImgs.appendChild(poster);
    }
    projectImgs.classList.add('active');
  }

  rightPanel.scrollTop = 0;
  if (window.innerWidth <= 768) closePanelOnly();
}

// ── 전체 active 초기화 ────────────────────────────────────────────────
function clearActive() {
  menuPanel.querySelectorAll('.nav-item, .acc-item').forEach(el => el.classList.remove('active'));
}

// ── 랜딩 복귀 ────────────────────────────────────────────────────────
function returnToLanding() {
  stopGhosts();
  clearActive();
  currentState = null;
  updateLangHref();
  langBtn.classList.remove('content-open');
  layout.classList.remove('project-open');
  projectImgs.classList.remove('active');
  projectImgs.classList.remove('grid-2');
  projectImgs.classList.remove('grid-3');
  projectImgs.innerHTML = '';
  textContent.classList.remove('active');
  textContent.innerHTML = '';
  splitView.style.display = 'none';
  splitView.innerHTML = '';
  rightCover.classList.remove('hidden');
  rightPanel.scrollTop = 0;
  startGhosts();
}

// ── MENU TOGGLE ───────────────────────────────────────────────────────
function openMenu() {
  menuOpen = true;
  menuPanel.classList.add('open');
  menuDivider.classList.add('visible');
  if (window.innerWidth <= 768) stopGhosts();
}

function closeMenu() {
  if (window.innerWidth <= 768) {
    menuOpen = false;
    menuPanel.classList.remove('open');
    menuDivider.classList.remove('visible');
  }
  returnToLanding();
}

function closePanelOnly() {
  if (window.innerWidth <= 768) {
    menuOpen = false;
    menuPanel.classList.remove('open');
    menuDivider.classList.remove('visible');
  }
}

function closePanelOnly() {
  menuOpen = false;
  menuPanel.classList.remove('open');
  menuDivider.classList.remove('visible');
  menuToggle.classList.remove('hidden');
}

function updateLangHref() {
  if (!currentState) { langBtn.href = 'en.html'; return; }
  const p = new URLSearchParams();
  if (currentState.type === 'nav') {
    p.set('view', currentState.key);
  } else {
    p.set('view', 'show');
    if (currentState.id) p.set('id', currentState.id);
    else if (currentState.imgKey) p.set('key', currentState.imgKey);
    else p.set('label', currentState.label);
  }
  langBtn.href = 'en.html?' + p.toString();
}

function restoreStateFromURL() {
  const p = new URLSearchParams(window.location.search);
  const view = p.get('view');
  if (!view) return;
  openMenu();
  if (view === 'cv' || view === 'contact') {
    const el = menuPanel.querySelector(`[data-nav-key="${view}"]`);
    if (el) onNavClick(view, el);
  } else if (view === 'show') {
    const id = p.get('id');
    const key = p.get('key');
    const label = p.get('label');
    const el = id
      ? menuPanel.querySelector(`[data-item-id="${id}"]`)
      : key
      ? menuPanel.querySelector(`[data-img-key="${key}"]`)
      : [...menuPanel.querySelectorAll('.acc-item')].find(e => e.dataset.itemLabel === label);
    if (el) {
      let ancestor = el.closest('.acc-body');
      while (ancestor) {
        ancestor.classList.add('open');
        ancestor.style.maxHeight = '9999px';
        const h = ancestor.previousElementSibling;
        if (h && h.dataset.arrow) { h.textContent = '▼ ' + h.dataset.label; h.classList.add('is-open'); }
        ancestor = ancestor.parentElement?.closest('.acc-body');
      }
      onShowClick({ id: el.dataset.itemId || null, imgKey: el.dataset.imgKey || null, textKey: el.dataset.itemTextKey || null, textImgPath: el.dataset.itemTextImgPath || null, imgCaptionKey: el.dataset.itemImgCaptionKey || null, posterImgPath: el.dataset.itemPosterImgPath || null, posterImgPaths: el.dataset.itemPosterImgPaths ? JSON.parse(el.dataset.itemPosterImgPaths) : null, firstImgFit: el.dataset.itemFirstImgFit === '1', splitImg: el.dataset.itemSplitImg || null, splitImgs: el.dataset.itemSplitImgs ? JSON.parse(el.dataset.itemSplitImgs) : null, splitItems: el.dataset.itemSplitItems ? JSON.parse(el.dataset.itemSplitItems) : null, splitText: el.dataset.itemSplitText || null, label: el.dataset.itemLabel }, el);
    }
  }
}

// ── Ghost floaters (contact page) ────────────────────────────────────
let ghostState = [];
function startGhosts() {
  const srcs = [
    { src: 'image/ghost3.png', dur: '2.6s', delay: '0s' },
    { src: 'image/ghost4.png', dur: '3.2s', delay: '-1.1s' },
    { src: 'image/ghost1.png', dur: '2.9s', delay: '-0.6s' },
    { src: 'image/ghost2.png', dur: '3.5s', delay: '-1.8s' },
  ];
  const size = 56;
  srcs.forEach(({ src, dur, delay }) => {
    const img = document.createElement('img');
    img.className = 'floating-ghost';
    img.src = src;
    img.style.width = size + 'px';
    img.style.animationDuration = dur;
    img.style.animationDelay = delay;
    let x = Math.random() * (rightPanel.offsetWidth - size - 40) + 20;
    let y = Math.random() * (rightPanel.offsetHeight - size - 40) + 20;
    const speed = 0.25 + Math.random() * 0.25;
    const angle = Math.random() * Math.PI * 2;
    let vx = Math.cos(angle) * speed;
    let vy = Math.sin(angle) * speed;
    img.style.left = x + 'px';
    img.style.top = y + 'px';
    rightPanel.appendChild(img);
    let active = true;
    let rafId;
    function tick() {
      if (!active) return;
      x += vx; y += vy;
      const maxX = rightPanel.offsetWidth - size;
      const maxY = rightPanel.offsetHeight - size;
      if (x < 0)    { x = 0;    vx =  Math.abs(vx); }
      if (x > maxX) { x = maxX; vx = -Math.abs(vx); }
      if (y < 0)    { y = 0;    vy =  Math.abs(vy); }
      if (y > maxY) { y = maxY; vy = -Math.abs(vy); }
      img.style.left = x + 'px';
      img.style.top  = y + 'px';
      rafId = requestAnimationFrame(tick);
    }
    rafId = requestAnimationFrame(tick);
    ghostState.push({ stop() { active = false; cancelAnimationFrame(rafId); img.remove(); } });
  });
}
function stopGhosts() {
  ghostState.forEach(g => g.stop());
  ghostState = [];
}

menuToggle.addEventListener('click', () => { if (menuPanel.classList.contains('open')) closeMenu(); else openMenu(); });
menuCloseBtn.addEventListener('click', closeMenu);
if (window.innerWidth > 768) openMenu();
restoreStateFromURL();
if (!window.location.search) startGhosts();
</script>
