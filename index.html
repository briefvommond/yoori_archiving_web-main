const textsContent = {
  'shapeless-loop-essay': `개인전 《투명한 고리》 학고재, 2025


한주옥 (독립큐레이터)

우리의 안녕(安寧)을 위한, 투명한 고리(Shapeless Loop)


기억은 때로 미래를 예지하는 계기가 된다. 불현듯 떠오른 과거의 한 장면이 현재를 가로질러 올 때, 그것은 세계를 이어온 패턴을 환기하고, 동시에 다가올 시간의 징후가 된다. 서로 다른 시간 선이 하나로 접히는 순간이다. ―자연의 섭리와 인간사에 깃든 모든 운동과 수(數)가 그 흐름에 흡입되어 왔기에―따라서 '연결'이 무한한 궤도 혹은 고리(loop)의 형상으로 표상되어 온 까닭은 여기에 있을 것이다. 작가 유리(Yoori)는 오랫동안, 이 '연결의 감각'을 작업의 주요한 기제로 삼아왔다. 정확히 말하면, 과거로 흘러간 감각과 부재의 자리에 침전된 정서를 주시하며, 그것이 다른 형태로 이어질 가능성에 마음을 기울이는 것이다. 이러한 맥락에서 이번 전시 《투명한 고리(Shapeless Loop)》는 근래 작가에게 유독 반복해 찾아온 상실의 감정들이 일상의 장면과 부딪치는 순간, 즉 언어 이전의 감각, 논리 바깥에서 포착된 신호들을 모아 투명한 고리로 엮은 결과이다. 반짝이듯 굴절된 찰나의 장면들을 천천히 따라가 본다.

작업실에서, 작가는 근래 겪은 몇 가지 일을 들려주었다. 장례식장, 할아버지를 위해 모인 시간과 무관하게 생의 기쁨이 불쑥 터져 나온 순간이었다. 생일을 축하하는 가사가 흘렀고, 케이크 위 촛불은 향과 눈물로 뒤섞여 함께 반짝였다. 그날의 잔상은 '생과 사' 사이의 관념,  그리고 그 긴 사유의 간극이 그에게 단숨에 굽이쳐, 몸과 정신에 가닿았다고 한다.
작가의 이러한 경험은 '윤회'와 같은 형이상학적 개념을 해석하는데 주목하기보다, 사건이 일어나는 방식, 과정에서 형성되는 '기류'를 감지하는 계기로 작동된다. 지극히 비가시적이며, 정확히 재현할 수 없는 것들을 수용하게 된 일련의 경험은, 감각이 도래하는 순간을 하나의 시간적 양상으로 받아들이고, ―이것을 시간성이라고 할 수 있다면―그 감각이 또 다른 형태로 전환되어, 변주하는 과정 자체를 작업의 수행 삼는 것이다. 그래서 작가의 작품은 과거와 미래가 현재로 접히는 자리, 즉 여러 시간의 층위가 동시에 머무는 자리가 된다.

이러한 태도는 작업의 전개 방식에서 더욱 분명해진다. 덧입히고, 지우고, 화면의 내부와 외부를 연결하는 그의 반복적 행위는, 하나의 결과로 이미지를 고정시키는 목적에서 벗어난다. 따라서 작가가 포착한 장면들은 서로를 부르는 매개항이 되며, 또 다음 장면으로 변주될 동력을 장착하는 것이다. 매체에 대한 실험 역시 이 과정에서 확장된다. 여기서 주목할 점은 작품 스스로가 '서사의 단위'로 기능한다는 점이다. 즉 일종의 시퀀스(sequence)로 기능하는 작품은 장면을 모으고, 배열하고, 다시 되돌아 볼 수 있는 '타임루프'적 장치, 즉 작가 특유의 조형 구조를 형성하게 된다. 이는 작가가 오랜 시간 '아티스트 북'이라 불러온 작업에서도 확인할 수 있을 것이다.
이번 전시에서는 2023년부터 제작해 온 아티스트 북 연작 <무거운 언어들의 책 #1~19>(2023-2025)을 선보인다. 표면의 시각적 요소, 단단한 나무의 감각으로 지각되는 아티스트 북은, 언어화 되지 못한 감각과 그것을 연결하는 작가의 수행을 은유한다. 작가는 "여러 장의 종이가 모여 하나의 덩어리가 되는 책의 힘, 그리고 제책 방식에서 오는 물리적·시각적 자극" ¹ 을 언급한 바 있다. 따라서 그의 작업 세계에서 책은 '연결성'과 '축적'이라는 속성을 물리적으로 구현하는 존재로 기능한다. 페이지 넘기듯 장면은 이어지고, 읽는 행위를 경유한 연결은 다시 연결된다. 신작 <잔존하는 것들을 뭉쳐 만든 슬픔>(2025)과 <상실의 가능성과 영원의 염원>(2025)은 기존의 작업에서 투명함(transparent)이라는 층위를 더한다. 아크릴 잉크, 실크 천, 작가의 손에 머물렀던 오브제 등은 레진(resin)에 의해 봉인되어 책의 형태로 굳어진다. 더불어 그 안을 투과해 볼 수 있다는 전제가 동시에 작동한다. 다시, 과거와 미래가 현재에 흐른다.

그렇다면 이제 질문은 무엇이 화면에 남는가이다. 꺼져가는 초(燭)가 남긴 미세한 빛, 풀렸다가 다시 묶이는 리본, 흐르는 물, 날개의 편린. 이 이미지들은 분명 작가의 내면에 잔류한 시간에서 떠오른 것이며, 잠시 머물렀다가 사라진 남은 흔적들일 것이다. 그리고 온전히 붙잡히지 않는 의미들은 여전히 그의 의식 아래 머물러 있을 것이다. 그래서 그는 의미를 애써 규정하지 않는다고 한다. 대신 그에게 다가오는 흐름을 온전히 받아들이고, 또 다시 흘려보낸다. 문득, 직선이라 믿었던 길의 끝이 부드럽게 굽어지는 곡선이 열리는 순간이 떠오른다. 그 곡선은 또 다른 길을 연결해 주지 않던가. 고리(loop)는 그렇게 표상되어 왔다. 이러한 맥락에서, 전시장 중앙 오른편에 설치된 두 작품을 교차해 살펴본다. <긴 꼬리 책 : 떨어져 나온 문장(1~14)>(2025)과 작품 <긴 꼬리 책>(2023-2025)이 인접하게 설치된다. '긴 꼬리 책'은 과거 7미터 길이의 설치 작품으로 제작되었으나, 여러 차례 바인딩 과정을 거쳐 책의 형식으로 다시 탄생되었다. 이 과정에서 작가는 페이지를 무작위로 접고(덮고) 펼치는 과정에서 발생한 우연한 분절, 연결되는 감각의 촉매를 획득해 '긴 꼬리 책 : 떨어져 나온 문장'을 제작한다. 하나의 서사를 이루며 이어지던 이미지는 책에서 분기되어 독립적인 장면, 동시에 고리처럼 연결된 연속성을 형성한다.

어느 날, 누군가의 부재―시간과 공간에서 빠져나간 흔적―이 야속하게 느껴진다. 그는 흘러간 것들을 되찾으려는 욕망을 숨기지 않는다. 숨겨야 할 필요는 없다. 하나, 둘 가능한 것들을 이어 붙이는 과정에서 형태를 얻는다. '잔존하는 것들을 뭉쳐 만든 슬픔'은 그렇게 얻어진 이름이다. 전시장 입구의 작품을 다시 떠올려본다. 이번 전시 타이틀과 동일한 <투명한 고리>(2025)는 탄생과 죽음, 그리고 소중한 것들의 부재가 하나의 사건이자 사유로 응축된 장면이다. 검푸른 색의 파장은 마치 어두운 밤 운하를 따라 흐르는 물결처럼, 묵직한 중압감으로 내려앉는다. 우리 일상의 단단히 지탱해 주던 일련의 (비)물리적 믿음이 사라졌다는 사실은 어떤 고통과도 비교할 수 없을 만큼 떨쳐내기 어려운 것이다. 그가 이번 전시를 기획하게 된 이유. 소중한 것들에 대한 애도는 그렇게 이곳에 결속한다. '연결'의 가장 근원적인 요소는 '부재'에서 비롯된다는 점을 다시 환기하며.

끝 이후의 시간을 위하여 – 사라진 존재들을 다정히 불러내기

신리사 (미술사ㅣ학고재 기획팀장)



검푸른 웅덩이와 푸른 물줄기 속에서 솟아오른 검은 선과 덩어리들. 시각예술가 유리(b. 1994)는 마음 안에서 증발하지 못하고 고여 있는, 이름 붙여지지 않은 감정과 심상을 이미지로 길어 올리는 작업을 지속해 왔다. 학고재에서 진행되고 있는 개인전 《투명한 고리》(11/19-12/20)는 개인적인 서사에서 출발한다. 한 해 동안 가까운 존재들의 죽음을 세 번 연달아 마주한 뒤, 작가는 존재와 실재성에 대한 관심을 삶과 죽음이라는 구체적 주제와 함께 사유하게 되었다. 특히 할아버지의 기일이 되어버린 생일, 장례식장에서 생일 축하를 받았던 경험은 장례식장의 초와 생일 케이크 위의 초가 서로 닮아 있는 것처럼 탄생과 죽음이 분리된 사건이 아니라는 인식으로 이어졌다. 이번 전시는 바로 그 지점ㅡ끝과 시작, 존재와 부재의 경계ㅡ를 들여다보는 응시에서 비롯된다.

<끝난 자리에서>
전시는 회화, 조각, 설치 50여 점으로 구성되는데, 대부분 검고 희며 때때로 검푸른 색채가 떠오른다. 이곳에서 유리가 붙잡아둔 것들은 더 이상 볼 수 없는 존재들이 남기고 간 작고 미세한 잔해들이다. 그는 그것들을 감추거나 미화하지 않고 정직하게 드러내기를 택한다.

전시와 동명의 회화 <투명한 고리>에서는 죽은 고양이의 형상과 다시 만날 날을 기다리며 다리에 묶어놓은 붉은 실이 등장한다. 레진과 나무를 엮어 만든 조각에서는 같은 실이 즉각적인 물성으로 되살아난다. 작품은 기억이나 회상에 기댄 이미지가 아닌, 사라진 뒤에도 남아 있는 것들의 현전성에서 출발한다. 화면에 깊숙이 스며든 검은 자국, 물기가 걷힌 매트한 질감, 거칠게 휘날리는 선은 요동치던 감정이 지나가고 난 뒤 남아있는 영원의 잔광처럼 남아있다.

외할머니의 목걸이에서 나온 구슬을 레진으로 봉입한 <잔존하는 것들을 뭉쳐 만든 슬픔>에서도 사라진 존재들이 어딘가에서 계속 어떤 형태로든 남아있기를 바라는 마음이 담겨 있다. 투명한 덩어리 속에서 떠오르는 작은 구슬은 영원의 결정(結晶)으로 변모하여 '죽음 이후의 시간'을 위한 사물로 빚어진다. 유품을 그대로 보존할지, 작품화할지 망설이던 마음은 다음 차원을 향한 초월의 의지가 우위를 점하며 거두어졌다. "무언가 해야만 했어서"라는 작가의 말은 슬픔과 애도의 시간을 지나 나아가겠다는 결의에 가깝다.

<움직이는 세계>
유리는 존재와 부재, 삶과 죽음을 잇는 연결고리를 추상적 개념이 아닌 구체적 사물과 장면, 촉각적 경험을 통해 드러낸다. 시작과 끝이 없는 검은 고리, 부피와 리본을 만들고 하늘로 솟아오르는 검은 실, 날개를 닮은 하얀 고리 등이 작품 곳곳에 등장한다.

<끊임없이 차오르고 계속해서 비워지는 것들>에서는 연결과 순환의 구조가 분수의 형태로 제시된다. 솟구치다 떨어지고 다시 채워지는 분수의 움직임은 존재와 부재가 교차하는 생의 거대한 흐름을 시각화한다. 이는 거대한 수레바퀴 속에서 채워지고 비워지는 삶의 경험, 즉 마음의 운동이기도 하다. 두 눈과 같은 형상을 지녀 사람을 닮은 이 분수는 쏟아지는 감정을 그대로 분출해 내면서도 어딘가 초연한 모습이다. 차오르는 것은 비워지고, 비어 있는 것은 필히 채워질 것을 알고 있기 때문에.

끝이 끝이 아니라는 믿음, 투명한 연결 고리에 대한 관심은 달과 바다의 관계로도 은유된다. 물리적으로 결코 닿을 수 없을 만큼 멀리 있지만, 달의 중력이 바다를 끌어당기기에 바다는 끊임없이 움직임을 이어간다. <달과 바다의 사이>에서는 검푸른 파도와 희미한 달빛이 서로의 경계를 지우며 맞닿아 있다. 작가는 영원히 만나지 못하는 둘을 집을 닮은 공간 안에 함께 둔다. 멀리 떨어져 있지만 강하게 연결된 두 존재처럼, 작가는 이별 이후에도 지속되는 관계와 보이지 않지만 강력하게 작동하는 것들을 담아낸다.

<끝을 딛고 태어난 조각들>
<긴 꼬리 책>에는 연결에 대한 사유와 전환에 대한 의지가 작업 방식으로 드러난다. 작가는 본래 7m 길이에 달하는 그림을 아코디언처럼 접으며, 기존의 장면들이 우연한 방식으로 이어지고 새로운 조합을 만들어내는 모습을 목격했다. 읽을 수 없는 문장처럼 불쑥 튀어나온 이미지들은 또 다른 언어와 의미를 낳았고, 작가는 그 장면들을 독립된 작은 그림들로 분리해 <긴 꼬리 책 : 떨어져 나온 문장>이라는 제목의 연작으로 확장했다. 그리고 그 그림들을 다시 미니어처로 축소하고 연결하여 하나의 '꼬리'와 같은 모양으로 탄생시켰다.

원본을 책처럼 접어내는 행위는 해체를 위한 행위라기보다, 새로운 가능성을 탐색하는 일에 가깝다. 조각난 화면들은 본래의 기능을 상실하지만, 작가는 그 단절을 새로운 시작의 출발점으로 삼는다. 남겨진 것(원본 그림)을 온전히 보존하는 대신 파편화하고 재구성함으로써 '남아 있는 것들'의 무게를 새롭게 발화하는 것이다. 그렇게 '꼬리에 꼬리를 물고' 태어난 작품은 '끝'을 딛고 살아나, 어딘가 그로테스크하지만 검게 빛나는 짐승처럼 새로운 존재로 태어난다.

<남은 것들을 위한 시>
남겨진 것들을 응시하고 다시 빛을 얻게 하는 유리의 세계에서, 의미 없는 것은 없고 끝은 끝이 아니게 된다. 슬픔과 그리움처럼 무겁게 침잠하던 감정들은 하얀 날개와 투명한 영원의 고리를 타고 가볍게 다음 차원으로 비상한다.

이번 전시는 상실과 애도에서 출발하지만, 그 너머를 향해 나아가려는 의지와 영원에 대한 염원이 분명히 자리한다. 더 이상 볼 수 없는 존재들이 어떻게든 삶을 이어 나가길 바라는 간절함, 사랑하는 이들과 물리적 제약을 넘어 영원히 연결되고자 하는 바람. 지극히 사적인 이야기임에도 불구하고 우리가 유리의 예술에 공감하게 되는 이유는, 그가 결국 모두가 공유하는 상실의 두려움과 그것을 견디고 나아가려는 인간의 보편적 정서를 어루만지기 때문일 것이다. 삶에서 비롯되어 다시 삶으로 이어지는 유리의 예술 속에서, 우리는 두려움과 슬픔을 정직하게 마주하고 동시에 극복의 가능성을 함께 감지한다.

남겨진 조각들을 응시하며 상실 이후의 시간을 위해 조용히 시(詩)를 쌓아 올리는 일. 감정의 마지막 날, 슬픔이 가라앉고 진실이 떠오르는 깊은 적막 속에서, 유리는 이름 없이 남겨진 감정들과 사라진 존재들을 다정히 불러낸다.`,
};

// ── DOM REFS ───────────────────────────────────────────────────────────
const menuToggle   = document.getElementById('menuToggle');
const menuCloseBtn = document.getElementById('menuCloseBtn');
const menuPanel    = document.getElementById('menuPanel');
const menuDivider  = document.getElementById('menuDivider');
const layout       = document.getElementById('layout');

const projectImgs  = document.getElementById('projectImages');

const langBtn      = document.getElementById('langBtn');

let menuOpen = false;
let currentState = null;

// ── 메뉴 아이템 재귀 빌드 ─────────────────────────────────────────────
function buildItems(container, items, usePrefix = false) {
  items.forEach(item => {
    if (item.t === 'cat') {
      const el = document.createElement('div');
      el.className = 'cat-label';
      el.textContent = item.label;
      container.appendChild(el);
    } else if (item.t === 'show') {
      const el = document.createElement('div');
      el.className = 'acc-item';
      el.dataset.imgKey = item.imgKey || '';
      el.dataset.itemLabel = item.label;
      el.dataset.itemId = item.id || '';
      el.dataset.itemTextKey = item.textKey || '';
      el.dataset.itemTextImgPath = item.textImgPath || '';
      el.dataset.itemSplitImg = item.splitImg || '';
      el.dataset.itemSplitImgs = item.splitImgs ? JSON.stringify(item.splitImgs) : '';
      el.dataset.itemSplitItems = item.splitItems ? JSON.stringify(item.splitItems) : '';
      el.dataset.itemSplitText = item.splitText || '';
      el.textContent = (usePrefix && !item.noPrefix) ? '- ' + item.label : item.label;
      el.addEventListener('click', () => onShowClick(item, el));
      container.appendChild(el);
    } else if (item.t === 'acc') {
      const wrap = document.createElement('div');
      const header = document.createElement('div');
      header.className = 'acc-header';
      const isYear = /^\d{4}$/.test(item.label);
      if (isYear) {
        header.dataset.label = item.label;
        header.dataset.arrow = '1';
        header.textContent = '▶ ' + item.label;
      } else {
        header.textContent = item.label;
      }
      const body = document.createElement('div');
      body.className = 'acc-body';
      buildItems(body, item.items, isYear);
      header.addEventListener('click', () => toggleAcc(body));
      wrap.appendChild(header);
      wrap.appendChild(body);
      container.appendChild(wrap);
    }
  });
}

// ── 메뉴 빌드 ─────────────────────────────────────────────────────────
menuStructure.forEach(node => {
  if (node.t === 'sep') {
    menuPanel.appendChild(Object.assign(document.createElement('hr'), { className: 'menu-sep' }));

  }

    wrap.appendChild(el);

    const header = document.createElement('div');

    header.textContent = node.label;

    body.className = 'acc-body';
    buildItems(body, node.items, true);
    header.addEventListener('click', () => toggleAcc(body));
    wrap.appendChild(header);
    wrap.appendChild(body);
  }
  menuPanel.appendChild(wrap);
});

// ── Works/Exhibitions + 연도 아코디언 초기 열기 ───────────────────────
(function initOpenAccordions() {
  menuPanel.querySelectorAll('.menu-inner > .acc-header').forEach(header => {
    if (header.textContent.trim() === 'Works/Exhibitions') {
      const body = header.nextElementSibling;
      body.dataset.alwaysOpen = '1';
      body.classList.add('open');
      body.style.maxHeight = '9999px';
    }
  });
})();

// ── 아코디언 토글 (형제만 닫기) ──────────────────────────────────────
function toggleAcc(body) {
  if (body.dataset.alwaysOpen) return;
  const isOpen = body.classList.contains('open');
  const grandparent = body.parentElement?.parentElement;
  if (grandparent) {
    grandparent.querySelectorAll(':scope > * > .acc-body').forEach(b => {
      if (b.dataset.alwaysOpen) return;
      b.style.maxHeight = '0px';
      b.classList.remove('open');
      const h = b.previousElementSibling;
      if (h && h.dataset.arrow) { h.textContent = '▶ ' + h.dataset.label; h.classList.remove('is-open'); }
    });
  }
  if (!isOpen) {
    body.classList.add('open');
    body.style.maxHeight = '9999px';
    const header = body.previousElementSibling;
    if (header && header.dataset.arrow) { header.textContent = '▼ ' + header.dataset.label; header.classList.add('is-open'); }
  }
}

// ── nav 클릭 (C.V, Contact) ───────────────────────────────────────────
function onNavClick(key, el) {
  clearActive();
  el.classList.add('active');
  currentState = { type: 'nav', key };
  updateLangHref();
  layout.classList.add('project-open');
  langBtn.classList.add('content-open');
  menuToggle.classList.add('content-open');
  rightCover.classList.add('hidden');
  projectImgs.classList.remove('active');
  projectImgs.innerHTML = '';

  const html = key === 'cv' ? cvHTML : key === 'contact' ? contactHTML : '';
  textContent.innerHTML = html;
  textContent.classList.add('active');
  rightPanel.scrollTop = 0;
  if (window.innerWidth <= 768) closePanelOnly();
}

// ── 전시/텍스트 클릭 ──────────────────────────────────────────────────
function onShowClick(item, el) {
  clearActive();
  el.classList.add('active');
  currentState = { type: 'show', id: item.id || null, imgKey: item.imgKey || null, label: item.label };
  updateLangHref();
  layout.classList.add('project-open');
  langBtn.classList.add('content-open');
  menuToggle.classList.add('content-open');
  rightCover.classList.add('hidden');

  if (item.splitItems || item.splitImg || item.splitImgs) {
    projectImgs.classList.remove('active');
    projectImgs.innerHTML = '';
    textContent.classList.remove('active');
    textContent.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'split-view';
    const items = item.splitItems || (item.splitImgs || [item.splitImg]).map((src, i) => ({ img: src, text: i === 0 ? (item.splitText || '') : '' }));
    items.forEach(si => {
      const row = document.createElement('div');
      row.className = 'split-row';
      const imgWrap = document.createElement('div');
      imgWrap.className = 'split-view-img';
      const img = document.createElement('img');
      img.src = si.img;
      img.alt = '';
      imgWrap.appendChild(img);
      const textWrap = document.createElement('div');
      textWrap.className = 'split-view-text';
      textWrap.textContent = si.text || '';
      row.appendChild(imgWrap);
      row.appendChild(textWrap);
      wrap.appendChild(row);
    });
    splitView.innerHTML = '';
    splitView.appendChild(wrap);
    splitView.style.display = 'block';
  } else if (item.textKey) {
    splitView.style.display = 'none';
    splitView.innerHTML = '';
    projectImgs.classList.remove('active');
    projectImgs.innerHTML = '';
    const pre = document.createElement('pre');
    pre.style.cssText = 'white-space:pre-wrap;font:inherit;margin:0;';
    pre.textContent = textsContent[item.textKey] || '';
    textContent.innerHTML = '';
    textContent.appendChild(pre);
    if (item.textImgPath) {
      const img = document.createElement('img');
      img.src = item.textImgPath;
      img.alt = '';
      img.style.cssText = 'display:block;width:100%;margin-top:84px;';
      textContent.appendChild(img);
    }
    textContent.classList.add('active');
  } else {
    splitView.style.display = 'none';
    splitView.innerHTML = '';
    textContent.classList.remove('active');
    textContent.innerHTML = '';
    const imgs = item.imgKey ? (exhibitionImages[item.imgKey] || []) : [];
    projectImgs.innerHTML = '';
    imgs.forEach(src => {
      const img = document.createElement('img');
      img.src = src;
      img.alt = '';
      projectImgs.appendChild(img);
    });
    projectImgs.classList.add('active');
  }

  rightPanel.scrollTop = 0;
  if (window.innerWidth <= 768) closePanelOnly();
}

// ── 전체 active 초기화 ────────────────────────────────────────────────
function clearActive() {
  menuPanel.querySelectorAll('.nav-item, .acc-item').forEach(el => el.classList.remove('active'));
}

// ── 랜딩 복귀 ────────────────────────────────────────────────────────
function returnToLanding() {
  clearActive();
  currentState = null;
  updateLangHref();
  langBtn.classList.remove('content-open');
  menuToggle.classList.remove('content-open');
  menuPanel.querySelectorAll('.acc-body').forEach(b => { b.style.maxHeight = '0px'; b.classList.remove('open'); });
  layout.classList.remove('project-open');
  projectImgs.classList.remove('active');
  projectImgs.innerHTML = '';
  textContent.classList.remove('active');
  textContent.innerHTML = '';
  splitView.style.display = 'none';
  splitView.innerHTML = '';
  rightCover.classList.remove('hidden');
  rightPanel.scrollTop = 0;
}

// ── MENU TOGGLE ───────────────────────────────────────────────────────
function openMenu() {
  menuOpen = true;
  menuPanel.classList.add('open');
  menuDivider.classList.add('visible');
  menuToggle.classList.add('hidden');
}

function closeMenu() {
  menuOpen = false;
  menuPanel.classList.remove('open');
  menuDivider.classList.remove('visible');
  menuToggle.classList.remove('hidden');
  returnToLanding();
}

function closePanelOnly() {
  menuOpen = false;
  menuPanel.classList.remove('open');
  menuDivider.classList.remove('visible');
  menuToggle.classList.remove('hidden');
}

function updateLangHref() {
  if (!currentState) { langBtn.href = 'en.html'; return; }
  const p = new URLSearchParams();
  if (currentState.type === 'nav') {
    p.set('view', currentState.key);
  } else {
    p.set('view', 'show');
    if (currentState.id) p.set('id', currentState.id);
    else if (currentState.imgKey) p.set('key', currentState.imgKey);
    else p.set('label', currentState.label);
  }
  langBtn.href = 'en.html?' + p.toString();
}

function restoreStateFromURL() {
  const p = new URLSearchParams(window.location.search);
  const view = p.get('view');
  if (!view) return;
  openMenu();
  if (view === 'cv' || view === 'contact') {
    const el = menuPanel.querySelector(`[data-nav-key="${view}"]`);
    if (el) onNavClick(view, el);
  } else if (view === 'show') {
    const id = p.get('id');
    const key = p.get('key');
    const label = p.get('label');
    const el = id
      ? menuPanel.querySelector(`[data-item-id="${id}"]`)
      : key
      ? menuPanel.querySelector(`[data-img-key="${key}"]`)
      : [...menuPanel.querySelectorAll('.acc-item')].find(e => e.dataset.itemLabel === label);
    if (el) {
      let ancestor = el.closest('.acc-body');
      while (ancestor) {
        ancestor.classList.add('open');
        ancestor.style.maxHeight = '9999px';
        const h = ancestor.previousElementSibling;
        if (h && h.dataset.arrow) { h.textContent = '▼ ' + h.dataset.label; h.classList.add('is-open'); }
        ancestor = ancestor.parentElement?.closest('.acc-body');
      }
      onShowClick({ id: el.dataset.itemId || null, imgKey: el.dataset.imgKey || null, textKey: el.dataset.itemTextKey || null, textImgPath: el.dataset.itemTextImgPath || null, splitImg: el.dataset.itemSplitImg || null, splitImgs: el.dataset.itemSplitImgs ? JSON.parse(el.dataset.itemSplitImgs) : null, splitItems: el.dataset.itemSplitItems ? JSON.parse(el.dataset.itemSplitItems) : null, splitText: el.dataset.itemSplitText || null, label: el.dataset.itemLabel }, el);
    }
  }
}

menuToggle.addEventListener('click', openMenu);
menuCloseBtn.addEventListener('click', closeMenu);
restoreStateFromURL();
