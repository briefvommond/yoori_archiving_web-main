function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

<우리의 안녕(安寧)을 위한, 투명한 고리(Shapeless Loop)>


기억은 때로 미래를 예지하는 계기가 된다. 불현듯 떠오른 과거의 한 장면이 현재를 가로질러 올 때, 그것은 세계를 이어온 패턴을 환기하고, 동시에 다가올 시간의 징후가 된다. 서로 다른 시간 선이 하나로 접히는 순간이다. ―자연의 섭리와 인간사에 깃든 모든 운동과 수(數)가 그 흐름에 흡입되어 왔기에―따라서 '연결'이 무한한 궤도 혹은 고리(loop)의 형상으로 표상되어 온 까닭은 여기에 있을 것이다. 작가 유리(Yoori)는 오랫동안, 이 '연결의 감각'을 작업의 주요한 기제로 삼아왔다. 정확히 말하면, 과거로 흘러간 감각과 부재의 자리에 침전된 정서를 주시하며, 그것이 다른 형태로 이어질 가능성에 마음을 기울이는 것이다. 이러한 맥락에서 이번 전시 《투명한 고리(Shapeless Loop)》는 근래 작가에게 유독 반복해 찾아온 상실의 감정들이 일상의 장면과 부딪치는 순간, 즉 언어 이전의 감각, 논리 바깥에서 포착된 신호들을 모아 투명한 고리로 엮은 결과이다. 반짝이듯 굴절된 찰나의 장면들을 천천히 따라가 본다.

신리사 (미술사ㅣ학고재 기획팀장)

<끝 이후의 시간을 위하여 – 사라진 존재들을 다정히 불러내기>



검푸른 웅덩이와 푸른 물줄기 속에서 솟아오른 검은 선과 덩어리들. 시각예술가 유리(b. 1994)는 마음 안에서 증발하지 못하고 고여 있는, 이름 붙여지지 않은 감정과 심상을 이미지로 길어 올리는 작업을 지속해 왔다. 학고재에서 진행되고 있는 개인전 《투명한 고리》(11/19-12/20)는 개인적인 서사에서 출발한다. 한 해 동안 가까운 존재들의 죽음을 세 번 연달아 마주한 뒤, 작가는 존재와 실재성에 대한 관심을 삶과 죽음이라는 구체적 주제와 함께 사유하게 되었다. 특히 할아버지의 기일이 되어버린 생일, 장례식장에서 생일 축하를 받았던 경험은 장례식장의 초와 생일 케이크 위의 초가 서로 닮아 있는 것처럼 탄생과 죽음이 분리된 사건이 아니라는 인식으로 이어졌다. 이번 전시는 바로 그 지점ㅡ끝과 시작, 존재와 부재의 경계ㅡ를 들여다보는 응시에서 비롯된다.

  'oaoa2026-text': `《미시적 재난》 (Micro-Disaster)


오에이오에이는 2026년 첫 전시로 양하, 유리의 2인전 《미시적 재난 Micro-Disaster》을 선보입니다. 이번 전시는 사회적·개인적 비극이 한 사람의 내면으로 수렴되는 지점과 그 이후의 시간을 "미시적 재난"이라 명명하고 조명합니다.

우리는 누구나 재난을 경험합니다. 전쟁과 사고, 기후 재난부터 수시로 울리는 실종자 알림까지, 재난은 도처에 존재하고 빠른 속도로 우리의 손바닥 위로 전달됩니다. 참상의 소식에 충격을 받아도 뉴스를 새로고침 하는 것 외에는 달리 할 수 있는 일이 없을 때의 죄책감과 무력감은 현대인이 반복적으로 경험하는 정서가 되었습니다. 재난이 휩쓸고 간 자리의 고통은 사회적 시스템이 복구되고, 사건이 공적 기억 속에서 흐릿해진 뒤에도 사라지지 않은 채, 여전히 누군가의 몫으로 남겨집니다.

개인의 삶에서도 죽음과 질병, 사건과 사고는 예고 없이 찾아와 일상을 흔들어 놓습니다. 누구나 겪는 흔한 일일지라도 그것을 통과하는 한 사람의 내면에서는 무엇보다 큰 재난으로 다가옵니다. 사회적으로 우리는 이 고통을 어떻게 받아들이고 소화해야 하는지에 대해 충분히 배우지 못했고, 때로는 타인에 의해 애도와 회복의 시간이 성급히 단정되기도 합니다. 결국 그 혼란과 아픔을 견뎌내는 과정은 다시, 오롯이 개인의 몫이 됩니다.

양하와 유리는 이렇게 한 사람의 몫으로 남겨진 재난에 주목하며 각자의 시각 언어를 통해 비극 이후의 삶에 관해 이야기합니다. 사회가 정한 문법이나 속도에 매몰되지 않고 자신에게 닥친 재난을 주체적으로 대면하며 삶을 지속하는 태도를 제시하고 있습니다.

양하 작가는 폭발과 파편의 이미지가 스크린을 거치며 매끄러운 정보로 정제된 상태를 '매개된 폭력'이라 지칭하고, 현대사회가 재난을 소비하는 방식에 질문을 던져왔습니다. 작가는 스크린 샷을 찍듯 수집한 비극의 장면들을 캔버스로 옮겨오지만, 실제의 고통과 무게는 삭제되어 있습니다. 파스텔톤의 구름이나 말랑한 젤리처럼 변모한 폭발의 형상은 사건을 안전하게 가공하고 지나치는 현대인의 무감각함을 서늘하게 폭로합니다. 실내나 창밖의 풍경 위로 무심하게 겹쳐진 '귀여운 폭발물'은 우리가 안온한 일상 속에서 타인의 고통을 얼마나 가볍게 인지하고 동시에 망각하는지를 직시하게 하는 장치가 됩니다.

이번 전시에서 양하는 그간 반복해온 '폭발'의 잔상이 정물 혹은 초상으로 치환되는 새로운 국면을 보여줍니다. 기존 작품의 매끈한 폭발 이미지는 이제 기둥과 같은 '몸'을 가진 주인공이 되어 무대 중앙에 당당히 자리합니다. 재난을 연극적 무대 위에 올려 관람객과 정면으로 눈을 맞추게 하는 초현실적인 설정은 비극을 둘러싼 외부의 맥락을 소거하고 오직 대상과 나만이 존재하는 '직면'의 상태를 유도합니다. 작가는 "왜 그렇게 먼 곳의 이야기를 그리느냐"는 물음에 "가장 가까운 곳을 그리고 있다"고 답하며, 먼 곳의 비극이 이미 우리의 문과 창을 지나 실체를 갖추고 식탁 위 화병 앞에 도착해 있음을 직시하게 합니다. 작품 제목을 통해서도 '도대체 가까운 곳은 어디인지' 반문하며, 나아가 '0.1%의 애정'만 있다면 타인의 아픔을 내 영역 안으로 성실히 데려올 수 있다는 작은 용기를 제안합니다. 타인의 고통을 남의 것으로만 방치하지 않고 내 일상의 서사 속으로 데려오는 이 태도는 무력감에 함몰되지 않고 자신만의 방식으로 세상을 살아가려는 한 개인의 존엄한 저항이자 가장 따뜻한 연대의 방식이 될 것입니다.

유리는 언어로 완전히 정의되지 않는 모호한 감정이나 경계 등 내면의 상태를 시각 언어로 옮겨냅니다. 말과 말 사이, 평면과 입체 사이 등 언어와 이미지 사이에서 발생하는 필연적인 간극을 작업의 출발점으로 삼아 회화와 아티스트 북이라는 두 가지 방법으로 이를 표현해왔습니다. 이번 전시에서는 '달력제작자(Kalendermacher)'라는 가상의 페르소나를 호출하여 달력을 활용한 다양한 시간의 개념을 제시합니다. 달력을 만드는 일은 작가가 불안을 다스리기 위해 8개의 세로선과 5-6개의 가로선을 긋던 지극히 개인적인 수양의 행위에서 비롯되었습니다. 내 뜻대로 할 수 없는 거대한 재난 앞에서, 정해진 격자 안에 시간의 형식을 부여하는 일은 작가가 세상에 대응하며 얻을 수 있는 유일하고도 묘한 안정감이었습니다. 시간을 다루는 숙련된 제작자가 된 그는 이제 캔버스 위에서 과거와 미래의 경계를 허물고 찰나의 순간들을 하나의 평면 위에 붙잡아 두며 시간의 맥락을 재구성합니다. 특히 화면 위에 덧대어진 천의 질감이나 실의 궤적은 흩어지고 사라지는 시간을 이어 붙이고 엮어내려는 작가의 성실한 손길을 잘 보여주며, 이는 흐르는 시간의 본질을 가시화하고 나아가 우리가 자주 외면하는 시간의 민낯을 마주하게 합니다.

이러한 시도는 전시장 내에서 레진과 양초의 물성을 통해 입체적으로 확장됩니다. 겹겹이 쌓인 레진의 층 사이로 드로잉과 천 조각이 투영되어 보이는 <1년-서로를 통과하며 축적되기>는 마치 지층처럼 흘러가는 시간에 물리적인 두께를 부여하고 붙잡아둡니다. 겹쳐진 형태와 색들은 마치 남겨진 사진이나 일기처럼, 이미 지나가버린 1년의 시간이 남겨둔 미미하고도 애틋한 흔적이 됩니다. 본질적으로 소멸해가는 우리에게 남겨지는 것들은, 결국 이렇게 쌓인 작은 기록과 기억들 뿐일지도 모릅니다. 또한 계단식 좌대 위에 놓인 서른 개의 양초 달력 <30일-잠정적 형상들>은 현재를 관통하는 시간의 직관적인 초상이 되어줍니다. 타는 촛불과 녹아내리는 초는 되돌릴 수 없이 진행되는 시간의 비가역성을 은유합니다. 결코 예측할 수도, 막을 수도 없다는 점에서 시간과 재난은 닮아있습니다. 유리는 그 압도적인 힘에 집어삼켜지는 대신 시간의 흐름을 조각내고 질서를 부여합니다. 두려움과 무력함에 맞서 오늘을 살아내려는 이 조용하고도 능동적인 움직임은 우리에게 비극 이후를 살아낼 단단한 동력이 되어줍니다.

먼 곳과 가까운 곳의 비극이 지나간 뒤에는 각자에게 남겨진 몫이 있습니다. 비극이 내 일상의 식탁 위까지 도착했음을 직시하고 정면으로 응시하는 양하의 시선과, 예고 없이 무너진 시간의 공백을 성실히 이어 붙여 삶의 지층을 재건하는 유리의 의지는 전시장 곳곳에서 공명합니다. 사회가 정한 안전한 거리나 적당한 기간에 슬픔을 맞추지 않고, 자신만의 방식으로 재난 이후를 살아가는 두 작가의 기록이 우리 각자에게 작은 용기가 되고, <0.1%의 애정>을 더해보는 계기가 되길 바랍니다.`,
  'daejeon2024-text': `《메신저의 신비한 결속 (Mysterious Solidarities of Messengers)》

전시 《메신저의 신비한 결속 (Mysterious Solidarities of Messengers)》은 인간과 자연 그리고 예술 사이에 일어나는 고유한 감각의 총체와 교감적 경험을 메신저(Messenger)의 영역에 빗대어 이야기한다.
먼저 하나의 가설로서 메신저의 역할에 주목하는 전시는 그 기원과 유래를 되짚어 상상력을 자극하는 지점을 시작점 삼는다. 신화 속, 지상과 지하를 넘나들며 신의 메시지를 전달하는 정령 헤르메스(Hermes)의 세계, '알리다'라는 뜻의 라틴어 'annuntio'에서 파생된 수태고지(Annunciation) 속 가브리엘과 같은 천사는 명시적 상호관계에서 배제된 안내자이자 매개자, 기생자 등 중간자의 의미로 수렴하는 지대를 점유해왔다. 이들은 구체적인 형상과 무형의 절대성을 경유하며 깜박이는 빛, 섬광, 기류, 회로 속 잡음에 담긴 이동체의 모습으로 출현하고 사라지기를 반복한다. 미셸 세르(Michel Serres)는 저서 『천사들의 전설 (La légende des anges)』에서―기존의 시간과 공간 개념이 전제하는―국지적(régional) 개념을 벗어나 정합적 총체를 부여해 확장하는 순환의 지지체를 무수한 형태의 천사들에 대입해 서술한바 있다. 메신저는 다른 하나 또는 여러 개의 관계를 맺으며, 수직·수평의 길을 열어내는 심원이자 세계를 향한 연결고리가 되어, 새로운 인식론적 지도를 만들어 나간다. 전시는 이러한 전개에 비추어 우리를 둘러싸고 있지만 보이지 않는, 언어로 표현하기 어려운 존재 형태의 가능성을 살펴본다. 점(點)적인 상태의 대지를 발견하고 미지의 영역 속 발화자를 인식할 가능성은 '선택된 감각'과 '결합의 형태'인 조형 언어와 미술의 자율적 실천에서 포착된다. 전시는 작품을 구성하는 물질과 비물질 사이 근원적 생의 토대를 발견하고 연결한다는 점에서 '메신저'의 역할과 기능을 환대한다.

헤르메스의 어원은 '헤르마(ἕρμα, herma)'이며, 여기서 파생된 단어는 횡단, 이동, 전이와 같은 뜻을 가진 헤르메틱(hermetic)이다. 전시를 통해 소개하는 여섯 작가 고산금, 배인숙, 유리, 이빈소연, 이산오, 이유경은 인간과 비인간, 자연과 비자연의 특별한 구분 없이 헤르메틱적 관념과 개념에 접근하여, 다양하게 흩어져 있는 감각과 경계의 결합을 횡단한다. 전시명 '메신저의 신비한 결속'은 파스칼 키냐르(Pascal Quignard)의 소설 『신비한 결속』에서 가져온다. 우리를 둘러싼 미지의 영역을 향해 서사를 전개하는 키냐르의 소설은 보이지 않지만, 신비한 충만함으로 감각될 이번 전시의 주제에 겹쳐진다. 감각적 경험과 의식의 연대로 뒤얽힌 망은 지금 여기, 하나로 결속한다.

"우선 구축된 망이 있는데, 우리는 그 속에서 살고 있어. 그리고 온갖 종류의 순환이 있지. 다음으로 물리적 흐름의 세계가 있어 (...) 바람, 해류, 빙하, 화산 등이 전하는 미묘한 메시지들을 읽어 내기가 매우 어려워서, 그것들을 해독하는 데 너무나 많은 기간이 걸린다면, 그것들을 지능이 있는 존재물이라고 판단하는 것이 합당하지 않을까? 그토록 정확하고 정교하고 더없이 훌륭하게 코드화된 언어를 누가 감히 말할 수 있을까?"  (Michel Serres, 『천사들의 전설-현대의 신화』, 이규현 역, 그린비, 2008, p39)

이빈소연은 우리를 둘러싸고 있는 여러 상황과 그 안에서 벌어지는 관계성에 주목하며, 영상, 설치, 디지털 페인팅 등 다양한 매체를 섬세하게 다루어왔다. 이번 전시의 출발점이 되는 <페어리 모빌리티 투자유치설명회 비디오: 고아를 만드는 기계>(2023)는 인간과 문화, 자연에 깃들어 있는 송·수신자 간 이동의 영역과 사라져 가는 메시지의 전달체계를 추적하며, 요정이 그린 원호이자 균륜인 '페어리 링'(fairy ring)'에서 그 기원을 찾는다. 한편 작가는 한국 가족 관계에서 비롯한 독특한 캐릭터를 가진 고모와 작가 자신 사이에서 일어난 어린 시절 좌충우돌 사건을 바탕으로, 사변적 상상을 교차시킨 설치 작품 <링 링>(2024)을 선보인다. 작가가 설계한 '페어리 모빌리티'에서 복제되는 '고아(孤兒)'는 이제는 찾아볼 수 없는 전화기 선 너머의 잡음과 실패로 끝난 고모와의 소통을 이으며, 현실을 재편한다. 이유경은 과거 3D CG 온라인 게임 '세컨드 라이프(Second Life)'에서 한 공간에서 다른 공간으로 이동하는 텔레포트(teleporting)도중 그래픽 오류로 인해 아바타 신체의 일부를 잃었다. 이 경험은 뉴질랜드와 영국으로 이주해 보낸 작가의 개인적인 시간과 장거리 연애, 줄여서 롱디(Long-distance relationship)로 불리는 경험에 자연스럽게 싱크된다. 신체에 내재한 '연결'이라는 감각과 자아개념2은 현실과 전자 매체를 경유하는 이미지로 투영되며 작업 전반 필연적인 방법론으로 작동한다. 작품 <Self Portrait (자화상)>(2019-2023) 시리즈는 모체가 되는 작가의 신체를 지지체 삼아, 이미지 데이터를 현실 공간에 조각적으로 구현한다. 또한 빈도 높은 교차 메시징 애플리케이션으로 인한 신체의 지각은 작품 <A Lover's Discourse: Fragments (사랑의 단상: 파편들)>(2023)의 투명한 말풍선으로 물질화 되어, 가상과 현실의 통로를 떠다닌다. 연질 PVC, 코팅된 종이, 버블 랩, 글리터 등의 재료를 통해 물성의 단단함을 덜어낸 작품들은 가상 속 실체 없는 양태를 감각하는 경로를 잇는다.2층으로 이어지는 계단 <Connecting… (2)(커넥팅...(2))>(2023)을 따라 올라가면, 전시실로 이어지는 통로 새들의 맑은 지저귐이 들려온다. 배인숙은 음악과 설치를 결합해 그 안에서 신체가 몰입하는 원리를 구성하며, 상호 작용에 의해 완성되는 소리 장치를 제작해 왔다. 작가는 작년 봄과 여름 사이 경기도, 강원도, 제주도 등의 숲에서, 동트기 전 가장 어둡고 고요한 시간에 맞춰 신기루처럼 몰려드는 새들의 소리를 녹음한다. 시미언 피즈 체니(Simeon Pease Cheney)가 새들의 노랫소리를 기보해, 자연의 소리를 음악의 언어로 해석했듯 작가는 소리로만 공간 전체를 장악했던 경험을 8개의 스피커 박스와 LED 빛 인스톨레이션으로 구현한다. 리라(Lyre)의 외양을 떠올리게 하는 작품 <줄인사>(2023)는 기타에서 사용하는 현과 줄감개로 제작되어 하프의 연주법을 사용한다. 20개의 각 현에는 작가의 음성이 담긴 인사말이 녹음되어 있지만, 연주로 인해 인사말은 무작위로 섞여 해독 불가능한 음악이 연주된다. 유리는 매일의 경험과 감정에 반응하는 감각에 주목하며 작업을 시작한다. 작가는 그 과정에서 언어에 기생할 수 없어 말과 글이 되지 못한 세계, 물질에 종속된 명사와 동사의 쓰임에서 벗어난 '소통 체계'를 향해 예리한 촉을 새운다. 동시에 몸과 몸의 환경을 변화시키고 시공을 재조직하는 것들, 결코 언어 체계가 건져내지 못한 현상을 회화로 표현하는 정공법을 취하며 한 장면을 향해 결속하고 매듭짓는 수행을 병행한다. 시간과 존재 차원에서 분산된 회화 작업은 '아티스트 북'이라고도 불리는 4점의 조각 작품 <고작 한 장의 페이지를 넘기기가 쉽지 않았다>(2023-2024)와 함께 설치된다. 작가는 종이 한 장을 넘기는 찰나의 순간을 떠올린다. 지각할 수 있다는 믿음, 들리지 않는 목소리를 증폭시킬 수 있다는 기대를 붙잡으며, 수많은 수신자와 발신자 간의 간극을 연결해 간다. 고산금은 오랜 시간 소설, 신문, 시, 철학서, 법전 등 시각적 기호 체계를 기반으로 하는 텍스트에서 조형적 원리를 탐구해, 화면을 재단하는 시각적 틀을 새롭게 구성해 왔다. 그 과정에서 작업의 주요한 소재인 인공 진주를 사용하여 글자 수와 간격을 따라 일관되게 배치하거나 문장 구조를 해체해 연출하는 작업을 진행한다. 원본의 의미론적 맥락이 탈각된 작가의 수행은 진주의 속성에 내재한 의미와 함께, 의미를 전달하는 수단이 아닌 영혼을 갖는 그 무엇으로 빛난다. 또한 이번 전시에는 <메모리 보드>(2019) 시리즈 일부가 소개된다. 오직 검은색 볼펜으로만 빼곡하게 채워나가는 과정에서, 작가가 선을 그리는 압력에 의해 구김이 생긴 종이는 진주의 우연적인 움직임을 발생시키며 가장 필연적으로 작가의 오랜 사유와 예술적 상상을 투영한다. 이산오는 기억과 무의식 그 사이로 흐르는 무화된 시간에서 취득한 특정 문구와 단어를 드로잉과 함께 기록한다. 이 과정에서 '글이 발생하는 구조와 동등'하게 성립된 불현듯 떠오른 이미지는 드로잉을 연유해 조각, 회화 등 다양한 매체로 인접해 나간다. 시청각적 경험으로 포착할 수 없는 형상을 붙잡아내는 작가의 시도는 작품 곳곳에 등장하는 새의 형상과 초자연적 이미지로 승화된다. 인간, 도시, 신화, 자연을 관통하며 그 가능성을 제시하는 신작 <가이드>(2024), 그리고 마치 그림에서 솟아 나온 듯한 작가의 조각 작품은 삶과 죽음, 지하와 지상, 낮과 밤을 넘나드는 정령이자 중간 지대의 모티브로 작동하며 공간을 수놓는다.

  'pageroom-text': `개인전 《없는 날》 페이지룸8, 2024

박정원 (페이지룸8 디렉터)


"없는 날"은 유리 작가가 회화를 통해 표현하는 이미지가 어떤 직관을 통해 발휘되는지 볼 수 있는 지점에 대한 것이다. 이것에 대해 말하기 전에 2022년 11월에 보았던 작품, 〈임시 풍경〉으로 짧은 글을 시작하고자 한다. 당시 언어만으로 표현할 수 없는 영역에 존재하는 것들에 대한 것을 다루는 작가의 작품에는, 날개를 딛고 오르는 사다리, 바다에 물을 주는 여자, 바퀴 달린 오리 등이 등장했다. 말로 다 표현할 수 없지만 피식 웃음이 나는 것들과 시각만으로 미처 알아차리지 못한 순간들을 이미지로 잠시 붙잡아 둔 것처럼. 그때의 형상은 행복이라는 감정에 애도의 마음마저 편입되어 있는 것처럼. 단, 〈임시 풍경〉(2022)은 좀 달랐다. 작가가 직접 지은 작품명 그대로 임시로 존재하는 풍경을 온전히 표현했기 때문이다. 나무 패널에 심듯이 칠한 짙은 초록 풀과 밤인지 낮인지 모를 하늘에 떠 있는 무지개, 마치 작가가 주무르고 있는 흙더미들이 어떤 형상으로 확정되기를 미룬 채 그 더미를 덮은 장막이 묘한 긴장감을 자아내고 있었다. 신기루와 현존 사이에서 작가의 신체에 차오르는 감성에 의해 발굴되는 이미지들은 계속해서 다음에 이어지는 이야기를 기대하게 만든다. "없는 날"은 〈임시 풍경〉의 더미에 덮인 장막을 걷어내어 또 다른 형상이 만들어지는 풍경을 예고한다.

2024년 2월 29일, 4년간 세상에 없던 날이 도래한다. 유리 작가가 직관적으로 자신의 2월 서른 생일에 연결된 실낱을, 없는 날의 실타래에 작은 리본들을 엮어나가기로 한 것은 어쩌면 당연한 일인 것처럼 여겨진다. 올해 그의 생일에는 달이 지구 둘레를 한 바퀴 도는 데 걸리는 한 달의 시간과 지구가 태양의 둘레를 도는 데 걸리는 일 년의 시간이 일치한다. 게다가 보름달을 품에 안은 꿈을 간직한 채 태어난 작가가 맞이할 생일은 달이 가득 차오르는 날이니 말이다.

〈부유물, 중간의 모양, 혹은 티끌〉은 다양한 인물의 형상을 그린 〈The Unknown〉 9점을 전시장 천고만큼의 나무 패널 그림에 걸어 완성한 회화이자 설치 작업이다. 무명, 미지, 신비의 이미지들은 커다란 날개를 숨기지 못하는 고목이 있는 풍경에 부유하는 동시에 포박되어 있다. 생일은 태어나는 것이고 생일은 순환하고 생일은 언젠가 끝이 난다. 생과 사, 이 철학적이고도 생생한 것은 항상 환희로 귀결되기를 바라거나 두려움으로 점철된다. 살아있는 현존성은 보통은 숨 쉬는 것과 매우 가까워서 놓치고 만다. 천국과 지옥, 또는 연옥으로 표현될 수 없는 곳에서 안개처럼 떠다니는 티끌이 되어보기로 한다.

유리 작가의 『없는 날』은 366점의 드로잉을 엮은 아티스트북이다. 각각의 드로잉에는 자신이 추구하는 세계의 신체적 지평이 되어 떠올려진 이미지들에 날짜를 부여했다. 반짝이며 소멸을 맞이한 순간을 기념일로 만들어 준 것일까. 그렇게 없는 날은 있는 날이 되었다. 페이지를 넘기는 행위는 익명의 누군가의 시각과 접점을 이룬다. 책이 꼭 책이 아닌, 그렇다고 전시의 부록이 아닌, 작가만의 독특한 경계 지점을 형성한다. 유리 작가는 펼치면 안이 바깥이 되고 응시하면 바깥이 안이 되는 상징적인 역설의 세계를 이렇게 책의 물리적인 심미성과 개념에서 발견한다. 한 권의 책을 펼치면, 페이지와 페이지의 틈새에 누구나 무엇이든 개입할 수 있는 여지를 만들듯이, 작가의 작업은 굳게 다문 덩어리에 사이라는 경우의 수를 만들어가는 과정이다.

작가는 현재까지 나무 패널과 캔버스를 혼용하고 있다. 특히 나무 패널에 유채 작업은 스퀴지(squeezing)와 카빙(carving) 제스처가 결합된다. 〈부유물, 중간의 모양, 혹은 티끌〉에서 볼 수 있듯이, 나무 패널 위에 캔버스를 설치함으로써 평면 회화 장르가 입체/설치로 확장된다. 작품 〈무거운 낱말들〉(2023)에서 역시 볼 수 있듯이, 책의 조형성에서 모티프를 얻어 접을 수 있는 조각을 만들거나 조각도로 나무를 파냄으로써 소멸과 함께 떠오르는 형상 등이 흥미롭다. 나무 패널과 캔버스, 그림과 책 등을 잇는 동시에 해체함으로써 재료적 측면에서 또한 작가만의 경계 지점을 구축하는 것을 목도할 수 있다. 더 나아가 작가가 취하는 책과 그림에 대한 태도는 회화와 언어의 개념 자체를 빗겨서는 새로운 발견과 시도임을 알 수 있다.

유리 작가의 직관은 아주 짧은 순간에 선택되는 것이 아니라 경계의 세계가 자신의 신체에 차오름으로써 없는 날이 실제 도래한 것처럼 자연스럽게 체득되어 발휘되는 것이다. 그래서 그의 이미지는 조금은 긴 시간 다양한 감각의 세계에 녹아들어야 완성된다. 이것은 특히 언어로 쉽게 관념이 되어 버리는 세계를 피하기 위한 유보적인 태도일 수도 있지만, 무엇보다 하나의 단상으로부터 작가의 상상력과 통찰이 주된 운동성으로 작용하여 형성된다. 생일이라는 작은 실마리가 이루고 있는 세상에 없던 세계는 "없는 날"에 이미 있었다.

지나간 2024년 2월 29일은 당분간 "없는 날"이 된다. 그리고 다시 〈임시 풍경〉을 떠올려 본다. 여전히 존재하지만 잠시 동안 부재하고, 보이지 않지만 소멸되지 않는 그런 존재와 세계... 단, 선명하게 볼 수 없지만 짧게나마 발을 딛고 촉각으로 닿았던 지점을 기억한다. 〈임시 풍경〉이라는 작품에 대한 개인적인 인상이고 유리 작가의 작품에 대한 소감이기도 하다. 언어로 표현하기 힘든 것을 재현하는 그의 작품이기에 여전히 말과 글로 표현하기 힘들다. 하지만 나 자신에 신기루처럼 증거했던 이미지에 대한 실마리들은 일상에서 서서히 은폐되고 사라진 듯 보일 테지만 불현듯 "없는 날"처럼 특별한 그 무렵의 기억을 더듬듯이 다시 등장하리라 믿고 있다.`,
  'in-text-html': `<div style="white-space:pre-line;">개인전 《느슨히 껴안고 단단히 풀기》 전시 서문


모희 (독립기획자)



&lt;침묵의 시대와 밤의 팡세&gt;

침묵의 시대에 사람들은 의사소통을 적게 하기는 커녕 오히려 더 많이 했다, 라고 니콜 크라우스는 썼다. 이때 사용된 최초의 언어는 손짓이었는데, 언어의 손짓과 삶의 손짓에는 아무런 구분이 없었다. "가령, 집을 짓거나 음식을 만드는 노동은 사랑해 혹은 진심이야 하는 뜻을 전하는 손짓 신호에 버금가는 의사 표현이었다."<sup>1</sup> 모든 표현이 고유한 질량으로 전해지는 시대였다. 겪어본 적 없는 이 시대를 그리워하면서, 오늘의 말과 글이 지닌 무게를 가늠해 본다. 우리의 몸에서 떠나 허공에 감도는 언어들. 잠시 그로부터 멀어질 때, 그러니까 말과 글로 전해지지 않는 것들을 붙잡을 때에 마침내 감각하게 되는 것이 있다. 유리는 말의 무능을 탓하기보다 말과 말 사이를 잇는 짧은 간격의 침묵을 가만히 들여다본다. 침묵의 시대가 그랬듯, 그의 회화는 삶을 이루는 풍경과 언어의 경계를 흐린다. 또렷이 쥐어진 말 사이로 새어 나가는 말들, 어룽거리는 단어와 문장들은 유리의 그림 위에서 간신히 연결된다.

이런 연유에서 전시 《느슨히 껴안고 단단히 풀기》는 모호한 정경으로 가득하다. 유리는 문자로 고정된 글과 이미 전해진 말보다 고스란히 남지 않고 끊임없이 흐르는 것들에 관심을 둔다. 이를테면 지금도 한 글자에서 다음 글자 위로 지나가는 시간, 갈수록 흐릿하고 어렴풋해지는 기억, 이것과 저것, 당신과 나 사이의 관계와 같은 것. 이를 그림으로 서술하는 일은 시각 매체로서 회화가 지닌 함축적인 언어를 소화해내는 과정에 다름 아니다. 기의로부터 떨어져 나와 부유하는 기표들의 집합은 그림 안에서 그들만의 기호체계와 뉘앙스를 형성한다. 네 개의 칸으로 구획된 &lt;잠깐 스쳐지나간 죽음에게&gt;에서 사물과 풍경은 서로의 관계, 실재하는 대상과의 필연적인 관계를 상실한 채 의미의 생성을 지연시킨다.

그림에 붙여진 제목은 다시금 언어로 돌아가 텍스트와 화면 속 이미지의 틈을 상기시키기도 한다. 제목에는 유독 '무게'와 관련된 단어가 자주 등장하는데, '어떤 사건들의 무게'나 '가벼운 위로', '무거운 낱말'과 같은 것이 그렇다. 수식과 별개로 유리의 그림은 어쩐지 한결같이 무거운 그림일 것만 같다. 말이 짊어지지 못한 것들을 대신 짊어지고자 자처하는 그림이기 때문이다. 그러나 이미지와 텍스트 간의 성근 연결은 언제든 비집고 들어오거나 빠져 나갈 수 있는 틈을 마련해 놓는다. 이러한 틈을 시각화한 상징적인 소재로서 '주변시'<sup>2</sup>는 경계에 있는 것들을 주시하는 작가의 태도에 비유된다(&lt;시선이 닿지 않는 곳을 응시하는 태도로&gt;). 초점에서 빗겨 나가 희미한 형상은 그림의 전면에 등장함으로써 새로운 지위와 시선을 획득한다.

한편 책은 물성을 획득한 언어로, 유리의 회화와 가장 가까운 형태를 지닌 사물일 것이다. 우리의 말들은 책이라는 종이 묶음을 통해 침묵의 시대에서 오늘날에 이르는 이야기를 전할 수 있었다. 그렇다면 책에 담지 못한 이야기, 차마 적지 못한 말들은 어디로 갈까? 책을 닮은 유리의 그림은 이런 물음에서 시작한다. 그가 아무렇게나 펼쳐 든 책의 낱장은 마침표 없는 문장처럼 하나의 기다란 그림으로 이어진다. 전시와 동명의 제목을 가진 그림에서, 사물은 말의 내용, 즉 책 속의 텍스트 자체보다 소리 내어 읽는 말소리를 닮아 간다. 높낮이가 다른 파동 안에서 밤의 조도를 띤 낱개의 사물은 서로를 &lt;느슨히 껴안고 단단히 풀기&gt;에 이른다. 이 약한 연결은 밤빛이 파고든 사물의 작은 틈새, 이름 부를 수 없이 조용한 침묵 사이로 뭉근히 지속될 테다.

'아무 말도 없이 잠잠히 있는 상태'로서의 침묵과 '해가 진 뒤 어두워진 때'로서의 밤에는 어딘가 비슷한 구석이 있다. 모두 말과 낮 바깥으로 지나가는 일시적인 상태이자 시간이라는 점에서 그렇다. 유리의 그림이 침묵과 밤의 시간에 가 닿고자 하는 것은 영원하지 못하고 잠시 머무르는 것들을 사랑하는 까닭이다. 그의 그림에 담긴 사물의 생은 아마 우리의 시간 보다 길게 주어질 것이다. 이 사실이 왠지 모종의 위안을 준다.

사물들의 고요한 질서 사이에서, 침묵과 밤을 몰아내지 않은 채 그려진 그림이 있다. 말과 빛 없이도 어떻게든 전해지는 그림이다.</div>
<div style="white-space:pre-line;font-size:0.85em;margin-top:2.5em;"><sup>1</sup> 니콜 크라우스, 민은영 역, 『사랑의 역사』, 문학동네, 2020, p.111.
<sup>2</sup> 주변시란 시야의 주변부에 대한 시력을 뜻한다. 중심부보다 시력이 나쁘고 색각도 약하지만 약한 빛이나 움직임을 보는 힘은 강하다. 표준국어대사전.</div>`,
  'upandcoming-text-html': `<div style="white-space:pre-line;">월간미술 2024년 2월호 [UP-AND-COMING ARTISTS]

김소정 (월간미술 기자)


&lt;언어로 부름받지 못한 존재에게 보내는 시&gt;

우리는 모두 그런 경험을 해보았을 것이다. 예사로 쓰이는 단어 하나가 갑자기 낯설어지던 오묘한 경험을, 그덕에 평범한 일상에 무심히 놓인, 그 단어가 지칭하는 대상이 순식간에 방안의 코끼리만한 비중으로 '시뮬라시옹' 되는 현장을 목격한 경험을 말이다. 사회적 약속으로의 언어는 표준의 규칙, 예외의 규정, 쓰임의 범주 등 각종 규범으로 점철되어 있다. 보이는 것을 지칭하고 보이지 않는 대상을 상상하거나 사고 체계를 수립하고 현상을 정의하며 타자와 소통하는 인간의 모든 사회화 행위는 언어라는 재료에서 비롯되고 또 진화해 왔다.

여기, 그와 같은 견고한 세계에 귀속되지 않는 모호한 존재들이 있다. 작가 유리는 제도화된 언어로 명명할 수 없는 형상, 추상의 사고 혹은 난해한 감정과 같은, 실재와 현존 사이에서 숨바꼭질하는 대상을 과감히 화면으로 불러 냈다. 일상의 파편들로 이뤄진 이들은 〈미완의 교차점>(2023)에 모여 저마다의 세계를 모색하거나 <아주 느슨한 시>(2023)의 그로테스크한 시상을 구성하거나 <깃털과 낙엽의 시간>(2023)을 묵묵히 견디는 모습을 보여 준다. 그리고 작가는 언어 경계 바깥에 놓인 이들에게 각별한 애정을 쏟으며, "언어의 틈새"라고 표현한 시공간으로 보는 이를 끌어당긴다.
예중과 예고를 거쳐 국내 미술대학에 진학한 유리는 진작 그림 그리는 사람으로 살기로 작정했지만 작업과 자아 사이에서 지독한 혼란을 겪었다. 그림을 감정의 해소 장치로 여기며 "토해내는" 작업을 하다가 불현듯 독일로 도망치듯 떠나 1년간 언어 공부에 몰두했다. 그곳에서 작가는 새로운 자극을 받으며 나름의 작업을 지속할 수 있었고, 무엇보다 외국어를 사용하면서 언어와 실체간의 (비)합리적인 관계에 주목하게 됐다. 이는 사용하는 언어가 화자의 정체성을 좌우하는 방식을 맛본 개인의 체험에서 부터, 한 특정한 언어만이 지시할 수 있는 대상을 둘러싼 사회문화적인 문제까지를 아우르는 것이었다.

그럼에도 언어의 숨겨진 이면을 드러내고자 하는 작가의 작업은 그 의도만큼 선언적인 성격을 띠지 않는다. 애초에 "다만 하나의 몸짓에 지나지 않"은 대상들은 화면 위에서도 여전히 적당한 이름을 갖지 못한 것으로 보이는데<sup>1</sup>, 정작 모호한 현 상황을 크게 개의치 않는 모습으로 비치고 있다. 물체나 인체, 또는 그 중간의 형태를 띠고 있는 대상은 그간 언어의 역할이 과대평가 되었음을 고하기라도 하듯이 당당하기까지 하다. <하늘과 가장 먼 하늘에서〉(2023)에는 인간과 영적 존재의 변천 과정인 듯한 6개의 장면이 연출된다. 각 화면을 가득 채운 나무토막과 같은 인체 형상은 특정한 상황에 놓인 듯 여러 자세를 취하고 있는데, 사건의 시간적 전개나 인과관계를 탈피한 무정형의 존재 그대로의 모습을 적나라하게 드러낸다.
이처럼 말로 표현할 수 없는 소재와 독특하게 무거운 색채로 화면을 구성하여 혼란을 겪는 관람자의 몰입을 유도하는 한편, 작가는 작품의 제목을 통해 감상의 실마리를 제공한다. '없는 단어로 만든 문장'이나 '중간의 사물들'과 같은 작품명은 비언어의 세계를 발현시키려는 작가의 의도가 개입한 결과다. 그중에서도 <아주 느슨한 시>는 작품 제목을 통해 직접적으로 운율과 행간의 호흡까지 염두에 두고 그림을 읽을 것을 요구한다. 단어와 문장의 논리적 결합보다 맥락을 파악하고 분위기를 전달할 수 있는 시처럼, 관람객은 상상과 연상을 근간으로 작가가 변주한 시각언어를 해석하게 되는 것이다.

유리는 언어가 온 세계에 편재한다고 해도, 역사와 시간과 세대가 지남에 따라 무한증식하며 생존한다고 해도, 언어가 건드릴 수 없는 사각지대는 영원히 신비한 영역으로 남을 것을 믿는다. 그리하여 언어가 모방하는 세계를 잠시라도 탈피할 수 있는 그의 거처에서 우리는 더욱 자유롭게 '낯선' 단어들의 우회를 즐길 수 있다.</div>
<div style="white-space:pre-line;font-size:0.85em;margin-top:1em;"><sup>1</sup> 김춘수의 『꽃』 은 이름이 불리고 존재가 인식될 때 비로소 실존의 위상을 획득하는 대상(인간)을 다룬다.</div>`,
  'review-text': `《투명한 고리》 전시 리뷰


김해서(작가)

<여기, 우리가 만나는 곳>



  나에겐 흰 개가 있었다. 꼬리가 길고 날렵했으며, 햇빛을 받을 때마다 짙은 눈은 콜라처럼 톡 쏘는 갈색을 띠곤 했다. 귀가 쫑긋한 진도믹스. 이름은 흥구.

오래전에 나는 녀석을 떠나보냈으나, 순천 외서면 대숲이 많은 엄마의 고향 마을로 들어서는 순간마다 되살아나 짖어대는 녀석을 잠재우느라 지금도 속으로 '쉿-'을 외곤 한다. 그렇다. 흥구는 외할아버지가 키우는 개였으므로 엄밀히 말하면 나는 그 개를 가진 적 없다. 흥구에게 나는 어쩌다 한 번 마주하는 애, 오묘하지만 역겨운 데가 있는 도시 냄새를 풍기는 계집이었을 것이다. 심드렁한 표정으로 인간들 사이에 있다가 가끔 다가와서 머리와 콧등을 쓰다듬고 돌아서는, 녀석이 후한 마음으로 손바닥을 핥아주기라도 하면 눈썹을 꿈틀거리고 질색하는 알 수 없는 계집 말이다.

외할아버지가 암 진단 한 달 만에 돌아가시고, 얼마 되지 않아 녀석은 자취를 감췄다. 외할머니의 독단적인 결정으로, 개는 다른 이의 손에 넘겨졌다. 당신 반려의 죽음만큼이나 마음을 어지럽히는 게 반려가 애지중지한 개였던 모양이다.흥구는 노견에 속했으므로, 나는 엄마와 엄마 형제들 사이에서 스치는 흥구의 미래를 들으며('아버지 옆에 묻어주자.', '산에 뿌려 주는 게 좋지 않을까.'), 주인을 잃은 개가 어떤 표정을 짓는지 측은지심을 안고 관찰하곤 했는데, 그랬는데, 개는 그토록 갑자기 사라지고 말았다. 사실을 알았을 때 모두가 실색했다. 외할머니의 차가운 표정에 누구도 선뜻 입을 뗄 수는 없었기에, 흥구를 걱정하고 그리워하는 마음을 비추는 자는 이후에도 나타나지 않았다.

나 역시 그랬다. 이 가족의 비정함에 놀랐으나 어디까지나 흥구는 외할아버지의 개였으니 외할머니의 소관이고, 나와는 명절이나 가족 행사마다 마주친 게 전부였으니까. 중요한 상실은⋯ 아니다.

그래서 이해되지 않았다. 그 개의 환영과 환청을 만날 때마다.

     개가 떠나기 몇 주 전, 어른들은 흥구의 목줄을 자주 풀어주며 마당을 노닐게 해주었다. 기쁜 개의 발걸음은 시멘트 마당 위에서 '토도도도도' 소리를 내며 멈추지 않았다. 그리고 나는 들었다. 외할아버지 투병 기간에 모두가 피난 가듯 짐을 바리바리 싸 병원으로 떠났을 때, 흥구는 할아버지가 평소보다 듬뿍 주고 간 사료를 조금씩 나눠 먹은 덕에 굶어 죽지 않고 버틸 수 있었다고. 삼촌들 중 한 사람이 2주만에 방문했을 때도 녀석은 사료를 다 먹지 않고 남겨두기까지 했다. 그것을 끝으로, 흥구에겐 또다시 긴 기다림이 있었고 금방 돌아오겠다던 주인이 다시 대문을 열고 들어오는 일은 없었다.

외할아버지의 유품과 유산이 정리되는 과정 속에서, 나는 귀를 세웠다. 어른들의 이야기에서 다시 '흥구'가 등장하지 않을까 기다렸던 것 같다. 할아버지는 흥구를 아꼈으니까. 그러나 내가 아는 것은 여기까지다.

외할머니가 자식들은 물리고 내 아빠인 사위 한 명만을 밭에 데리고 가, 당신 남편이 평소 아끼던 옷가지와 소지품 몇 가지를 태운 날, 사고로 세상을 뜬 첫째 아들과 남편 이름을 부르짖으며 무너졌다는 얘기를 들었던 날, 장례식장에서도 곡소리 없이 멍하게만 있던 당신 얼굴을 떠올림과 동시에 나는 더 이상 그 개의 사정에 대해 의문을 품지 않았다.

이제 나는 흥구를, 조용히 추적하고 있다. 아니, 정확히는 흥구의 자취를. 시간이 흐르며 흥구의 전체성은 흐려지고 일부만 기억이 난다. 마치 내가 외할아버지를 그릴 때 두툼한 손과 금니 빛나는 미소, 밀짚모자를 떠올리는 것처럼. 그 개의 사뿐거리는 발재간에 맞춰 울리던 발톱소리가 마당 너머 대숲의 나무끼리 부딪히는 소리와 분간되지 않는다. 시골마을 개들이 낯선 자동차의 등장에 떼 지어 짖을 때마다 그 개를 떠올리지만, 녀석은 우리가 '우리'라는 것을 인지하면 짖기를 멈췄으므로 끊이지 않는 소음 속에서 내 기분은 혼자만의 것이 됐다.


*


그리고 2025년 12월, 유리 작가의 전시 《투명한 고리 : Shapeless Loop》를 보았다. 어째서인지 이 전시는 갈 데 없는 내 마음, 죄책감과 허무함 그리고 염치없는 그리움을 물결치게 만들었다. 아마도 그 시작은 작품 〈멀고 검은 자국〉의 짐승 형상 때문이었을 것이다. 망아지인지 개인지 알 수 없는 네발 달린 짐승 형상은 내 안의 개, 뚜렷한 자국을 건드렸다. 나의 흰 개는 이제 흰 개가 아닐지도 모른다. 무엇으로도 빗대어 설명할 수 없는 비정형의 개가 되어 있을 것이다. 그것과 나의 관계는 스틱스강을 사이에 두고 어긋나 버리고 말았지만, 개는 이어지는 삶 속에 추상적인 레이어로 내려앉는다. 그리고 레이어가 내 차원에 드리워질 때마다 우린 만나는 것이다. 때론 발소리로, 때론 울음소리로, 때론 '착각'이나 '환상'으로밖에 해명할 수 없는 어떤 연결로.

입체 작품 〈상실의 가능성과 영원의 염원〉은 아마도 그 환상적인 접촉을 대변하는 가장 완벽한 '책'이다. 투명 레진과 나무 블럭으로 빚어진 책의 페이지를 나는 분명히 넘기며 읽었다고 믿는다. 탁색의 물감으로 덧입혀진 나무 책 속 짐승은 투명한 레진 북 안에서 빨간 실과 천으로 해체된다. 물속에서 분해되는 심장과도 같이 선연함을 뿜으며 선과 면으로 분리된 그것. 이제 공기에 산화되지 않으니, 진공 상태로 영원히 고정될 '몸이었던' 것. 이 투명한 책이 기어코 말하는 것은, 말하지 않음으로써 건넬 수 있는 신호가 있음을 알아달라는 거라고, 그렇게 느꼈다면 우스울까.

나와 흰 개, 나와 흰 개였던 것, 나와 더는 흰 개 아닌 것 사이에도 한 줄의 실이 놓여 있다면, 지금의 나는 연결된 실을 톡톡 두드려 볼 용기가 있을 것이다. 돌아오는 기척이 느껴지지 않다 하더라도.

이후에 만난 〈긴 꼬리 책〉과 〈긴 꼬리 책 : 떨어져 나온 문장(1~14)〉의 이미지들은 삶과 죽음 사이 불가항력으로 부여된 서사를 보여주되, 혼탁한 과거와 불분명한 미래를 잇고자 하는 의지를 내는 듯 접는 듯 혼란스러운 일면으로 다가왔다. 느낌표와 물음표, 반점과 온점이 한 데 뒤섞인, '어떤 말 하나를 꺼내기 위해 지나온 모든 삶을 설명해야 하는 자'가 찍은 구두점들의 집합처럼. 아티스트북 연작을 시작했다는 2023년부터 지금에 이르기까지 유리 작가가 밟고 온 찰나들이 이러했을까. 그리고 우리, 살아남은 자가 머무는 세계의 시간이 정말로 그렇게 흐르고 있는 것일까.

나는 무시무시한 비밀을 목격한 사람 마냥 달뜬 두려움에 젖어, 전시장 입구에 걸린 〈투명한 고리〉를 다시 한번 들여다보았다. 생과 사, 두 개의 꽃은 쌍둥이꽃이라 봐도 무방할 정도로 닮았다. 두 송이 다 싱싱해 보이기도 하고 두 송이 다 어딘가 시들해 보이기도 한다. 다른 방향으로 뻗어가며 성장하는 듯하지만, 결국 하나의 리본으로 묶인 처지. '투명한 고리'는 바로 저 작은 리본만큼 강력하면서도 연약한 힘이다.


*


외할아버지가 돌아가신 지 10년도 더 지났고, 이제 순천 시골집에 흰 개 대신 노란 고양이들이 산다. 더는 어떤 것에도 정 붙이기 싫다던 외할머니는 녀석들에게 마당과 뒤뜰만은 허락해 줬다. 가끔 먹을 것도 던져 준다. 덕분에 그 노란 고양이 가문은 3대째 터를 잡고 호의호식하고 있다. 처음엔 경계심이 강한 녀석들이었는데, 세대를 거듭할수록 사람 손도 탄다. 엄마와 엄마 형제들도 전용 사료를 틈틈이 보내는 것으로 보아, 아마도 외할머니는 좋든 싫든 야옹거리는 성가신 소리를 받아들여야 할 것이다.

나는 이번에도 먼 도시 출신 이방인으로서 아주 가끔 그곳에 들러 고양이들을 예뻐해 주고 있다. 그리고 나의 개를 생각한다. 고양이의 호박빛 눈동자를 보면서 콜라색 눈을, 흰 속눈썹을, 긴 따뜻한 혀를, 검은 발바닥을, 날 보며 흔들던 꼬리를.




*제목은 존 버거의 저서 『여기, 우리가 만나는 곳』(열화당)에서 따온 것입니다.`,

// ── DOM REFS ───────────────────────────────────────────────────────────
const menuToggle   = document.getElementById('menuToggle');
const menuCloseBtn = document.getElementById('menuCloseBtn');
const menuPanel    = document.getElementById('menuPanel');
const menuDivider  = document.getElementById('menuDivider');
const layout       = document.getElementById('layout');
const rightPanel   = document.getElementById('rightPanel');
const rightCover   = document.getElementById('rightCover');
const projectImgs  = document.getElementById('projectImages');
const textContent  = document.getElementById('textContent');
const splitView    = document.getElementById('splitView');
const langBtn      = document.getElementById('langBtn');

let menuOpen = false;
let currentState = null;

// ── 메뉴 아이템 재귀 빌드 ─────────────────────────────────────────────
function buildItems(container, items, usePrefix = false) {
  items.forEach(item => {
    if (item.t === 'cat') {
      const el = document.createElement('div');
      el.className = 'cat-label';
      el.textContent = item.label;
      container.appendChild(el);
    } else if (item.t === 'show') {
      const el = document.createElement('div');
      el.className = 'acc-item';
      el.dataset.imgKey = item.imgKey || '';
      el.dataset.itemLabel = item.label;
      el.dataset.itemId = item.id || '';
      el.dataset.itemTextKey = item.textKey || '';
      el.dataset.itemTextImgPath = item.textImgPath || '';
      el.dataset.itemImgCaptionKey = item.imgCaptionKey || '';
      el.dataset.itemSplitImg = item.splitImg || '';
      el.dataset.itemSplitImgs = item.splitImgs ? JSON.stringify(item.splitImgs) : '';
      el.dataset.itemSplitItems = item.splitItems ? JSON.stringify(item.splitItems) : '';
      el.dataset.itemSplitText = item.splitText || '';
      el.textContent = (usePrefix && !item.noPrefix) ? '- ' + item.label : item.label;
      el.addEventListener('click', () => onShowClick(item, el));
      container.appendChild(el);
    } else if (item.t === 'acc') {
      const wrap = document.createElement('div');
      const header = document.createElement('div');
      header.className = 'acc-header';
      const isYear = /^\d{4}$/.test(item.label);
      if (isYear) {
        header.dataset.label = item.label;
        header.dataset.arrow = '1';
        header.textContent = '▶ ' + item.label;
      } else {
        header.textContent = item.label;
      }
      const body = document.createElement('div');
      body.className = 'acc-body';
      buildItems(body, item.items, isYear);
      header.addEventListener('click', () => toggleAcc(body));
      wrap.appendChild(header);
      wrap.appendChild(body);
      container.appendChild(wrap);
    }
  });
}

// ── 메뉴 빌드 ─────────────────────────────────────────────────────────
menuStructure.forEach(node => {
  if (node.t === 'sep') {
    menuPanel.appendChild(Object.assign(document.createElement('hr'), { className: 'menu-sep' }));
    return;
  }
  const wrap = document.createElement('div');
  wrap.className = 'menu-inner';
  if (node.t === 'nav') {
    const el = document.createElement('div');
    el.className = 'nav-item';
    el.dataset.navKey = node.key;
    el.textContent = node.label;
    el.addEventListener('click', () => onNavClick(node.key, el));
    wrap.appendChild(el);
  } else if (node.t === 'acc') {
    const header = document.createElement('div');
    header.className = 'acc-header';
    header.textContent = node.label;
    const body = document.createElement('div');
    body.className = 'acc-body';
    buildItems(body, node.items, true);
    header.addEventListener('click', () => toggleAcc(body));
    wrap.appendChild(header);
    wrap.appendChild(body);
  }
  menuPanel.appendChild(wrap);
});

// ── Works/Exhibitions + 연도 아코디언 초기 열기 ───────────────────────
(function initOpenAccordions() {
  menuPanel.querySelectorAll('.menu-inner > .acc-header').forEach(header => {
    if (header.textContent.trim() === 'Works/Exhibitions') {
      const body = header.nextElementSibling;
      body.dataset.alwaysOpen = '1';
      body.classList.add('open');
      body.style.maxHeight = '9999px';
    }
  });
})();

// ── 아코디언 토글 (형제만 닫기) ──────────────────────────────────────
function toggleAcc(body) {
  if (body.dataset.alwaysOpen) return;
  const isOpen = body.classList.contains('open');
  const grandparent = body.parentElement?.parentElement;
  if (grandparent) {
    grandparent.querySelectorAll(':scope > * > .acc-body').forEach(b => {
      if (b.dataset.alwaysOpen) return;
      b.style.maxHeight = '0px';
      b.classList.remove('open');
      const h = b.previousElementSibling;
      if (h && h.dataset.arrow) { h.textContent = '▶ ' + h.dataset.label; h.classList.remove('is-open'); }
    });
  }
  if (!isOpen) {
    body.classList.add('open');
    body.style.maxHeight = '9999px';
    const header = body.previousElementSibling;
    if (header && header.dataset.arrow) { header.textContent = '▼ ' + header.dataset.label; header.classList.add('is-open'); }
  }
}

// ── nav 클릭 (C.V, Contact) ───────────────────────────────────────────
function onNavClick(key, el) {
  clearActive();
  el.classList.add('active');
  currentState = { type: 'nav', key };
  updateLangHref();
  layout.classList.add('project-open');
  langBtn.classList.add('content-open');
  menuToggle.classList.add('content-open');
  rightCover.classList.add('hidden');
  projectImgs.classList.remove('active');
  projectImgs.innerHTML = '';

  const html = key === 'cv' ? cvHTML : key === 'contact' ? contactHTML : '';
  textContent.innerHTML = html;
  textContent.classList.add('active');
  rightPanel.scrollTop = 0;
  if (window.innerWidth <= 768) closePanelOnly();
}

// ── 전시/텍스트 클릭 ──────────────────────────────────────────────────
function onShowClick(item, el) {
  clearActive();
  el.classList.add('active');
  currentState = { type: 'show', id: item.id || null, imgKey: item.imgKey || null, label: item.label };
  updateLangHref();
  layout.classList.add('project-open');
  langBtn.classList.add('content-open');
  menuToggle.classList.add('content-open');
  rightCover.classList.add('hidden');

  if (item.splitItems || item.splitImg || item.splitImgs) {
    projectImgs.classList.remove('active');
    projectImgs.innerHTML = '';
    textContent.classList.remove('active');
    textContent.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'split-view';
    const items = item.splitItems || (item.splitImgs || [item.splitImg]).map((src, i) => ({ img: src, text: i === 0 ? (item.splitText || '') : '' }));
    items.forEach(si => {
      const row = document.createElement('div');
      row.className = 'split-row';
      const imgWrap = document.createElement('div');
      imgWrap.className = 'split-view-img';
      const img = document.createElement('img');
      img.src = si.img;
      img.alt = '';
      imgWrap.appendChild(img);
      const textWrap = document.createElement('div');
      textWrap.className = 'split-view-text';
      textWrap.textContent = si.text || '';
      row.appendChild(imgWrap);
      row.appendChild(textWrap);
      wrap.appendChild(row);
    });
    splitView.innerHTML = '';
    splitView.appendChild(wrap);
    splitView.style.display = 'block';
  } else if (item.textKey) {
    splitView.style.display = 'none';
    splitView.innerHTML = '';
    projectImgs.classList.remove('active');
    projectImgs.innerHTML = '';
    textContent.innerHTML = '';
    if (item.textKey.includes('-html')) {
      textContent.innerHTML = textsContent[item.textKey] || '';
    } else {
      const pre = document.createElement('pre');
      pre.style.cssText = 'white-space:pre-wrap;font:inherit;margin:0;';
      pre.textContent = textsContent[item.textKey] || '';
      textContent.appendChild(pre);
    }
    if (item.textImgPath) {
      const img = document.createElement('img');
      img.src = item.textImgPath;
      img.alt = '';
      img.style.cssText = 'display:block;width:100%;margin-top:84px;';
      textContent.appendChild(img);
    }
    textContent.classList.add('active');
  } else {
    splitView.style.display = 'none';
    splitView.innerHTML = '';
    textContent.classList.remove('active');
    textContent.innerHTML = '';
    const imgs = item.imgKey ? (exhibitionImages[item.imgKey] || []) : [];
    projectImgs.innerHTML = '';
    if (item.imgColumns === 2) {
      projectImgs.classList.add('grid-2');
    } else {
      projectImgs.classList.remove('grid-2');
    }
    imgs.forEach(src => {
      const img = document.createElement('img');
      img.src = src;
      img.alt = '';
      projectImgs.appendChild(img);
    });
    if (item.imgCaptionKey && textsContent[item.imgCaptionKey]) {
      const cap = document.createElement('div');
      cap.style.cssText = 'margin:24px 0 0;font:inherit;line-height:1.5;';
      if (item.imgCaptionKey.includes('-html')) {
        cap.innerHTML = textsContent[item.imgCaptionKey];
      } else {
        const pre = document.createElement('pre');
        pre.style.cssText = 'white-space:pre-wrap;font:inherit;margin:0;';
        pre.textContent = textsContent[item.imgCaptionKey];
        cap.appendChild(pre);
      }
      projectImgs.appendChild(cap);
    }
    projectImgs.classList.add('active');
  }

  rightPanel.scrollTop = 0;
  if (window.innerWidth <= 768) closePanelOnly();
}

// ── 전체 active 초기화 ────────────────────────────────────────────────
function clearActive() {
  menuPanel.querySelectorAll('.nav-item, .acc-item').forEach(el => el.classList.remove('active'));
}

// ── 랜딩 복귀 ────────────────────────────────────────────────────────
function returnToLanding() {
  clearActive();
  currentState = null;
  updateLangHref();
  langBtn.classList.remove('content-open');
  menuToggle.classList.remove('content-open');
  menuPanel.querySelectorAll('.acc-body').forEach(b => { b.style.maxHeight = '0px'; b.classList.remove('open'); });
  layout.classList.remove('project-open');
  projectImgs.classList.remove('active');
  projectImgs.classList.remove('grid-2');
  projectImgs.innerHTML = '';
  textContent.classList.remove('active');
  textContent.innerHTML = '';
  splitView.style.display = 'none';
  splitView.innerHTML = '';
  rightCover.classList.remove('hidden');
  rightPanel.scrollTop = 0;
}

// ── MENU TOGGLE ───────────────────────────────────────────────────────
function openMenu() {
  menuOpen = true;
  menuPanel.classList.add('open');
  menuDivider.classList.add('visible');
  menuToggle.classList.add('hidden');
}

function closeMenu() {
  menuOpen = false;
  menuPanel.classList.remove('open');
  menuDivider.classList.remove('visible');
  menuToggle.classList.remove('hidden');
  returnToLanding();
}

function closePanelOnly() {
  menuOpen = false;
  menuPanel.classList.remove('open');
  menuDivider.classList.remove('visible');
  menuToggle.classList.remove('hidden');
}

function updateLangHref() {
  if (!currentState) { langBtn.href = 'en.html'; return; }
  const p = new URLSearchParams();
  if (currentState.type === 'nav') {
    p.set('view', currentState.key);
  } else {
    p.set('view', 'show');
    if (currentState.id) p.set('id', currentState.id);
    else if (currentState.imgKey) p.set('key', currentState.imgKey);
    else p.set('label', currentState.label);
  }
  langBtn.href = 'en.html?' + p.toString();
}

function restoreStateFromURL() {
  const p = new URLSearchParams(window.location.search);
  const view = p.get('view');
  if (!view) return;
  openMenu();
  if (view === 'cv' || view === 'contact') {
    const el = menuPanel.querySelector(`[data-nav-key="${view}"]`);
    if (el) onNavClick(view, el);
  } else if (view === 'show') {
    const id = p.get('id');
    const key = p.get('key');
    const label = p.get('label');
    const el = id
      ? menuPanel.querySelector(`[data-item-id="${id}"]`)
      : key
      ? menuPanel.querySelector(`[data-img-key="${key}"]`)
      : [...menuPanel.querySelectorAll('.acc-item')].find(e => e.dataset.itemLabel === label);
    if (el) {
      let ancestor = el.closest('.acc-body');
      while (ancestor) {
        ancestor.classList.add('open');
        ancestor.style.maxHeight = '9999px';
        const h = ancestor.previousElementSibling;
        if (h && h.dataset.arrow) { h.textContent = '▼ ' + h.dataset.label; h.classList.add('is-open'); }
        ancestor = ancestor.parentElement?.closest('.acc-body');
      }
      onShowClick({ id: el.dataset.itemId || null, imgKey: el.dataset.imgKey || null, textKey: el.dataset.itemTextKey || null, textImgPath: el.dataset.itemTextImgPath || null, imgCaptionKey: el.dataset.itemImgCaptionKey || null, splitImg: el.dataset.itemSplitImg || null, splitImgs: el.dataset.itemSplitImgs ? JSON.parse(el.dataset.itemSplitImgs) : null, splitItems: el.dataset.itemSplitItems ? JSON.parse(el.dataset.itemSplitItems) : null, splitText: el.dataset.itemSplitText || null, label: el.dataset.itemLabel }, el);
    }
  }
}

menuToggle.addEventListener('click', openMenu);
menuCloseBtn.addEventListener('click', closeMenu);
restoreStateFromURL();
</script>
