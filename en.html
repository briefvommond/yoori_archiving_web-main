function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];

  return a;
}

  'shapeless-loop-essay-en': `Solo Exhibition 《Shapeless Loop》(Hakgojae, 2025)


Han Joo-ok (Independent Curator)

<Shapeless Loop for Our Annyeong(安寧)>

At times, memory becomes a trigger for glimpsing what lies ahead. When a scene from the past unexpectedly cuts through the present, it recalls the patterns that have carried the world forward while simultaneously becoming an omen of what is yet to come. It is the moment when different temporal lines fold into one. Every trajectory—in nature and in human life—eventually converges into the present. Perhaps this is why connection has long been represented as an infinite loop, a trajectory with neither origin nor terminus. For a long time, the artist Yoori has made this sense of connection the central subject of her practice. She traces sensations that have slipped into the past and observes the emotions that accumulate in the space left by absence, remaining attentive to their potential to return in another form. Within this practice, in Shapeless Loop, the artist gathers moments when recurring feelings of loss collide with ordinary scenes in daily life. These are sensations perceived before language and signals that appear at the threshold of logic. She composes them into a transparent loop.

In her studio, she recounted several recent experiences. At her grandfather's funeral, an unexpected moment broke through the solemnity of the gathering: a birthday song suddenly filled the room. The candles flickered, their light crossing with incense and tears. The scene stayed with her, as life and death surged into awareness all at once. Rather than reading these experiences through metaphysical concepts such as reincarnation, the artist turns her attention to sensing the currents that emerge in the unfolding of events. Encounters with what is invisible and resistant to representation have led her to consider perception as a temporal configuration. This is perhaps what could be called temporality. Her practice lies in allowing perception to shift, transform, and take on new forms. Her works become sites where past and future fold into the present, where multiple layers of time coexist.

Her working process makes this approach even more evident. By repeatedly layering, erasing, and connecting what lies inside and outside the surface, she resists fixing an image as a final outcome. Each captured scene acts as a point of mediation, calling forth another and gaining momentum to shift into the next. Her experimentation with materials expands in this continual process. What stands out is that each work functions as a narrative unit. That is, the work operates as a kind of sequence. It gathers, arranges, and revisits scenes, forming a temporal loop and establishing the artist's distinctive structural language. This is especially evident in the works she has long referred to as her Artist's Books.
In this exhibition, the artist presents The Book of Weighty Words #1–19 (2023–2025), a series of Artist's Books she has been producing since 2023. Perceived through touch and surface, the Artist's Books become a metaphor not only for what cannot be verbalized but also for her act of connecting them. The artist has noted "the power of a book formed by multiple sheets of paper gathering into a single mass, and the physical and visual stimulus that emerges from the binding process." Within her practice, the book becomes a physical embodiment of connection and accumulation. Scenes unfold as if pages are being turned, and each act of reading generates another link that extends to the next. Her recent works, Sorrow Formed from What Remains (2025) and The Potential of Loss and Eternal Yearning (2025), introduce a layer of transparency to this trajectory. Acrylic ink, silk fabric, and objects that once remained in the artist's hands are sealed within resin, solidifying into the form of a book. At the same time, the premise that one can look through them remains. Once again, past and future flow into the present.

And so, the question lingers. What remains on the surface? The faint light left by a dying candle, a ribbon that loosens and ties again, running water, and fragments of a luminous wing. These images emerge from the time that lingers within the artist, remnants of moments that stayed briefly and then disappeared. The meanings they carry resist being fully grasped and remain beneath the surface of her consciousness. For this reason, she chooses not to define them. Instead, she receives the flow as it comes, and lets it pass again. One is reminded of the moment when the path once believed to be straight began to soften into a curve. And doesn't that curve open onto another path? The loop has long been represented in this way. Here, the idea materializes through two works installed on the right side of the central exhibition space. They are The Long-Tailed Book: A Detached Sentence (1-14, 2025) and The Long-Tailed Book (2023–2025). The first work took shape as a seven-meter installation. Through repeated binding and unfolding, accidental divisions emerged, splitting scenes apart and becoming catalysts for a new sense of connection. From this process, The Long-Tailed Book: A Detached Sentence came into being. Images that once formed a continuous narrative now diverge within the book. They become independent scenes, yet still maintain continuity, connecting like a loop.


One day, the absence of someone—a trace slipped out of time and space—returns with a quiet sting. She does not hide the pull of what has slipped away. As she gathers what remains, one fragment at a time, a form gradually takes shape. It becomes Sorrow Formed from What Remains. At the entrance, Shapeless Loop (2025) condenses birth, death, and the absence of what is cherished into a single event. A deep blue-black tone settles across the surface like slow water along a canal at night. Realizing that the (im)material beliefs that once held our daily lives together have disappeared brings a pain that resists being dispelled. Here, mourning gathers and anchors itself to the space, reminding us that the most fundamental condition of connection begins in absence.


Translated by Han Joo-ok`,
  'segye-essay-en': `Arts & Culture Column for Segye Ilbo


Shin Lisa (Art Historian | Head of Planning Team, Hakgojae)

<For the Time After the End — Tenderly Calling Back Vanished Beings>



Black lines and masses rise from deep blue pools and flowing streams. Visual artist Yoori (b. 1994) has continued to create works that draw up unnamed emotions and mental images lingering within the mind, unable to evaporate. Her solo exhibition 《Shapeless Loop》 (11/19–12/20), currently held at Hakgojae, begins from a deeply personal narrative. After confronting the deaths of loved ones three times in a single year, the artist came to contemplate existence and reality through the concrete themes of life and death. In particular, the experience of receiving birthday wishes at a funeral hall — her birthday having become the anniversary of her grandfather's death — led her to realize that birth and death are not separate events, much like the candles at a funeral and those atop a birthday cake resemble one another. This exhibition emerges precisely from that gaze directed toward the boundary between endings and beginnings, presence and absence.

<At the Place Where Things Have Ended>

The exhibition consists of around fifty works spanning painting, sculpture, and installation, most of them rendered in black, white, and at times deep blue tones. What Yoori holds onto here are the small and subtle remnants left behind by beings that can no longer be seen. Rather than concealing or beautifying them, she chooses to reveal them honestly.

In the painting <Shapeless Loop>, which shares its title with the exhibition, the figure of a deceased cat appears alongside a red thread tied around its leg in anticipation of a future reunion. In sculptures made of resin and wood, that same thread reemerges with immediate material presence. These works do not rely on memory or recollection, but begin from the lingering presence of things that remain even after disappearance. Black stains deeply absorbed into the surface, matte textures drained of moisture, and violently sweeping lines remain like the afterglow of eternity left behind after turbulent emotions have passed.

In <Sorrow Formed from What Remains>, beads taken from the artist's maternal grandmother's necklace are sealed in resin, embodying the wish that vanished beings might continue to remain somewhere, in some form. The tiny beads suspended within transparent masses transform into crystallizations of eternity, shaped into objects for "the time after death." The artist's hesitation over whether to preserve the relics intact or transform them into artworks was ultimately overcome by a desire for transcendence toward another dimension. Her words, "I had to do something," feel less like resignation than a determination to move forward through grief and mourning.

<A Moving World>

Yoori reveals the links between presence and absence, life and death, not through abstract concepts but through concrete objects, scenes, and tactile experiences. Endless black loops, black threads forming volumes and ribbons as they rise toward the sky, and white rings resembling wings appear throughout the works.

In <Endlessly Rising and Constantly Emptying>, the structure of connection and circulation takes the form of a fountain. Its movement — surging upward, falling, and filling again — visualizes the immense flow of life in which presence and absence intersect. It is also the movement of the mind itself: the experience of being filled and emptied within the great wheel of existence. Resembling a human face with two eyes, the fountain appears to pour out emotions unreservedly while maintaining an air of detachment, as though it already knows that what fills will eventually empty, and what is empty will inevitably be filled again.

The belief that endings are not truly endings, and the fascination with transparent loops of connection, are also metaphorized through the relationship between the moon and the sea. Though physically too distant ever to touch, the moon's gravity continuously pulls the sea, keeping it in perpetual motion. In <The Pull Between Moon and Sea>, dark blue waves and faint moonlight blur into one another, erasing their boundaries. The artist places these two eternally separated entities together within a house-like space. Like two beings far apart yet powerfully connected, she captures relationships that continue after separation and invisible forces that nonetheless operate with intensity.

<Fragments Born by Stepping Beyond the End>

In <The Long-Tailed Book>, reflections on connection and the will toward transformation emerge through the artist's working process itself. Originally folding a seven-meter-long painting like an accordion, Yoori witnessed existing scenes accidentally linking together and generating new combinations. Images jutting out like unreadable sentences gave rise to other languages and meanings, leading the artist to separate these scenes into independent small paintings and expand them into a series titled <The Long-Tailed Book: A Detached Sentence 1-14>. She then miniaturized and reconnected those paintings once more, giving birth to a form resembling a single "tail."

The act of folding the original work like a book is less an act of destruction than one of exploring new possibilities. Though the fragmented images lose their original function, the artist turns that rupture into the starting point of another beginning. Instead of preserving what remains — the original painting — intact, she fragments and reconstructs it, allowing the weight of "what remains" to speak anew. Thus, the works born "tail after tail" survive by stepping beyond the end, reborn as new beings — somewhat grotesque, yet gleaming black like living creatures.

<A Poem for What Remains>

In Yoori's world, where what remains is gazed upon and allowed to regain light, nothing is meaningless and no ending is truly final. Emotions once sunk heavily like grief and longing ascend lightly toward another dimension upon white wings and transparent loops of eternity.

Although this exhibition begins with loss and mourning, it clearly contains a will to move beyond them and a yearning for eternity. There is an earnest hope that beings no longer visible might somehow continue their existence, and a desire to remain eternally connected to loved ones beyond physical limitations. Though profoundly personal, the reason we empathize with Yoori's art may be that it ultimately touches upon the universal human fear of loss and the shared effort to endure and move beyond it.

Within Yoori's art — born from life and returning once more to life — we confront fear and sorrow honestly while simultaneously sensing the possibility of transcendence.

To gaze upon the remaining fragments and quietly build poetry for the time after loss. In the deep stillness where sorrow settles and truth rises to the surface, on the final day of emotion, Yoori tenderly calls forth the nameless feelings and vanished beings left behind.`,
  'sweep2026-text-html': `<div style="white-space:pre-line;">&lt;시간과 타자&gt; 전시 서문


어느 날. 눈을 감았다 뜬 그 짧은 시간 동안, 갑자기 너는 내가 절대 알 수 없는 - 낯선 사람이 된다. 입 안에서 계속 같은 단어를 굴리다 보면 그 단어가 어느새 너무 생경하게 느껴지는 것처럼. 둘은 맞대고, 보내고, 호흡하고, 만졌을 것이지만. 마치 서로를 알고, 형성하고, 조물거린 것처럼 느꼈을 테지만.
문득, 실은 나와 너는 처음부터 끝까지 '나'라는 울타리로 인해 그저 '각자' 존재한다는 것을 깨닫는다. 나는 너를 아는 것이 아니다. 너라는 타자 앞에는 좁혀지지 않는 거리를 짐작할 수 있는 지시대명사가 붙는다. 나는 '이' 타자를 모른다. 나는 나를 반복해서 쳐다본 형상을 보며 '이'/ '저' 타자를 이해한다고 착각할 뿐이다. 그러므로 '이해'한다는 것은 진실일 수 없다. 너의 형상은 항상 나의 오해를 덧붙인 채로 거기에 있다. 그러니까, 뻔하게도 이해는 곧 완전한 몰이해기도 하다. 가깝다고 생각한 '너'는 가장 멀리 있다.

유리와 윤일권의 2인전 《시간과 타자》는 긴밀한 가운데 드러나는 '너'의 타자성에 관한 이야기이다. 전시장에서 유리와 일권은 층층이 쌓아 올려져 서로 '접착'되고, 명료한 경계 없이 붙어 큰 벽을 이루고 있다. 그 벽은 마치 하나의 평면처럼 납작한 표피를 띈다. 그렇게 조화되고 합일되어 하나의 개체가 되고 있는 듯 보인다. 하지만 그 쌓아 올려진 두께는 평면 뒤의 공간을, 종이와 종이 사이의 거리를 그 내부에 내포한다. 유리와 일권은 여전히 각자가 각자인 채로 서로를 덮는다.¹ 유리가 그린 것 위에 일권이 그린 것이 올라간다. 일권이 그린 것 위에 유리가 그린 것이 있다. 여기서 겹침과 섞임은 구분된다. 그들이 겹쳐진 공간 안에서 각자는 섞이지 않고 영원히 다른 층위에 있다.</div>
<div style="white-space:pre-line;font-size:0.85em;margin-top:1em;margin-bottom:1em;">¹ 전시장에 설치된 400x800cm 규모의 벽 작업은 일권과 유리의 작업이 교차하는 네 개의 층 위에 일권과 유리의 선택의 합으로 이루어진 레이어가 붙는 방식으로 구성된다. 유리는 200x120cm 크기의 그림을 각 14점씩 연결해 두 개의 레이어를 제작하였고, 일권은 100x120cm 크기의 작업을 28장씩 연결해 연결해 두 레이어를 구성하였다. 전시장 내 또 다른 벽 작업(400x120cm) 역시 서로의 레이어가 교차하는 동일한 형식으로 제작되었다.</div>
<div style="white-space:pre-line;">
그러나 찢는다. 그 거리-공간의 아주 먼 긴밀함 사이에 사건이 일어난다. 자신이 존재한다는 그 지루한 사실을 끊임없이 들여다보며 나라는 고랑을 만드는 자에게, '너'와의 사건이 일어난다. 그로 인해 균열의 틈새가 벌어진다. 같이 찢겨지거나 각자 손상된다. 벽에서 그들은 '나'를 보이려, 혹은 '너'를 보여주려 그들 자신과 상대를 찢을 수밖에 없다. 서로를 상처 내고 균열 내지 않고는 자기 자신이 존재할 수 없다. 나를 찢지 않고는 너를 마주할 수 없다.
전시장에서는 '찢는다'는 행위성이 주되게 드러난다. 보통 찢는다는 것은 헤집어놓고 짓이기고 갈가리 흩뿌릴 때 사용되는 언어이다. 그러므로 '찢는다'는 행위는 그저 폭력으로 보이기 쉽다. 하지만 이곳에서 그것은 오히려 대화이거나, 마주봄이다. 유리와 일권은 서로를 어떻게 드러낼지 고민하며 화면을 손상시키게 된다고 이야기했다. 그곳엔 머뭇거림도, 각자의 억양도, 존중도, 배려도, 이야기도, 웃음소리와 한숨소리도, 슬픔과 기쁨도 같이 있다. 그 모든 것은 서로에게 '관계함'이다.

유리는 미리 다가올 모든 시간의 슬픔- 혹은 슬픔이라 명명할 수 없는 그 어떠한 것을 슬퍼하는 사람이다. 명명되지 않은 감정으로 채워진 그의 시간이 있다. 유리는 그 시간 속에서 언어화할 수 없는 어떤 것을 마주한 후 다시 또 언어화할 수 없는 영역으로 재생성하는 것에 지속적으로 관심을 가져왔다. 이번 전시에서 유리의 회화는 기존 그의 회화보다 훨씬 '즉흥성'을 가지고 만들어졌는데, 이 즉흥성은 그러한 감각을 더욱 배가시킨다. 그러나 전시장에서 화면은 결국 찢겨지므로, 이 비언어적 영역은 다시 한번 찢는 행위성이 실행하는 비언어화를 겪는다. 화면은 원본의 성질을 잃은 채로 더욱 언어가 모호한 상태가 된다. 이러한 유리의 모호성과 즉흥성은 일권이 사용하는 계획적인, 아니 '계획적일 수밖에 없는' 판화 매체, 그리고 사라져 가는 기억을 구체적인 사진을 기반으로 찍어내어 기억하는 그의 방식과는 사뭇 대비된다. 일권의 시간은 많은 기억들과 관계들을 사랑하는, 그러나 그것의 사라짐을 부정하지 않고 존재를 기억하는 방식으로 흘러간다. 그리고 그 또한 찢겨 일종의 사라짐의 과정을 강조하게 된다. 그 둘은 그렇게 미묘하게 빗나가 서로 다른 채로 겹쳐져 있다.
그러나 여기서 둘의 공통점이 있다면, 서로의 타자성을 부정하거나 거부하지 않는다는 것일 테다. 일권은 이 관계 속에서 ''사라지기를 거부하는 방법'을 택하지 않'²고 자신이 자신인 채로 와해되는 것을 받아들이며 그저 가려지고 찢겨진다. 유리는 타자를 대하는 이러한 균열 속, '자아와 타자라는 서로 다른 층위들 사이에서' 그 간격을 거부하지 않고 '의미가 생성되고 변화하는 과정을 탐구'³ 한다. 그러므로 이 영원히 좁힐 수 없는 아주 멀고 긴밀한 거리는 그들에게 고통스러운 단절의 부정성을 띠고 있지 않는다. 유리와 일권은 서로의 층위에서 존재하는 타자임을 '긍정'한다. 각자가 존재하는 층위, 그리고 시간은 다르다. 그러나 그 긍정과 함께, 또 다른 시간축이 나와 너 사이의 균열 속에서 생성된다.</div>
<div style="white-space:pre-line;font-size:0.85em;margin-top:1em;margin-bottom:1em;">² 윤일권 개인전 &lt;사라짐을 기억하는 방법&gt;(2024, 포켓테일즈) 리뷰, 콘노 유키, https://www.yoonilkwon.net/written-by-konno-yuki.html
³ 유리 개인전 &lt;투명한 고리&gt;(2025, 학고재), http://online.hakgojae.com/viewingrooms/view.php?exh=54</div>
<div style="white-space:pre-line;">
그것이 바로 파편이다. '찢는' 행위는 결과적으로 파편을 만든다. 그 파편-잔해들은 새로운 형상을 이루기도, 버려지기도, 찢어진 벽 위에 덧대어 화면을 봉합하기도 한다. 균열에서 떨어진 부산물들은 전시장에 새로운 힘과 가능성을 만든다. 그 파편들은 재구성된다. 파편들은 의미를 상실하고 그저 떨어진 것이 아니라 아예 새로운 조각이 된다. 이 파편은 낳아진 것이며, 생성된 것이다. 그저 나의 고랑에 갇힌 시간이 아닌 타자와 만나 생성될 수 있는 새로운 시간이다.

유리와 윤일권의 2인전을 통해 우리는 '둘'이라는 숫자, 그 관계성에 대한 이야기를 타자성과 그에 따라오는 균열, 그리고 거기서 생성되는 새로운 시간축으로 다시 재해석하게 된다. 항상, 긴밀함은 가장 낯선 것의 얼굴을 갖는다. 이해는 몰이해의 얼굴을 갖는다. 나의 고랑과 근본적 공허함은 절대 벗어날 수 없이 거기에 존재한다. 어쩔 수 없다. 그러나 그곳에서 사건은 계속 일어난다. 다시 깨뜨린다. 그 균열은 힘을 생성한다. 자신을 찢어내고 타자를 바라볼 힘. 그 때 너는 '이' 타자가 아닌 '너'가 된다.

  'sweep2026-text-html-en': `<div style="white-space:pre-line;">&lt;Time and the Other&gt;


One day, in the brief moment between closing your eyes and opening them again, you suddenly become someone I can never fully know—a stranger. It is like repeating a word over and over until it begins to sound unfamiliar. We may have faced one another, exchanged things, breathed together, touched one another. We may have felt as though we knew, shaped, and held each other in our hands.

And then, suddenly, we realize that from beginning to end, you and I have existed only as separate beings, enclosed within the boundaries of our respective selves. I do not know you. Before you, the Other, there always stands a demonstrative pronoun that points to a distance that can never be closed. I do not know this Other. I merely mistake the image reflected back to me again and again for an understanding of this or that Other. Therefore, understanding itself cannot be truth. Your image is always there, carrying my misunderstandings along with it. In that sense, understanding is, paradoxically, a complete misunderstanding. The "you" I believed to be closest is, in fact, the farthest away.

Time and the Other, a two-person exhibition by Yoori and Ilkwon Yoon, speaks of the alterity of "you" revealed through intimacy. Throughout the exhibition space, Yoori and Ilkwon Yoon's works are stacked layer upon layer, adhering to one another and forming large walls without clear boundaries. Their surfaces appear flat, almost like a single plane. They seem harmonized, unified, as though becoming a single body. Yet the accumulated thickness contains within it the space behind the surface, the distance between sheet and sheet. Yoori and Ilkwon Yoon continue to cover one another while remaining themselves.¹ What Yoori paints is overlaid by what Ilkwon Yoon paints; what Ilkwon Yoon paints is overlaid by Yoori's marks. Here, overlapping and blending are not the same. Within these layered spaces, they never merge, but remain forever on different strata.</div>
<div style="white-space:pre-line;font-size:0.85em;margin-top:1em;margin-bottom:1em;">¹ The 400 × 800 cm wall installation consists of four interwoven layers made by the two artists, topped by an additional layer formed through their shared choices. Yoori created two layers by connecting fourteen paintings measuring 200 × 120 cm each, while Ilkwon Yoon assembled two layers from twenty-eight works measuring 100 × 120 cm. Another wall piece in the exhibition (400 × 120 cm) was constructed according to the same structure of intersecting layers.</div>
<div style="white-space:pre-line;">Yet something tears. Within that immense intimacy that is also a distance—a space—an event occurs. For the one who endlessly examines the tedious fact of their own existence and digs furrows called "I," an encounter with "you" takes place. A crack opens. They are torn together, or damaged separately. On the wall, in order to reveal either "I" or "you," they have no choice but to tear themselves and one another. Without wounding and rupturing each other, the self cannot exist. Without tearing oneself, one cannot face the other.

Throughout the exhibition, the act of tearing is foregrounded. Ordinarily, "to tear" suggests destruction—ripping apart, mangling, scattering into pieces—and thus easily appears as violence. Yet here, tearing is instead a form of dialogue, a way of facing one another. Yoori and Ilkwon Yoon have spoken of damaging the image while contemplating how to reveal each other. Within that process dwell hesitation, individual accents, respect, consideration, conversation, laughter and sighs, sorrow and joy. All of these are ways of being in relation to one another.

Yoori is someone who grieves in advance for all the sorrows to come—or perhaps for something that cannot even be named sorrow. Her time is filled with unnamed emotions. She has consistently been interested in confronting that which cannot be articulated and then regenerating it once again into another realm beyond language. In this exhibition, her paintings possess far greater spontaneity than before, intensifying these sensations. Yet once the paintings are torn within the exhibition space, this nonverbal realm undergoes another process of de-verbalization enacted through the gesture of tearing. Stripped of their original integrity, the images enter an even more ambiguous state.

This ambiguity and spontaneity stand in marked contrast to Ilkwon Yoon's medium of printmaking—planned, or rather necessarily planned—and to his way of remembering fading memories through images based on concrete photographs. Ilkwon Yoon's time unfolds through love for memories and relationships, while accepting their disappearance and preserving their existence through remembrance. His works, too, are torn, emphasizing a process of vanishing. In this way, the two remain subtly out of alignment, overlapping while remaining different.

Yet what they share is this: neither denies nor rejects the alterity of the other. Ilkwon Yoon, within this relationship, "does not choose a method that refuses disappearance,"² but accepts his own dissolution while remaining himself, becoming obscured and torn. Yoori, within the fractures that arise in confronting the other, explores "the processes through which meaning is generated and transformed between different layers, those of the self and the other."³ Thus, the immense and intimate distance that can never be overcome does not appear to them as the painful negativity of separation. Yoori and Ilkwon Yoon affirm one another as Others existing on separate layers. Their strata, and their times, are different. Yet through that affirmation, another axis of time emerges within the cracks between you and me.</div>
<div style="white-space:pre-line;font-size:0.85em;margin-top:1em;margin-bottom:1em;">² Yuki Konno, review of Ilkwon Yoon's solo exhibition &lt;Ways of Remembering&gt; (2024, Pokketales).
³ Yoori, solo exhibition &lt;Shapeless Loop&gt; (2025, Hakgojae).</div>
<div style="white-space:pre-line;">That is what fragments are. The act of tearing ultimately produces fragments. These remnants may form new shapes, be discarded, or be attached again to mend the torn wall. The debris falling from the cracks generates new energies and possibilities within the exhibition space. These fragments are reconfigured. They do not simply lose meaning and fall away; they become entirely new pieces. They are born. They are generated. They are not time trapped within the furrows of the self, but a new time made possible through encounters with the Other.

Through Time and the Other, we are invited to reinterpret the number two and the relationality it implies through alterity, the fractures that accompany it, and the new temporal axes that emerge from them. Intimacy always wears the face of what is most unfamiliar. Understanding wears the face of misunderstanding. The furrows of the self and its fundamental emptiness will always remain, inescapably. There is no avoiding this.

And yet events continue to occur there. Things are broken again. From those cracks, forces are generated—the strength to tear oneself open and to look toward the Other. And at that moment, you are no longer this Other.

You become you.


Text by Soomin Lee</div>`,
  'oaoa2026-text-en': `《Micro-Disaster》

OAOA presents Micro-Disaster, a two-person exhibition by Yang Ha and Yoori, as its first exhibition of 2026. The exhibition takes as its subject the point at which social and personal tragedies converge within an individual, and the time that follows, naming this condition a "micro-disaster."

Disaster is something we all encounter. From war, accidents, and climate catastrophes to the missing-person alerts that regularly sound on our phones, disasters are everywhere, delivered into the palms of our hands at great speed. Even when we are shaken by news of devastation, there are often few things we can do beyond refreshing the page. The guilt and helplessness that arise from this inability to act have become familiar emotional conditions of contemporary life. Long after social systems have been restored and public memory has faded, the pain left behind by disaster does not disappear; it remains, borne by someone in particular.

In personal life as well, death, illness, and unforeseen events arrive without warning and unsettle the ordinary. Though such experiences may be common, for the individual passing through them they often constitute the greatest catastrophe imaginable. Socially, we have not learned enough about how to receive and process such pain, and at times others hastily determine when mourning and recovery should end. In the end, enduring confusion and grief once again becomes something one must carry alone.

Through their respective visual languages, Yang Ha and Yoori focus on these disasters that ultimately become one person's burden, speaking about life after tragedy. Rather than submitting to socially prescribed rhythms or conventions, they propose ways of confronting catastrophe on one's own terms and continuing to live.

Yang Ha has long questioned contemporary modes of consuming disaster, referring to the condition in which images of explosions and debris are smoothed and refined through screens as "mediated violence." The artist transfers scenes of tragedy, collected almost like screenshots, onto canvas, yet the actual weight and pain of those events have been removed. Explosions transformed into pastel clouds or soft, jelly-like forms coolly expose the numbness with which contemporary viewers safely process and pass by catastrophe. These "cute explosives," casually overlaid onto interiors and views beyond windows, reveal how lightly we register—and how quickly we forget—the suffering of others while remaining comfortably within our daily routines.

In this exhibition, Yang Ha presents a new phase in which the afterimages of explosions that have recurred throughout previous works are transformed into still lifes or portraits. The sleek explosions of earlier paintings become protagonists endowed with bodies, standing confidently at center stage. By placing disaster within a theatrical setting and allowing it to meet the viewer's gaze directly, the artist strips away external contexts and creates a state of confrontation in which only the object and oneself remain. Responding to the question, "Why do you paint stories from far away?" Yang Ha answers, "I am painting what is closest." The works suggest that distant tragedies have already passed through our doors and windows, acquiring tangible form and arriving beside the vase on our dining table. Through the titles as well, the artist asks where "close by" truly is, proposing the modest courage that even "0.1% affection" might be enough to sincerely bring another's suffering into one's own sphere. Refusing to leave pain as something that belongs only to others, this gesture of incorporating it into one's own narrative becomes both a dignified resistance against helplessness and a profoundly warm form of solidarity.

Yoori translates interior states—ambiguous emotions and boundaries that resist complete definition through language—into visual forms. Taking as her point of departure the inevitable gaps that arise between words and images, between the two-dimensional and the three-dimensional, she has explored these spaces through painting and artist books. In this exhibition, she invokes the fictional persona of the Kalendermacher ("calendar maker") to propose diverse understandings of time. The act of making calendars originated in an intensely private discipline: drawing eight vertical lines and five or six horizontal lines as a way of calming anxiety. Faced with disasters too vast to control, imposing temporal structure within a fixed grid became a strange yet singular source of stability. Having become a skilled maker of time, Yoori now dissolves the boundaries between past and future, holding fleeting moments together on a single plane and reconstructing temporal contexts. The textures of layered fabric and the traces of thread visible across the canvas reveal the artist's careful labor of stitching together moments that scatter and disappear, making the nature of passing time visible and confronting us with aspects of temporality we often choose to ignore.

These explorations extend into three-dimensional form through the materiality of resin and candles. In <A Year - Accumulation Through One Another>, drawings and fragments of fabric appear suspended between layers of resin, granting physical thickness to time and preserving its flow like geological strata. The overlapping forms and colors become faint yet tender traces left behind by a passing year, much like photographs or diary entries. For beings destined to disappear, perhaps what ultimately remains are only such small accumulations of memory and record. Meanwhile, <30 Days - Provisional Forms>, thirty candle-calendars arranged upon stepped pedestals, become an intuitive portrait of time passing through the present. Burning flames and melting wax evoke the irreversibility of time. In their resistance to prediction or prevention, time and disaster resemble one another. Rather than being consumed by this overwhelming force, Yoori fragments the flow of time and imposes order upon it. This quiet yet active gesture—an effort to live through today despite fear and helplessness—offers a resilient source of energy for life after tragedy.

After the tragedies of both distant and intimate worlds have passed, each person is left with something to bear. Throughout the exhibition, Yang Ha's insistence on looking directly at the moment when disaster reaches the table of everyday life resonates with Yoori's determination to patiently mend the ruptures left by shattered time and rebuild the strata of living. Refusing to calibrate grief according to socially sanctioned distances or acceptable durations, the two artists offer records of living after catastrophe in their own ways. It is our hope that these records become a small source of courage for each visitor, and an invitation to add just a little more—perhaps only 0.1% affection—to the world around us.`,
  'oaoa2026-text': `《미시적 재난》 (Micro-Disaster)


오에이오에이는 2026년 첫 전시로 양하, 유리의 2인전 《미시적 재난 Micro-Disaster》을 선보입니다. 이번 전시는 사회적·개인적 비극이 한 사람의 내면으로 수렴되는 지점과 그 이후의 시간을 "미시적 재난"이라 명명하고 조명합니다.

우리는 누구나 재난을 경험합니다. 전쟁과 사고, 기후 재난부터 수시로 울리는 실종자 알림까지, 재난은 도처에 존재하고 빠른 속도로 우리의 손바닥 위로 전달됩니다. 참상의 소식에 충격을 받아도 뉴스를 새로고침 하는 것 외에는 달리 할 수 있는 일이 없을 때의 죄책감과 무력감은 현대인이 반복적으로 경험하는 정서가 되었습니다. 재난이 휩쓸고 간 자리의 고통은 사회적 시스템이 복구되고, 사건이 공적 기억 속에서 흐릿해진 뒤에도 사라지지 않은 채, 여전히 누군가의 몫으로 남겨집니다.

개인의 삶에서도 죽음과 질병, 사건과 사고는 예고 없이 찾아와 일상을 흔들어 놓습니다. 누구나 겪는 흔한 일일지라도 그것을 통과하는 한 사람의 내면에서는 무엇보다 큰 재난으로 다가옵니다. 사회적으로 우리는 이 고통을 어떻게 받아들이고 소화해야 하는지에 대해 충분히 배우지 못했고, 때로는 타인에 의해 애도와 회복의 시간이 성급히 단정되기도 합니다. 결국 그 혼란과 아픔을 견뎌내는 과정은 다시, 오롯이 개인의 몫이 됩니다.

양하와 유리는 이렇게 한 사람의 몫으로 남겨진 재난에 주목하며 각자의 시각 언어를 통해 비극 이후의 삶에 관해 이야기합니다. 사회가 정한 문법이나 속도에 매몰되지 않고 자신에게 닥친 재난을 주체적으로 대면하며 삶을 지속하는 태도를 제시하고 있습니다.

양하 작가는 폭발과 파편의 이미지가 스크린을 거치며 매끄러운 정보로 정제된 상태를 '매개된 폭력'이라 지칭하고, 현대사회가 재난을 소비하는 방식에 질문을 던져왔습니다. 작가는 스크린 샷을 찍듯 수집한 비극의 장면들을 캔버스로 옮겨오지만, 실제의 고통과 무게는 삭제되어 있습니다. 파스텔톤의 구름이나 말랑한 젤리처럼 변모한 폭발의 형상은 사건을 안전하게 가공하고 지나치는 현대인의 무감각함을 서늘하게 폭로합니다. 실내나 창밖의 풍경 위로 무심하게 겹쳐진 '귀여운 폭발물'은 우리가 안온한 일상 속에서 타인의 고통을 얼마나 가볍게 인지하고 동시에 망각하는지를 직시하게 하는 장치가 됩니다.

이번 전시에서 양하는 그간 반복해온 '폭발'의 잔상이 정물 혹은 초상으로 치환되는 새로운 국면을 보여줍니다. 기존 작품의 매끈한 폭발 이미지는 이제 기둥과 같은 '몸'을 가진 주인공이 되어 무대 중앙에 당당히 자리합니다. 재난을 연극적 무대 위에 올려 관람객과 정면으로 눈을 맞추게 하는 초현실적인 설정은 비극을 둘러싼 외부의 맥락을 소거하고 오직 대상과 나만이 존재하는 '직면'의 상태를 유도합니다. 작가는 "왜 그렇게 먼 곳의 이야기를 그리느냐"는 물음에 "가장 가까운 곳을 그리고 있다"고 답하며, 먼 곳의 비극이 이미 우리의 문과 창을 지나 실체를 갖추고 식탁 위 화병 앞에 도착해 있음을 직시하게 합니다. 작품 제목을 통해서도 '도대체 가까운 곳은 어디인지' 반문하며, 나아가 '0.1%의 애정'만 있다면 타인의 아픔을 내 영역 안으로 성실히 데려올 수 있다는 작은 용기를 제안합니다. 타인의 고통을 남의 것으로만 방치하지 않고 내 일상의 서사 속으로 데려오는 이 태도는 무력감에 함몰되지 않고 자신만의 방식으로 세상을 살아가려는 한 개인의 존엄한 저항이자 가장 따뜻한 연대의 방식이 될 것입니다.

유리는 언어로 완전히 정의되지 않는 모호한 감정이나 경계 등 내면의 상태를 시각 언어로 옮겨냅니다. 말과 말 사이, 평면과 입체 사이 등 언어와 이미지 사이에서 발생하는 필연적인 간극을 작업의 출발점으로 삼아 회화와 아티스트 북이라는 두 가지 방법으로 이를 표현해왔습니다. 이번 전시에서는 '달력제작자(Kalendermacher)'라는 가상의 페르소나를 호출하여 달력을 활용한 다양한 시간의 개념을 제시합니다. 달력을 만드는 일은 작가가 불안을 다스리기 위해 8개의 세로선과 5-6개의 가로선을 긋던 지극히 개인적인 수양의 행위에서 비롯되었습니다. 내 뜻대로 할 수 없는 거대한 재난 앞에서, 정해진 격자 안에 시간의 형식을 부여하는 일은 작가가 세상에 대응하며 얻을 수 있는 유일하고도 묘한 안정감이었습니다. 시간을 다루는 숙련된 제작자가 된 그는 이제 캔버스 위에서 과거와 미래의 경계를 허물고 찰나의 순간들을 하나의 평면 위에 붙잡아 두며 시간의 맥락을 재구성합니다. 특히 화면 위에 덧대어진 천의 질감이나 실의 궤적은 흩어지고 사라지는 시간을 이어 붙이고 엮어내려는 작가의 성실한 손길을 잘 보여주며, 이는 흐르는 시간의 본질을 가시화하고 나아가 우리가 자주 외면하는 시간의 민낯을 마주하게 합니다.

이러한 시도는 전시장 내에서 레진과 양초의 물성을 통해 입체적으로 확장됩니다. 겹겹이 쌓인 레진의 층 사이로 드로잉과 천 조각이 투영되어 보이는 <1년-서로를 통과하며 축적되기>는 마치 지층처럼 흘러가는 시간에 물리적인 두께를 부여하고 붙잡아둡니다. 겹쳐진 형태와 색들은 마치 남겨진 사진이나 일기처럼, 이미 지나가버린 1년의 시간이 남겨둔 미미하고도 애틋한 흔적이 됩니다. 본질적으로 소멸해가는 우리에게 남겨지는 것들은, 결국 이렇게 쌓인 작은 기록과 기억들 뿐일지도 모릅니다. 또한 계단식 좌대 위에 놓인 서른 개의 양초 달력 <30일-잠정적 형상들>은 현재를 관통하는 시간의 직관적인 초상이 되어줍니다. 타는 촛불과 녹아내리는 초는 되돌릴 수 없이 진행되는 시간의 비가역성을 은유합니다. 결코 예측할 수도, 막을 수도 없다는 점에서 시간과 재난은 닮아있습니다. 유리는 그 압도적인 힘에 집어삼켜지는 대신 시간의 흐름을 조각내고 질서를 부여합니다. 두려움과 무력함에 맞서 오늘을 살아내려는 이 조용하고도 능동적인 움직임은 우리에게 비극 이후를 살아낼 단단한 동력이 되어줍니다.

먼 곳과 가까운 곳의 비극이 지나간 뒤에는 각자에게 남겨진 몫이 있습니다. 비극이 내 일상의 식탁 위까지 도착했음을 직시하고 정면으로 응시하는 양하의 시선과, 예고 없이 무너진 시간의 공백을 성실히 이어 붙여 삶의 지층을 재건하는 유리의 의지는 전시장 곳곳에서 공명합니다. 사회가 정한 안전한 거리나 적당한 기간에 슬픔을 맞추지 않고, 자신만의 방식으로 재난 이후를 살아가는 두 작가의 기록이 우리 각자에게 작은 용기가 되고, <0.1%의 애정>을 더해보는 계기가 되길 바랍니다.`,
  'daejeon2024-text-en': `《Mysterious Solidarities of Messengers》

The exhibition Mysterious Solidarities of Messengers explores the totality of unique sensations and empathic experiences occurring between humans, nature, and art, metaphorically represented through the realm of messengers.
Beginning with the hypothesis of the role of 'messengers,' the exhibition focuses on tracing their origin, serving as a starting point to stimulate imagination. Mythological beings like Hermes, who traverse between the earthly and underworld to convey messages of the gods, and figures like Gabriel from the Annunciation, derived from the Latin word 'annuntio' meaning 'to announce,' have occupied a realm converging towards intermediaries such as guides, mediators, and intermediaries excluded from explicit relationships. They appear and disappear repeatedly in the form of moving entities imbued with flickering lights, flashes, currents, and noise within circuits, traversing between concrete forms and the 'formless' absoluteness. Michel Serres (1930-2019), in his book Angels: A Modern Myth, describes 'angels' as embodiments of circulation that transcend localized concepts, providing an integral wholeness and expanding beyond. Messengers form relationships with one or more others, serving as conduits that unfold vertical and horizontal paths, becoming a link towards the world, and thereby forging a new epistemological map. In accordance with this unfolding, the exhibition explores the potential and forms of numerous entities surrounding us, unseen and examines the possibility of existence forms that are difficult to articulate in language. In the realm of the unknown, the potential to recognize the speaker emerges from the autonomous practice of sculptural language and art, manifested in the 'selected senses' and 'forms of combination.' The exhibition warmly embraces the role and function of the 'messenger' in acknowledging the fundamental vitality between material and immaterial elements that constitute artworks.

The origin of Hermes is from 'herma', and the derived word from here is 'hermetic,' which means crossing, moving and transition. The six artists introduced through the exhibition, Koh San Keum, Bae In Sook, Yoori, Leebinsoyeon, Lee San Oh, and You Lee, approach these concepts and notions, translating the diverse combinations of senses and boundaries that are scattered without a special distinction between human and non-human, nature and non-nature, through various media. The title of the exhibition, Mysterious Solidarities of Messengers is taken from Pascal Quignard's novel The Mysterious Solidaritie. His novel, unfolding narratives towards the unknown territories surrounding us, intertwines with the theme of this exhibition, which will be perceived with a sense of mysterious abundance. The mesh entangled with sensory experiences and a consciousness continuum converges here and now, binding into one.

"There we have the constructed networks in which we live, and all the various forms of circulation;There we have the world of physical fluxes (…) If winds, currents, glaciers, volcanoes etc., carry subtle messages that are so difficult to read that it takes us absolutely ages trying to decipher them, wouldn't it be appropriate to call them intelligent? What human could ever presume to speak a language that was so precise, refined and exquisitely coded?" (Michel Serres, "Angels: A Modern Myth" (Flammarion: First UK edition, 1995))

Leebinsoyeon sensitively handles various media such as video, installation, and digital painting, paying attention to the various situations surrounding us and the relationships unfolding within them. The starting point of this exhibition, Fairy Mobility investment seminar video: The Orphan engineering (2023), traces the realm of movement between senders and receivers embedded in humans, culture, and nature, and the disappearing message delivery system, seeking its origin in the 'fairy ring,' also known as the pixie ring drawn by fairies. On the other hand, She presents the installation work Ring Ring (2024), intertwining speculative imaginations based on the unique character from Korean family relationships and childhood incidents between the artist and her aunt. During teleportation from one space to another in the 3D CG online game 'Second Life,' You Lee lost parts of her avatar's body due to a graphic error. This experience naturally syncs with the artist's personal time spent immigrating to New Zealand and the UK and engaging in a long-distance relationship (LDR). The sensation and concept of 'connection' inherent in the body are projected into images mediated by both reality and electronic media, functioning as an inevitable methodology throughout the work. Bae In Sook has been creating sound devices completed by interaction by combining music and installations, forming a principle in which the body immerses itself in the artwork. Last spring and summer, the artist recorded the sounds of birds in forests across Gyeonggi-do, Gangwon-do, Jeju Island, and other regions. The birds appeared precisely during the darkest and quietest hours before dawn, creating an atmosphere akin to mirages. Simeon Pease Cheney(1818~1890) transcribed the songs of birds, interpreting the sounds of nature into the language of music. Similarly, the artist translates the experience of dominating the entire space through sound alone into an installation with eight speaker boxes and LED lights. Yoori begins her work by paying attention to the 'senses' that respond to daily experiences and emotions. In the process, she breaks away from the usage of 'nouns and verbs dependent on materiality' in the 'dimension' where language cannot be articulated, sharpening her 'keen sensitivity' towards a 'communication system.' The painting work, dispersed from the dimension of 'time and existence', is installed together with a four-piece work entitled Too Heavy to Flip (2023-2024), also called an 'artist book.' The artist recalls the fleeting moment of turning a single page. Holding onto the belief that one can perceive, and the expectation that one can amplify unheard voices, she bridges the gap between numerous senders and receivers. Koh San Keum has been exploring the principles of form in visual frameworks by dissecting screens based on textual systems such as novels, newspapers, poetry, philosophy books, and law books. She proceeds with the work by using tiny artificial pearls, the main material of the piece, to consistently arrange them according to the number of characters and spacing or to deconstruct sentence structures. Her approach to physical effort naturally removes the original semantic context, shining in a new dimension of language along with the inherent meaning embedded in the properties of the pearl. Lee San Oh records specific phrases and words acquired in the flow of neutrality between memory and unconsciousness with painting. She expands spontaneously emerging images, established as equivalent to the structure where writing occurs, from drawing into various media such as sculpture and painting. The artist's attempt to capture shapes that cannot be grasped through visual experiences is sublimated into the form of birds and supernatural images that appear throughout the artwork. The new work entitled "Guide" (2024), which traverses through human, city, myth, and nature, presenting their possibilities, and her sculptural works, resembling emerging from a painting, stitch the space as motifs of spirits and intermediate zones, transcending life and death, underground and aboveground, day and night.


Written by Joo-ok Han`,
  'editorspick-text': `Yoori: Shapeless Loop


Everything has a name, and all entities that are grasped within the cognitive map of human perception—including phenomena that are visible or invisible—are defined through the signs of language used for communication. Yoori delves into the dense gaps of this vast world and captures thoughts and sensations that lie beyond the reach of human systems of signs in the form of paintings, objects, books and paper, or material bodies that are neither books nor paper.

What Shapeless Loop binds together are fragments of everyday moments—nameless emotions and amorphous masses that merely drift by and vanish. Focusing on the theme of "connection" between such things, the artist expands the realm beyond language by giving shape to otherwise inexpressible streams of thought, either as translucent books or as forms painted onto canvases.

The exhibition also presents a substantial selection from the artist's long-running "Artist Book" project alongside the paintings, offering viewers an opportunity to encounter the artist's thoughts in a more tangible way. Through works realized in diverse forms and materials, one can discover traces of humanity that, in the artist's own words, are "not fixed beings but beings that always exist in-between," and find loops that weave together fragments of life.`,
  'upandcoming-text-html-en': `<div style="white-space:pre-line;">Monthly Art February 2024 [UP-AND-COMING ARTISTS]


Kim So-jung (Reporter, Monthly Art)

&lt;A Poem Sent to Beings Uncalled by Language&gt;


We have all had such an experience. A commonplace word suddenly becomes strangely unfamiliar, and in that moment we witness the object it denotes—usually left unnoticed in the ordinariness of everyday life—becoming "simulated" with the overwhelming presence of an elephant in the room. Language, as a social contract, is marked by all kinds of norms: standard rules, prescribed exceptions, and categories of usage. Every social act through which human beings name what is visible, imagine what is not, establish systems of thought, define phenomena, and communicate with others has originated from—and evolved through—the material of language.

Here, however, are ambiguous beings that do not belong to such a solid world. Yoori boldly summons onto the canvas those things that evade institutionalized language: forms beyond naming, abstract thoughts, and elusive emotions that play hide-and-seek between reality and presence. Made up of fragments of everyday life, these entities gather in &lt;The Crossing of Imperfections&gt; (2023) to seek their own worlds, compose the grotesque imagery of &lt;A Loose Poem&gt; (2023), or quietly endure the passage of &lt;Time of Feathers and Fallen Leaves&gt; (2023). With particular affection for those situated beyond the boundaries of language, the artist draws viewers into what she calls "the gaps in language."

Having attended art middle school and art high school before enrolling in a fine arts program in Korea, Yoori had long resolved to live as a painter. Yet she experienced severe confusion between her work and her sense of self. Viewing painting as a means of emotional release, she made works that she described as acts of "vomiting things out," before suddenly fleeing to Germany, almost as if escaping, where she devoted herself to studying language for a year. There, stimulated by a new environment, she was able to continue making art in her own way. More importantly, using a foreign language led her to become attentive to the (ir)rational relationship between language and reality. This awareness extended from her own experience of discovering how language shapes the speaker's identity to the sociocultural questions surrounding objects that can only be designated by a particular language.

Yet despite her desire to reveal the hidden underside of language, Yoori's work is far from declarative. The subjects that, from the outset, are "nothing more than gestures"<sup>1</sup> still seem unable to acquire proper names on the canvas, though they appear remarkably unconcerned by their ambiguous condition. Taking the forms of objects, bodies, or something in between, these figures are even dignified, as if proclaiming that the role of language has long been overestimated. &lt;In the Furthest Sky from the Sky&gt; (2023) presents six scenes that resemble stages in the transformation between humans and spiritual beings. The wooden-log-like human forms that fill each panel assume various poses as though situated within specific circumstances, yet they lay bare their shapeless existence free from temporal progression or causal relationships.

By constructing his canvases with ineffable subjects and uniquely heavy colors, the artist draws viewers into a state of immersion born of confusion. At the same time, Yoori offers clues through the titles of her works. Titles such as Sentences Made with Nonexistent Words or Objects in Between reveal her intention to give form to a nonverbal world. Among them, &lt;A Loose Poem&gt; most explicitly invites viewers to read the painting with an awareness of rhythm and the breathing spaces between lines. Like poetry, which conveys atmosphere and context rather than relying on the logical conjunction of words and sentences, the viewer interprets the visual language that the artist has varied and orchestrated through imagination and association.

Yoori believes that even if language permeates the entire world, multiplying infinitely and surviving across history, time, and generations, there will always remain blind spots forever beyond its reach—mysterious domains untouched by words. And so, within the dwelling she has created, where one can momentarily step outside the world imitated by language, we are free to enjoy the detours of unfamiliar words with greater ease.</div>
<div style="white-space:pre-line;font-size:0.85em;margin-top:1em;"><sup>1</sup> Kim Chun-su's poem Flower concerns the object (or human being) that acquires existential status only when its name is called and its existence recognized.</div>`,
  'pokettales-link-html': `<div>More details : <a href="https://pokettales.com/Yoori-Double-Bind" target="_blank" style="color:inherit;">https://pokettales.com/Yoori-Double-Bind</a></div>`,
  'in-text-html-en': `<div style="white-space:pre-line;">《Bind Loosely &amp; Loosen Tightly》


Mohee (Independent Curator)

&lt;The Age of Silence and Pensées of the Night&gt;

Nicole Krauss once wrote that in the age of silence, people did not communicate less; rather, they communicated more. The earliest language of that time was gesture, and there was no distinction between the gestures of language and the gestures of life. "Building a house or preparing food, for example, was a form of expression no less meaningful than a gesture that conveyed 'I love you' or 'I mean it.'"<sup>1</sup> It was an era in which every expression carried its own unique weight. Longing for a time I have never known, I find myself measuring the weight of today's words and writing. Language that has left our bodies and lingers in the air. When we momentarily step away from it—when we grasp what cannot be conveyed through speech and text—something finally becomes perceptible. Rather than lamenting the inadequacy of words, Yoori quietly attends to the brief silences that connect one word to another. As in the age of silence, her paintings blur the boundaries between the landscapes of life and those of language. Words that slip through the gaps between clearly held words, wavering phrases and sentences, are barely held together on the surface of her paintings.

For this reason, the exhibition 《Bind Loosely & Loosen Tightly》 is filled with ambiguous scenes. Yoori is interested not in fixed texts or words already spoken, but in things that never remain intact and continue to flow: the time that passes even now from one letter to the next, memories that grow increasingly faint and indistinct, and the relationships between this and that, between you and me. To describe these through painting is to engage with the condensed language unique to the visual medium. A gathering of signifiers detached from their signifieds and left adrift forms its own symbolic system and nuances within the image. In &lt;To a Death Passing By&gt;, divided into four panels, objects and landscapes lose both their relations to one another and their necessary ties to real-world referents, suspending the production of meaning.

The titles of the paintings return us once again to language, reminding us of the gap between text and image. Words associated with "weight" appear repeatedly: "the weight of certain events," "light consolation," or "heavy words." Regardless of such modifiers, Yoori's paintings somehow seem consistently weighty. They appear to take upon themselves what language has been unable to carry. Yet the loose connection between image and text always leaves openings through which things may enter or escape. As a symbolic motif visualizing such openings, "peripheral vision"<sup>2</sup> becomes a metaphor for the artist's attentiveness to what lies at the margins (&lt;With Peripheral Vision&gt;). Forms that have slipped out of focus and become indistinct emerge at the forefront of the canvas, acquiring a new status and a new way of being seen.

Meanwhile, the book—language endowed with material form—may be the object closest to Yoori's paintings. Through bundles of paper called books, our words have carried stories from the age of silence to the present. But where do the stories that could not be contained in books, the words left unwritten, go? Yoori's paintings, which resemble books, begin with this question. The pages she casually opens extend into one long image, like a sentence without a period. In the painting sharing its title with the exhibition, objects come to resemble not the content of language—the text itself—but the sound of words spoken aloud. Within waves of varying tones, individual objects imbued with the luminosity of night arrive at &lt;Bind Loosely & Loosen Tightly&gt;. This fragile connection will continue to smolder quietly within the tiny crevices of things permeated by the light of night, in the unnameably silent spaces between silences.

There is something curiously similar between silence, understood as "a state of quiet without words," and night, understood as "the darkness after sunset." Both are temporary states and durations that pass beyond the realms of speech and daylight. Yoori's paintings seek the time of silence and night because they cherish what is fleeting rather than eternal. The lives of the objects within her paintings will likely outlast our own time. For some reason, this fact offers a certain kind of consolation.

Amid the quiet order of things, there are paintings made without driving away silence or the night—paintings that somehow continue to speak, even without words or light.</div>
<div style="white-space:pre-line;font-size:0.85em;margin-top:2.5em;"><sup>1</sup> Nicole Krauss, The History of Love, translated by Min Eun-young (Munhakdongne, 2020), p.111.
<sup>2</sup> Peripheral vision refers to the visual capacity of the outer field of view. Though less acute and less sensitive to color than central vision, it is especially responsive to dim light and movement. (Standard Korean Language Dictionary).</div>`,
  'review-text-en': `《Shapeless Loop》 : Exhibition Review


Kim Haeseo (Writer)

<Here Is Where We Meet>



   I once had a white dog. His tail was long and sleek, and whenever he stood in the sunlight, his dark eyes took on a sharp, cola-brown hue. A Jindo mix with alert, pricked ears. We called him Heunggu.


   Long ago, I let him go. Yet the moment I step into my mother's hometown in Oeseo-myeon, Suncheon—a village thick with bamboo—I still catch myself whispering "Shh—" inside, trying to quiet the dog who comes alive again and barks. Yes. Heunggu was my maternal grandfather's dog. Technically, I never had him. To him, I was perhaps just a girl he saw on occasion—someone who carried a faint, vaguely unpleasant scent of the city. A girl, standing among adults, her face indifferent, sometimes drifting close to stroke his head and the bridge of his nose, then turning away—only to wrinkle her brow and flinch in disgust if he so much as licked her palm. That incomprehensible girl.

   My grandfather died only a month after his cancer diagnosis. Shortly after, Heunggu was gone without a trace. By my grandmother's unilateral decision, the dog was handed over to someone else. It may have been the dog her husband had cherished that unsettled her as deeply as the loss of the man itself. Heunggu was quite old, my mother and her siblings talking about his future—'What about burying him next to Father?' 'Wouldn't it be better to scatter him in the mountains?'—and I watched, with something like pity, to see what a dog looks like when it has lost its master, and then,  he was simply gone. Everyone was appalled, when it came to light. But before my grandmother's cold face, no one dared say a word. And after that, no one showed any worry or longing for him.

   Neither did I. Their heartlessness startled me, but Heunggu had been my grandfather's dog and that made him my grandmother's matter. I had seen him only a few times at holidays or family gatherings. It … should not have been a loss that mattered.

   So I couldn't understand it - every time his ghost barked from nowhere.

   A few weeks before the dog left, the adults began unclipping his leash more often, letting him wander the yard. His happy paws made a tododododo sound across the cement and didn't stop. I heard it later; while my grandfather was ill, when everyone packed up and rushed to the hospital as if evacuating, Heunggu had survived by rationing the feed my grandfather had left, more than usual. When one of my uncles came by two weeks later, it wasn't empty. He had even  left some behind. After that, another long wait. The person who had said he'd be back soon never came through the gate again.

   As my grandfather's belongings were being sorted, I listened half-waiting for Heunggu's name to surface in the adults' talk. My grandfather loved him. But that is as far as I know.

   The day I heard that my grandmother had led only my father—her son-in-law—out to the field, turning her own children away, and burned a few of her husband's favorite clothes and small belongings, collapsing as she called out the names of her husband and her eldest son who had died in an accident—I thought of her face at the funeral, blank, not a sound, and I stopped wondering about Heunggu.

   Now I quietly track Heunggu. Or rather—his traces. As time passes, his wholeness blurs and only pieces remain—the way I picture my grandfather only in parts: his thick hands, his gold-toothed smile, his straw hat. The soft tap of Heunggu's claws across the yard has become indistinguishable from the sound of bamboo clashing beyond the wall. Whenever the village dogs set off barking at a strange car, I think of him. But Heunggu would stop the moment he knew we were "us." And so within all that noise, what I felt stayed mine alone.

*
   In December 2025, I saw the exhibition 《Shapeless Loop》 by artist Yoori. For reasons I cannot quite name, this exhibition set something adrift in me—guilt, emptiness, and a longing I had no right to feel. It may have begun with the animal form in the work <A Far and Black Stain>. The four-legged shape—impossible to tell whether foal or dog—touched something inside me: my dog, a mark that would not fade. My white dog may no longer be white. He will have become something formless, something that cannot be likened to anything. The connection between us has come undone across the Styx, yet the dog settles into the life that continues as an abstract layer. And each time that layer falls across my dimension, we meet. Sometimes as the sound of footsteps. Sometimes as a cry. Sometimes as a connection that can only be explained as "mistaken" or "imagined."
   The work <The Potential of Loss and Eternal Yearning> is perhaps the most perfect "book" to embody that fantastical contact. I believe I turned and read the pages of this book, shaped from transparent resin and wooden blocks. Inside the wooden book, painted over in muted pigment, a beast is dismembered within the transparent resin—unraveled by red thread and cloth. Like a heart dissolving in water, vivid yet coming apart into line and plane. No longer oxidized by air, fixed forever in a vacuum: what had once been a body. If I felt that this transparent book was asking to be understood—that there are signals which can only be sent through silence—would that be too much?
   Between me and the white dog, between me and what was once the white dog, between me and what is no longer the white dog—if a single thread still runs, I think I now have the courage to tap it gently. Even if nothing stirs in return.
   The images in <The Long-Tailed Book> and <The Long-Tailed Book: A Detached Sentence(1–14)>, encountered afterward, showed a narrative given without consent between life and death—yet came to me as something confused, reaching out then folding back, as if grasping at a will to connect a murky past to an uncertain future. Like a collection of punctuation marks made by someone who must explain an entire life just to speak a single word—exclamation points and question marks, commas and periods all thrown together. Is this what the moments have been like for artist Yoori, from 2023 when the artist book series began until now? And is this truly how time moves in the world where we, the surviving, remain?
   Soaked in a giddy fear, as if I had witnessed some terrible secret, I looked once more at <Shapeless Loop>, hanging at the entrance. The two flowers—life and death—are so alike they might as well be twins. Both look fresh; both look somehow wilted. They seem to grow in different directions, yet in the end they are bound by a single ribbon. The "shapeless loop" is a force exactly as powerful—and as fragile—as that small ribbon.
*
   More than ten years have passed since my grandfather died. Now, instead of a white dog, yellow cats live in the old house in Suncheon. My grandmother, who said she never wanted to grow attached to anything again, has at least allowed them the yard and the back garden. She throws them scraps now and then. Thanks to this, the yellow cat family has been settled there for three generations, living well. They were wary at first, but with each generation they grow a little more used to human hands. My mother and her siblings send bags of cat food whenever they can—so my grandmother, whether she likes it or not, will have to make peace with the sound of meowing at her door.
   I still visit occasionally, as a stranger from a distant city, and give some affection to the cats. And I think of my dog. Looking into their amber eyes, I see cola-colored eyes. White lashes. A long, warm tongue. Black paw pads. A tail wagging at the sight of me.


*The title is taken from John Berger's Here Is Where We Meet (Youlhwadang).
Written by Kim Haeseo (@unanswered.letters)
Translated by Joosang (@kxxzxx)`,
  'pageroom-text-en': `Solo Exhibition 《Non-existent Day》 Pageroom8, 2024


Jungwon Park (Director of Pageroom8)


Non-existent Day is about the point at which one can glimpse the intuition through which the images in Yoori's paintings come into being. Before discussing this, I would like to begin with a brief reflection on a work I encountered in November 2022, 〈A Temporary Scene〉. At the time, Yoori's works dealt with things that reside in realms beyond the reach of language. They featured a ladder climbed by stepping on wings, a woman watering the sea, and a duck with wheels. They seemed to momentarily hold, in image form, those things that could not quite be articulated in words yet evoked a quiet smile, or moments that visual perception alone could not fully grasp. The forms of that period appeared as though even mourning had been folded into the emotion of happiness. Yet 〈A Temporary Scene〉 (2022) was somewhat different. True to its title, it fully embodied a landscape that existed only provisionally. Deep green grass painted onto a wooden panel as if planted there, a rainbow suspended in a sky that seemed neither day nor night, and mounds of clay apparently being kneaded by the artist, delaying their determination into any fixed shape, while the veil covering them created a peculiar tension. Excavated by the emotions welling up within the artist's body somewhere between mirage and presence, these images continually invited anticipation for the stories yet to come. Non-existent Day foretells a scene in which another form emerges, as though lifting the veil draped over the mound in 〈A Temporary Scene〉.

On February 29, 2024, a day absent from the world for four years arrives once again. It seems almost inevitable that Yoori would intuitively weave the slender thread connected to her thirtieth-of-February birthday into the skein of the non-existent day with tiny ribbons. This year, on her birthday, the cycle of a month—the time it takes the moon to orbit the earth—and the cycle of a year—the time it takes the earth to orbit the sun—coincide. Moreover, the artist, who was born carrying a dream of embracing a full moon, will celebrate her birthday on a night when the moon is once again completely full.

〈The Floating Particles〉 is both a painting and an installation composed by suspending nine works from 〈The Unknown〉, each depicting different figures, from a wooden panel reaching the height of the exhibition space. Images of anonymity, mystery, and the unknown are at once adrift and bound within a landscape containing an old tree unable to conceal its great wings. A birthday marks a beginning, a birthday repeats itself, and a birthday inevitably comes to an end. Life and death—these philosophical yet vivid realities—are always either wished to culminate in joy or stained with fear. The presence of being alive is so close to the act of breathing that it often escapes notice. In a place that cannot be described as heaven, hell, or even purgatory, one chooses instead to become dust drifting like mist.

Yoori's 『Non-existent Day』 is an artist's book composed of 366 drawings. Each drawing is assigned a date, granting temporal markers to images that surfaced as bodily horizons of the world she seeks. Perhaps these dates commemorate moments that sparkled and vanished. In this way, the non-existent day became an existing day. The act of turning pages forms a point of contact with the gaze of an anonymous other. The book is neither entirely a book nor merely a supplement to the exhibition, but occupies a unique threshold of the artist's own making. Yoori discovers in the physical beauty and conceptual nature of the book a symbolic paradoxical world in which opening the book turns the inside outward, and gazing at the outside turns it inward. Just as opening a book creates a space between pages where anyone and anything may intervene, her work is a process of creating possibilities of "in-betweenness" within what otherwise appears as a tightly closed mass.

The artist continues to work with both wooden panels and canvas. In particular, her oil paintings on wood combine gestures of squeezing and carving. As seen in 〈The Floating Particles〉, placing canvas upon wooden panels expands the genre of painting into the realm of sculpture and installation. Likewise, in 〈Heavy Words〉 (2023), one finds intriguing forms that emerge alongside disappearance: foldable sculptures inspired by the physicality of books and surfaces carved away with chisels. By connecting and simultaneously dismantling wooden panels and canvases, paintings and books, Yoori establishes her own threshold on the level of materiality. Furthermore, her attitude toward books and paintings represents a new kind of discovery and experiment that slips beyond conventional notions of painting and language themselves.

Yoori's intuition is not something chosen in an instant. Rather, it is naturally embodied and manifested as the world of thresholds fills her body, much as the non-existent day itself arrives in reality. Thus, her images require time to dissolve into multiple sensory realms before they are completed. This may partly be a deferential attitude aimed at avoiding a world too readily reduced to concepts through language. More importantly, however, they are formed through the operation of the artist's imagination and insight, both set into motion from a single fragment of thought. The world that had never existed, woven from the small clue of a birthday, had already been there within Non-existent Day.

The February 29 that has now passed will once again become, for some time, a "non-existent day." And I find myself returning to 〈A Temporary Scene〉. A being and a world that still exist, though absent for a while; invisible, yet not extinguished… I remember the point where, though I could not see clearly, I briefly found footing and touched it through sensation. This is both my personal impression of 〈A Temporary Scene〉 and my response to Yoori's work as a whole. Because her work seeks to render what resists language, it remains difficult to express fully in words. Yet I believe that the clues to those images that once testified to themselves within me like mirages, though they may seem to fade and conceal themselves in everyday life, will one day reappear unexpectedly—like Non-existent Day itself—when one gropes toward the memory of that singular time.`,

function buildItems(container, items, usePrefix = false) {
  items.forEach(item => {
    if (item.t === 'cat') {
      const el = document.createElement('div');
      el.className = 'cat-label';
      el.textContent = item.label;
      container.appendChild(el);
    } else if (item.t === 'show') {
      const el = document.createElement('div');
      el.className = 'acc-item';
      el.dataset.imgKey = item.imgKey || '';
      el.dataset.itemLabel = item.label;
      el.dataset.itemId = item.id || '';
      el.dataset.itemTextKey = item.textKey || '';
      el.dataset.itemTextImgPath = item.textImgPath || '';
      el.dataset.itemImgCaptionKey = item.imgCaptionKey || '';
      el.dataset.itemSplitImg = item.splitImg || '';
      el.dataset.itemSplitImgs = item.splitImgs ? JSON.stringify(item.splitImgs) : '';
      el.dataset.itemSplitItems = item.splitItems ? JSON.stringify(item.splitItems) : '';
      el.dataset.itemSplitText = item.splitText || '';
      el.textContent = (usePrefix && !item.noPrefix) ? '- ' + item.label : item.label;
      el.addEventListener('click', () => onShowClick(item, el));
      container.appendChild(el);
    } else if (item.t === 'acc') {
      const wrap = document.createElement('div');
      const header = document.createElement('div');
      header.className = 'acc-header';
      const isYear = /^\d{4}$/.test(item.label);
      if (isYear) {
        header.dataset.label = item.label;
        header.dataset.arrow = '1';
        header.textContent = '▶ ' + item.label;
      } else {
        header.textContent = item.label;
      }
      const body = document.createElement('div');
      body.className = 'acc-body';
      buildItems(body, item.items, isYear);
      header.addEventListener('click', () => toggleAcc(body));
      wrap.appendChild(header);
      wrap.appendChild(body);
      container.appendChild(wrap);
    }
  });
}

function toggleAcc(body) {
  if (body.dataset.alwaysOpen) return;
  const isOpen = body.classList.contains('open');
  const grandparent = body.parentElement?.parentElement;
  if (grandparent) {
    grandparent.querySelectorAll(':scope > * > .acc-body').forEach(b => {
      if (b.dataset.alwaysOpen) return;
      b.style.maxHeight = '0px';
      b.classList.remove('open');
      const h = b.previousElementSibling;
      if (h && h.dataset.arrow) { h.textContent = '▶ ' + h.dataset.label; h.classList.remove('is-open'); }
    });
  }
  if (!isOpen) {
    body.classList.add('open');
    body.style.maxHeight = '9999px';
    const header = body.previousElementSibling;
    if (header && header.dataset.arrow) { header.textContent = '▼ ' + header.dataset.label; header.classList.add('is-open'); }
  }
}

  if (!currentState) { langBtn.href = 'index.html'; return; }
  const p = new URLSearchParams();
  if (currentState.type === 'nav') {
    p.set('view', currentState.key);
  } else {
    p.set('view', 'show');
    if (currentState.id) p.set('id', currentState.id);
    else if (currentState.imgKey) p.set('key', currentState.imgKey);
    else p.set('label', currentState.label);
  }
  langBtn.href = 'index.html?' + p.toString();
}

function restoreStateFromURL() {
  const p = new URLSearchParams(window.location.search);
  const view = p.get('view');
  if (!view) return;
  openMenu();
  if (view === 'cv' || view === 'contact') {
    const el = menuPanel.querySelector(`[data-nav-key="${view}"]`);
    if (el) onNavClick(view, el);
  } else if (view === 'show') {
    const id = p.get('id');
    const key = p.get('key');
    const label = p.get('label');
    const el = id
      ? menuPanel.querySelector(`[data-item-id="${id}"]`)
      : key
      ? menuPanel.querySelector(`[data-img-key="${key}"]`)
      : [...menuPanel.querySelectorAll('.acc-item')].find(e => e.dataset.itemLabel === label);
    if (el) {
      let ancestor = el.closest('.acc-body');
      while (ancestor) {
        ancestor.classList.add('open');
        ancestor.style.maxHeight = '9999px';
        const h = ancestor.previousElementSibling;
        if (h && h.dataset.arrow) { h.textContent = '▼ ' + h.dataset.label; h.classList.add('is-open'); }
        ancestor = ancestor.parentElement?.closest('.acc-body');
      }
      onShowClick({ id: el.dataset.itemId || null, imgKey: el.dataset.imgKey || null, textKey: el.dataset.itemTextKey || null, textImgPath: el.dataset.itemTextImgPath || null, imgCaptionKey: el.dataset.itemImgCaptionKey || null, splitImg: el.dataset.itemSplitImg || null, splitImgs: el.dataset.itemSplitImgs ? JSON.parse(el.dataset.itemSplitImgs) : null, splitItems: el.dataset.itemSplitItems ? JSON.parse(el.dataset.itemSplitItems) : null, splitText: el.dataset.itemSplitText || null, label: el.dataset.itemLabel }, el);
    }
  }
}

menuToggle.addEventListener('click', openMenu);
menuCloseBtn.addEventListener('click', closeMenu);
restoreStateFromURL();
</script>
</body>
</html>
