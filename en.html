  'shapeless-loop-essay-en': `Shapeless Loop for Our Annyeong(安寧)

Han Joo-ok (Independent Curator)

At times, memory becomes a trigger for glimpsing what lies ahead. When a scene from the past unexpectedly cuts through the present, it recalls the patterns that have carried the world forward while simultaneously becoming an omen of what is yet to come. It is the moment when different temporal lines fold into one. Every trajectory—in nature and in human life—eventually converges into the present. Perhaps this is why connection has long been represented as an infinite loop, a trajectory with neither origin nor terminus. For a long time, the artist Yoori has made this sense of connection the central subject of her practice. She traces sensations that have slipped into the past and observes the emotions that accumulate in the space left by absence, remaining attentive to their potential to return in another form. Within this practice, in Shapeless Loop, the artist gathers moments when recurring feelings of loss collide with ordinary scenes in daily life. These are sensations perceived before language and signals that appear at the threshold of logic. She composes them into a transparent loop.

In her studio, she recounted several recent experiences. At her grandfather's funeral, an unexpected moment broke through the solemnity of the gathering: a birthday song suddenly filled the room. The candles flickered, their light crossing with incense and tears. The scene stayed with her, as life and death surged into awareness all at once. Rather than reading these experiences through metaphysical concepts such as reincarnation, the artist turns her attention to sensing the currents that emerge in the unfolding of events. Encounters with what is invisible and resistant to representation have led her to consider perception as a temporal configuration. This is perhaps what could be called temporality. Her practice lies in allowing perception to shift, transform, and take on new forms. Her works become sites where past and future fold into the present, where multiple layers of time coexist.

Her working process makes this approach even more evident. By repeatedly layering, erasing, and connecting what lies inside and outside the surface, she resists fixing an image as a final outcome. Each captured scene acts as a point of mediation, calling forth another and gaining momentum to shift into the next. Her experimentation with materials expands in this continual process. What stands out is that each work functions as a narrative unit. That is, the work operates as a kind of sequence. It gathers, arranges, and revisits scenes, forming a temporal loop and establishing the artist's distinctive structural language. This is especially evident in the works she has long referred to as her Artist's Books.
In this exhibition, the artist presents The Book of Weighty Words #1–19 (2023–2025), a series of Artist's Books she has been producing since 2023. Perceived through touch and surface, the Artist's Books become a metaphor not only for what cannot be verbalized but also for her act of connecting them. The artist has noted "the power of a book formed by multiple sheets of paper gathering into a single mass, and the physical and visual stimulus that emerges from the binding process." Within her practice, the book becomes a physical embodiment of connection and accumulation. Scenes unfold as if pages are being turned, and each act of reading generates another link that extends to the next. Her recent works, Sorrow Formed from What Remains (2025) and The Potential of Loss and Eternal Yearning (2025), introduce a layer of transparency to this trajectory. Acrylic ink, silk fabric, and objects that once remained in the artist's hands are sealed within resin, solidifying into the form of a book. At the same time, the premise that one can look through them remains. Once again, past and future flow into the present.

And so, the question lingers. What remains on the surface? The faint light left by a dying candle, a ribbon that loosens and ties again, running water, and fragments of a luminous wing. These images emerge from the time that lingers within the artist, remnants of moments that stayed briefly and then disappeared. The meanings they carry resist being fully grasped and remain beneath the surface of her consciousness. For this reason, she chooses not to define them. Instead, she receives the flow as it comes, and lets it pass again. One is reminded of the moment when the path once believed to be straight began to soften into a curve. And doesn't that curve open onto another path? The loop has long been represented in this way. Here, the idea materializes through two works installed on the right side of the central exhibition space. They are The Long-Tailed Book: A Detached Sentence (1-14, 2025) and The Long-Tailed Book (2023–2025). The first work took shape as a seven-meter installation. Through repeated binding and unfolding, accidental divisions emerged, splitting scenes apart and becoming catalysts for a new sense of connection. From this process, The Long-Tailed Book: A Detached Sentence came into being. Images that once formed a continuous narrative now diverge within the book. They become independent scenes, yet still maintain continuity, connecting like a loop.


One day, the absence of someone—a trace slipped out of time and space—returns with a quiet sting. She does not hide the pull of what has slipped away. As she gathers what remains, one fragment at a time, a form gradually takes shape. It becomes Sorrow Formed from What Remains. At the entrance, Shapeless Loop (2025) condenses birth, death, and the absence of what is cherished into a single event. A deep blue-black tone settles across the surface like slow water along a canal at night. Realizing that the (im)material beliefs that once held our daily lives together have disappeared brings a pain that resists being dispelled. Here, mourning gathers and anchors itself to the space, reminding us that the most fundamental condition of connection begins in absence.


Translated by Han Joo-ok`,
  'segye-essay-en': `Arts & Culture Column for Segye Ilbo


For the Time After the End — Tenderly Calling Back Vanished Beings

Shin Lisa (Art Historian | Head of Planning Team, Hakgojae)



Black lines and masses rise from deep blue pools and flowing streams. Visual artist Yoori (b. 1994) has continued to create works that draw up unnamed emotions and mental images lingering within the mind, unable to evaporate. Her solo exhibition 《Shapeless Loop》 (11/19–12/20), currently held at Hakgojae, begins from a deeply personal narrative. After confronting the deaths of loved ones three times in a single year, the artist came to contemplate existence and reality through the concrete themes of life and death. In particular, the experience of receiving birthday wishes at a funeral hall — her birthday having become the anniversary of her grandfather's death — led her to realize that birth and death are not separate events, much like the candles at a funeral and those atop a birthday cake resemble one another. This exhibition emerges precisely from that gaze directed toward the boundary between endings and beginnings, presence and absence.

<At the Place Where Things Have Ended>

The exhibition consists of around fifty works spanning painting, sculpture, and installation, most of them rendered in black, white, and at times deep blue tones. What Yoori holds onto here are the small and subtle remnants left behind by beings that can no longer be seen. Rather than concealing or beautifying them, she chooses to reveal them honestly.

In the painting <Shapeless Loop>, which shares its title with the exhibition, the figure of a deceased cat appears alongside a red thread tied around its leg in anticipation of a future reunion. In sculptures made of resin and wood, that same thread reemerges with immediate material presence. These works do not rely on memory or recollection, but begin from the lingering presence of things that remain even after disappearance. Black stains deeply absorbed into the surface, matte textures drained of moisture, and violently sweeping lines remain like the afterglow of eternity left behind after turbulent emotions have passed.

In <Sorrow Formed from What Remains>, beads taken from the artist's maternal grandmother's necklace are sealed in resin, embodying the wish that vanished beings might continue to remain somewhere, in some form. The tiny beads suspended within transparent masses transform into crystallizations of eternity, shaped into objects for "the time after death." The artist's hesitation over whether to preserve the relics intact or transform them into artworks was ultimately overcome by a desire for transcendence toward another dimension. Her words, "I had to do something," feel less like resignation than a determination to move forward through grief and mourning.

<A Moving World>

Yoori reveals the links between presence and absence, life and death, not through abstract concepts but through concrete objects, scenes, and tactile experiences. Endless black loops, black threads forming volumes and ribbons as they rise toward the sky, and white rings resembling wings appear throughout the works.

In <Endlessly Rising and Constantly Emptying>, the structure of connection and circulation takes the form of a fountain. Its movement — surging upward, falling, and filling again — visualizes the immense flow of life in which presence and absence intersect. It is also the movement of the mind itself: the experience of being filled and emptied within the great wheel of existence. Resembling a human face with two eyes, the fountain appears to pour out emotions unreservedly while maintaining an air of detachment, as though it already knows that what fills will eventually empty, and what is empty will inevitably be filled again.

The belief that endings are not truly endings, and the fascination with transparent loops of connection, are also metaphorized through the relationship between the moon and the sea. Though physically too distant ever to touch, the moon's gravity continuously pulls the sea, keeping it in perpetual motion. In <The Pull Between Moon and Sea>, dark blue waves and faint moonlight blur into one another, erasing their boundaries. The artist places these two eternally separated entities together within a house-like space. Like two beings far apart yet powerfully connected, she captures relationships that continue after separation and invisible forces that nonetheless operate with intensity.

<Fragments Born by Stepping Beyond the End>

In <The Long-Tailed Book>, reflections on connection and the will toward transformation emerge through the artist's working process itself. Originally folding a seven-meter-long painting like an accordion, Yoori witnessed existing scenes accidentally linking together and generating new combinations. Images jutting out like unreadable sentences gave rise to other languages and meanings, leading the artist to separate these scenes into independent small paintings and expand them into a series titled <The Long-Tailed Book: A Detached Sentence 1-14>. She then miniaturized and reconnected those paintings once more, giving birth to a form resembling a single "tail."

The act of folding the original work like a book is less an act of destruction than one of exploring new possibilities. Though the fragmented images lose their original function, the artist turns that rupture into the starting point of another beginning. Instead of preserving what remains — the original painting — intact, she fragments and reconstructs it, allowing the weight of "what remains" to speak anew. Thus, the works born "tail after tail" survive by stepping beyond the end, reborn as new beings — somewhat grotesque, yet gleaming black like living creatures.

<A Poem for What Remains>

In Yoori's world, where what remains is gazed upon and allowed to regain light, nothing is meaningless and no ending is truly final. Emotions once sunk heavily like grief and longing ascend lightly toward another dimension upon white wings and transparent loops of eternity.

Although this exhibition begins with loss and mourning, it clearly contains a will to move beyond them and a yearning for eternity. There is an earnest hope that beings no longer visible might somehow continue their existence, and a desire to remain eternally connected to loved ones beyond physical limitations. Though profoundly personal, the reason we empathize with Yoori's art may be that it ultimately touches upon the universal human fear of loss and the shared effort to endure and move beyond it.

Within Yoori's art — born from life and returning once more to life — we confront fear and sorrow honestly while simultaneously sensing the possibility of transcendence.

To gaze upon the remaining fragments and quietly build poetry for the time after loss. In the deep stillness where sorrow settles and truth rises to the surface, on the final day of emotion, Yoori tenderly calls forth the nameless feelings and vanished beings left behind.`,

// ── DOM REFS ───────────────────────────────────────────────────────────
const menuToggle   = document.getElementById('menuToggle');
const menuCloseBtn = document.getElementById('menuCloseBtn');
const menuPanel    = document.getElementById('menuPanel');
const menuDivider  = document.getElementById('menuDivider');
const layout       = document.getElementById('layout');
const rightPanel   = document.getElementById('rightPanel');
const rightCover   = document.getElementById('rightCover');
const projectImgs  = document.getElementById('projectImages');
const textContent  = document.getElementById('textContent');
const splitView    = document.getElementById('splitView');
const langBtn      = document.getElementById('langBtn');

let menuOpen = false;
let currentState = null;

// ── 메뉴 아이템 재귀 빌드 ─────────────────────────────────────────────
function buildItems(container, items, usePrefix = false) {
  items.forEach(item => {
    if (item.t === 'cat') {
      const el = document.createElement('div');
      el.className = 'cat-label';
      el.textContent = item.label;
      container.appendChild(el);
    } else if (item.t === 'show') {
      const el = document.createElement('div');
      el.className = 'acc-item';
      el.dataset.imgKey = item.imgKey || '';
      el.dataset.itemLabel = item.label;
      el.dataset.itemId = item.id || '';
      el.dataset.itemTextKey = item.textKey || '';
      el.dataset.itemTextImgPath = item.textImgPath || '';
      el.dataset.itemSplitImg = item.splitImg || '';
      el.dataset.itemSplitImgs = item.splitImgs ? JSON.stringify(item.splitImgs) : '';
      el.dataset.itemSplitItems = item.splitItems ? JSON.stringify(item.splitItems) : '';
      el.dataset.itemSplitText = item.splitText || '';
      el.textContent = (usePrefix && !item.noPrefix) ? '- ' + item.label : item.label;
      el.addEventListener('click', () => onShowClick(item, el));
      container.appendChild(el);
    } else if (item.t === 'acc') {
      const wrap = document.createElement('div');
      const header = document.createElement('div');
      header.className = 'acc-header';
      const isYear = /^\d{4}$/.test(item.label);
      if (isYear) {
        header.dataset.label = item.label;
        header.dataset.arrow = '1';
        header.textContent = '▶ ' + item.label;
      } else {
        header.textContent = item.label;
      }
      const body = document.createElement('div');
      body.className = 'acc-body';
      buildItems(body, item.items, isYear);
      header.addEventListener('click', () => toggleAcc(body));
      wrap.appendChild(header);
      wrap.appendChild(body);
      container.appendChild(wrap);
    }
  });
}

// ── 메뉴 빌드 ─────────────────────────────────────────────────────────
menuStructure.forEach(node => {
  if (node.t === 'sep') {
    menuPanel.appendChild(Object.assign(document.createElement('hr'), { className: 'menu-sep' }));
    return;
  }
  const wrap = document.createElement('div');
  wrap.className = 'menu-inner';
  if (node.t === 'nav') {
    const el = document.createElement('div');
    el.className = 'nav-item';
    el.dataset.navKey = node.key;
    el.textContent = node.label;
    el.addEventListener('click', () => onNavClick(node.key, el));
    wrap.appendChild(el);
  } else if (node.t === 'acc') {
    const header = document.createElement('div');
    header.className = 'acc-header';
    header.textContent = node.label;
    const body = document.createElement('div');
    body.className = 'acc-body';
    buildItems(body, node.items, true);
    header.addEventListener('click', () => toggleAcc(body));
    wrap.appendChild(header);
    wrap.appendChild(body);
  }
  menuPanel.appendChild(wrap);
});

// ── Works/Exhibitions + 연도 아코디언 초기 열기 ───────────────────────
(function initOpenAccordions() {
  menuPanel.querySelectorAll('.menu-inner > .acc-header').forEach(header => {
    if (header.textContent.trim() === 'Works/Exhibitions') {
      const body = header.nextElementSibling;
      body.dataset.alwaysOpen = '1';
      body.classList.add('open');
      body.style.maxHeight = '9999px';
    }
  });
})();

// ── 아코디언 토글 (형제만 닫기) ──────────────────────────────────────
function toggleAcc(body) {
  if (body.dataset.alwaysOpen) return;
  const isOpen = body.classList.contains('open');
  const grandparent = body.parentElement?.parentElement;
  if (grandparent) {
    grandparent.querySelectorAll(':scope > * > .acc-body').forEach(b => {
      if (b.dataset.alwaysOpen) return;
      b.style.maxHeight = '0px';
      b.classList.remove('open');
      const h = b.previousElementSibling;
      if (h && h.dataset.arrow) { h.textContent = '▶ ' + h.dataset.label; h.classList.remove('is-open'); }
    });
  }
  if (!isOpen) {
    body.classList.add('open');
    body.style.maxHeight = '9999px';
    const header = body.previousElementSibling;
    if (header && header.dataset.arrow) { header.textContent = '▼ ' + header.dataset.label; header.classList.add('is-open'); }
  }
}

function onNavClick(key, el) {
  clearActive();
  el.classList.add('active');
  currentState = { type: 'nav', key };
  updateLangHref();
  layout.classList.add('project-open');
  langBtn.classList.add('content-open');
  menuToggle.classList.add('content-open');
  rightCover.classList.add('hidden');
  projectImgs.classList.remove('active');
  projectImgs.innerHTML = '';

  const html = key === 'cv' ? cvHTML : key === 'contact' ? contactHTML : '';
  textContent.innerHTML = html;
  textContent.classList.add('active');
  rightPanel.scrollTop = 0;
  if (window.innerWidth <= 768) closePanelOnly();
}

function onShowClick(item, el) {
  clearActive();
  el.classList.add('active');
  currentState = { type: 'show', id: item.id || null, imgKey: item.imgKey || null, label: item.label };
  updateLangHref();
  layout.classList.add('project-open');
  langBtn.classList.add('content-open');
  menuToggle.classList.add('content-open');
  rightCover.classList.add('hidden');

  if (item.splitItems || item.splitImg || item.splitImgs) {
    projectImgs.classList.remove('active');
    projectImgs.innerHTML = '';
    textContent.classList.remove('active');
    textContent.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'split-view';
    const items = item.splitItems || (item.splitImgs || [item.splitImg]).map((src, i) => ({ img: src, text: i === 0 ? (item.splitText || '') : '' }));
    items.forEach(si => {
      const row = document.createElement('div');
      row.className = 'split-row';
      const imgWrap = document.createElement('div');
      imgWrap.className = 'split-view-img';
      const img = document.createElement('img');
      img.src = si.img;
      img.alt = '';
      imgWrap.appendChild(img);
      const textWrap = document.createElement('div');
      textWrap.className = 'split-view-text';
      textWrap.textContent = si.text || '';
      row.appendChild(imgWrap);
      row.appendChild(textWrap);
      wrap.appendChild(row);
    });
    splitView.innerHTML = '';
    splitView.appendChild(wrap);
    splitView.style.display = 'block';
  } else if (item.textKey) {
    splitView.style.display = 'none';
    splitView.innerHTML = '';
    projectImgs.classList.remove('active');
    projectImgs.innerHTML = '';
    const pre = document.createElement('pre');
    pre.style.cssText = 'white-space:pre-wrap;font:inherit;margin:0;';
    pre.textContent = textsContent[item.textKey] || '';
    textContent.innerHTML = '';
    textContent.appendChild(pre);
    if (item.textImgPath) {
      const img = document.createElement('img');
      img.src = item.textImgPath;
      img.alt = '';
      img.style.cssText = 'display:block;width:100%;margin-top:28px;';
      textContent.appendChild(img);
    }
    textContent.classList.add('active');
  } else {
    splitView.style.display = 'none';
    splitView.innerHTML = '';
    textContent.classList.remove('active');
    textContent.innerHTML = '';
    const imgs = item.imgKey ? (exhibitionImages[item.imgKey] || []) : [];
    projectImgs.innerHTML = '';
    imgs.forEach(src => {
      const img = document.createElement('img');
      img.src = src;
      img.alt = '';
      projectImgs.appendChild(img);
    });
    projectImgs.classList.add('active');
  }
  rightPanel.scrollTop = 0;
  if (window.innerWidth <= 768) closePanelOnly();
}

function clearActive() {
  menuPanel.querySelectorAll('.nav-item, .acc-item').forEach(el => el.classList.remove('active'));
}

function returnToLanding() {
  clearActive();
  currentState = null;
  updateLangHref();
  langBtn.classList.remove('content-open');
  menuToggle.classList.remove('content-open');
  menuPanel.querySelectorAll('.acc-body').forEach(b => { b.style.maxHeight = '0px'; b.classList.remove('open'); });
  layout.classList.remove('project-open');
  projectImgs.classList.remove('active');
  projectImgs.innerHTML = '';
  textContent.classList.remove('active');
  textContent.innerHTML = '';
  splitView.style.display = 'none';
  splitView.innerHTML = '';
  rightCover.classList.remove('hidden');
  rightPanel.scrollTop = 0;
}

function openMenu() {
  menuOpen = true;
  menuPanel.classList.add('open');
  menuDivider.classList.add('visible');
  menuToggle.classList.add('hidden');
}

function closeMenu() {
  menuOpen = false;
  menuPanel.classList.remove('open');
  menuDivider.classList.remove('visible');
  menuToggle.classList.remove('hidden');
  returnToLanding();
}

function closePanelOnly() {
  menuOpen = false;
  menuPanel.classList.remove('open');
  menuDivider.classList.remove('visible');
  menuToggle.classList.remove('hidden');
}

function updateLangHref() {
  if (!currentState) { langBtn.href = 'index.html'; return; }
  const p = new URLSearchParams();
  if (currentState.type === 'nav') {
    p.set('view', currentState.key);
  } else {
    p.set('view', 'show');
    if (currentState.id) p.set('id', currentState.id);
    else if (currentState.imgKey) p.set('key', currentState.imgKey);
    else p.set('label', currentState.label);
  }
  langBtn.href = 'index.html?' + p.toString();
}

function restoreStateFromURL() {
  const p = new URLSearchParams(window.location.search);
  const view = p.get('view');
  if (!view) return;
  openMenu();
  if (view === 'cv' || view === 'contact') {
    const el = menuPanel.querySelector(`[data-nav-key="${view}"]`);
    if (el) onNavClick(view, el);
  } else if (view === 'show') {
    const id = p.get('id');
    const key = p.get('key');
    const label = p.get('label');
    const el = id
      ? menuPanel.querySelector(`[data-item-id="${id}"]`)
      : key
      ? menuPanel.querySelector(`[data-img-key="${key}"]`)
      : [...menuPanel.querySelectorAll('.acc-item')].find(e => e.dataset.itemLabel === label);
    if (el) {
      let ancestor = el.closest('.acc-body');
      while (ancestor) {
        ancestor.classList.add('open');
        ancestor.style.maxHeight = '9999px';
        const h = ancestor.previousElementSibling;
        if (h && h.dataset.arrow) { h.textContent = '▼ ' + h.dataset.label; h.classList.add('is-open'); }
        ancestor = ancestor.parentElement?.closest('.acc-body');
      }
      onShowClick({ id: el.dataset.itemId || null, imgKey: el.dataset.imgKey || null, textKey: el.dataset.itemTextKey || null, textImgPath: el.dataset.itemTextImgPath || null, splitImg: el.dataset.itemSplitImg || null, splitImgs: el.dataset.itemSplitImgs ? JSON.parse(el.dataset.itemSplitImgs) : null, splitItems: el.dataset.itemSplitItems ? JSON.parse(el.dataset.itemSplitItems) : null, splitText: el.dataset.itemSplitText || null, label: el.dataset.itemLabel }, el);
    }
  }
}

menuToggle.addEventListener('click', openMenu);
menuCloseBtn.addEventListener('click', closeMenu);
restoreStateFromURL();
